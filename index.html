<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMK Performances — Plateforme de simulation Relation Client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CHARTE GRAPHIQUE TMK PERFORMANCES
   Bleu marine profond + orange corail (logo) / blanc / gris perle
   ============================================================ */
:root{
  --tmk-navy:        #1a2e5c;     /* couleur principale - identité TMK */
  --tmk-navy-2:      #243d75;     /* navy secondaire un peu + clair */
  --tmk-navy-3:      #0e1d3f;     /* navy foncé pour titres */
  --tmk-orange:      #f26749;     /* accent corail/orange du logo */
  --tmk-orange-2:    #e95234;     /* orange hover */
  --tmk-yellow:      #f7b733;     /* jaune secondaire (énergie) */
  --tmk-green:       #16a085;     /* validation / succès */
  --tmk-red:         #c0392b;     /* erreur / refus */
  --tmk-blue-soft:   #e8edf7;     /* fond doux navy */
  --tmk-orange-soft: #fdece6;     /* fond doux orange */

  --bg:              #f5f6fa;     /* fond app */
  --bg-card:         #ffffff;
  --bg-muted:        #f0f2f7;
  --border:          #e1e5ee;
  --border-strong:   #c7cee0;
  --text:            #1a2236;
  --text-muted:      #6b7280;
  --text-soft:       #9aa0b1;

  --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);
  --shadow:    0 4px 12px rgba(15,23,42,.08), 0 1px 3px rgba(15,23,42,.06);
  --shadow-lg: 0 12px 32px rgba(15,23,42,.12), 0 4px 12px rgba(15,23,42,.08);

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;

  --font-sans:    'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--font-sans);
  font-size:14.5px;
  line-height:1.55;
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
h1,h2,h3,h4{margin:0;line-height:1.25;color:var(--tmk-navy-3)}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.01em}
h2{font-size:1.25rem;font-weight:700}
h3{font-size:1.05rem;font-weight:700}
h4{font-size:.95rem;font-weight:700}
p{margin:.5rem 0}
a{color:var(--tmk-navy);text-decoration:none}
a:hover{color:var(--tmk-orange)}

/* ============================================================
   ÉCRAN DE CONNEXION
   ============================================================ */
.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  background:
    radial-gradient(circle at 15% 0%, rgba(242,103,73,.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 100%, rgba(26,46,92,.08) 0%, transparent 50%),
    linear-gradient(135deg, #f5f6fa 0%, #e8edf7 100%);
}
.login-card{
  width:100%;
  max-width:480px;
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:2.5rem 2.25rem;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:"";
  position:absolute; top:0; left:0; right:0; height:6px;
  background:linear-gradient(90deg, var(--tmk-navy) 0%, var(--tmk-orange) 100%);
}
.login-logo{
  display:flex; align-items:center; justify-content:center; gap:.6rem;
  margin-bottom:1.5rem;
}
.login-logo .badge{
  font-family:var(--font-display);
  font-size:1.6rem;
  font-weight:400;
  letter-spacing:.02em;
  color:var(--tmk-navy);
}
.login-logo .badge .accent{color:var(--tmk-orange)}
.login-subtitle{
  text-align:center;
  color:var(--text-muted);
  font-size:.92rem;
  margin-bottom:2rem;
}
.role-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.85rem;
  margin-bottom:1.5rem;
}
.role-btn{
  border:2px solid var(--border);
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:1.1rem .8rem;
  text-align:center;
  transition:all .18s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
  font-weight:600;
  font-size:.92rem;
  color:var(--text);
}
.role-btn .role-icon{
  font-size:1.6rem;
  line-height:1;
}
.role-btn:hover{
  border-color:var(--tmk-navy);
  transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.role-btn.active{
  border-color:var(--tmk-navy);
  background:var(--tmk-navy);
  color:#fff;
}
.role-btn.active.formateur{
  border-color:var(--tmk-orange);
  background:var(--tmk-orange);
}
.form-field{margin-bottom:1rem}
.form-field label{
  display:block;
  font-size:.82rem;
  font-weight:600;
  color:var(--text-muted);
  margin-bottom:.35rem;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.form-field input, .form-field textarea, .form-field select{
  width:100%;
  padding:.7rem .85rem;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  background:#fff;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.form-field input:focus, .form-field textarea:focus, .form-field select:focus{
  border-color:var(--tmk-navy);
  box-shadow:0 0 0 3px rgba(26,46,92,.12);
}
.btn-primary{
  width:100%;
  padding:.85rem 1rem;
  border:none;
  border-radius:var(--radius-sm);
  background:var(--tmk-navy);
  color:#fff;
  font-weight:700;
  font-size:.95rem;
  letter-spacing:.01em;
  transition:background .15s, transform .1s;
}
.btn-primary:hover{background:var(--tmk-navy-2)}
.btn-primary:active{transform:scale(.98)}
.btn-primary.orange{background:var(--tmk-orange)}
.btn-primary.orange:hover{background:var(--tmk-orange-2)}
.login-footer{
  margin-top:1.5rem;
  text-align:center;
  font-size:.78rem;
  color:var(--text-soft);
}

/* ============================================================
   APP - HEADER + NAVIGATION
   ============================================================ */
.app{display:none}
.app.visible{display:block}

.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:var(--shadow-sm);
}
.app-header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.65rem 1.5rem;
  max-width:1480px;
  margin:0 auto;
}
.brand{
  display:flex;align-items:center;gap:.6rem;
}
.brand-mark{
  font-family:var(--font-display);
  font-size:1.35rem;
  color:var(--tmk-navy);
}
.brand-mark .accent{color:var(--tmk-orange)}
.brand-tagline{
  font-size:.72rem;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  border-left:1px solid var(--border);
  padding-left:.7rem;
  margin-left:.2rem;
}
.user-chip{
  display:flex;align-items:center;gap:.7rem;
  font-size:.88rem;
}
.user-chip .who{
  display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;
}
.user-chip .who strong{color:var(--tmk-navy-3);font-weight:700;font-size:.9rem}
.user-chip .who small{color:var(--text-muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;
}
.avatar.formateur{background:linear-gradient(135deg, var(--tmk-orange) 0%, var(--tmk-yellow) 100%)}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.45rem .75rem;
  color:var(--text-muted);
  font-size:.82rem;
  font-weight:600;
  transition:all .15s;
}
.btn-ghost:hover{
  background:var(--bg-muted);
  color:var(--tmk-navy);
  border-color:var(--border-strong);
}

.app-nav{
  background:var(--tmk-navy-3);
  color:#fff;
}
.app-nav-inner{
  display:flex;
  gap:0;
  max-width:1480px;
  margin:0 auto;
  padding:0 1.5rem;
  overflow-x:auto;
}
.nav-tab{
  background:transparent;
  border:none;
  color:rgba(255,255,255,.7);
  padding:.85rem 1.1rem;
  font-size:.88rem;
  font-weight:600;
  position:relative;
  white-space:nowrap;
  transition:color .15s;
  border-bottom:3px solid transparent;
}
.nav-tab:hover{color:#fff}
.nav-tab.active{
  color:#fff;
  border-bottom-color:var(--tmk-orange);
}

.app-main{
  max-width:1480px;
  margin:0 auto;
  padding:1.5rem;
}

/* ============================================================
   COMPOSANTS GENERAUX
   ============================================================ */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem;
  box-shadow:var(--shadow-sm);
}
.card.no-pad{padding:0}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
  gap:1rem;
  flex-wrap:wrap;
}
.card-header h2{font-size:1.08rem}
.section-title{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text-muted);
  font-weight:700;
  margin:0 0 .65rem;
}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.5rem .85rem;
  background:var(--tmk-navy);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-weight:600;font-size:.85rem;
  transition:all .15s;
}
.btn:hover{background:var(--tmk-navy-2)}
.btn.orange{background:var(--tmk-orange)}
.btn.orange:hover{background:var(--tmk-orange-2)}
.btn.outline{
  background:transparent;color:var(--tmk-navy);border:1px solid var(--tmk-navy);
}
.btn.outline:hover{background:var(--tmk-blue-soft)}
.btn.danger{background:var(--tmk-red)}
.btn.danger:hover{background:#a93226}
.btn.sm{padding:.35rem .6rem;font-size:.78rem}
.btn[disabled]{opacity:.5;cursor:not-allowed}

.badge-pill{
  display:inline-block;
  font-size:.72rem;font-weight:700;
  padding:.18rem .55rem;
  border-radius:999px;
  text-transform:uppercase;letter-spacing:.04em;
}
.pill-navy{background:var(--tmk-blue-soft);color:var(--tmk-navy)}
.pill-orange{background:var(--tmk-orange-soft);color:var(--tmk-orange-2)}
.pill-green{background:#e6f6f1;color:var(--tmk-green)}
.pill-yellow{background:#fef4e0;color:#b8860b}
.pill-grey{background:var(--bg-muted);color:var(--text-muted)}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:960px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
}

.kpi{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem 1.1rem;
  display:flex;flex-direction:column;gap:.25rem;
  position:relative;overflow:hidden;
}
.kpi::before{
  content:"";position:absolute;top:0;left:0;height:100%;width:4px;
  background:var(--tmk-navy);
}
.kpi.orange::before{background:var(--tmk-orange)}
.kpi.green::before{background:var(--tmk-green)}
.kpi.yellow::before{background:var(--tmk-yellow)}
.kpi-label{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700}
.kpi-value{font-size:1.7rem;font-weight:800;color:var(--tmk-navy-3);line-height:1}
.kpi-sub{font-size:.78rem;color:var(--text-muted)}

/* Tables */
table.table{
  width:100%;
  border-collapse:collapse;
  font-size:.88rem;
}
table.table th{
  text-align:left;
  font-weight:700;
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--text-muted);
  padding:.55rem .75rem;
  border-bottom:2px solid var(--border);
  background:var(--bg-muted);
}
table.table td{
  padding:.65rem .75rem;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
table.table tr:hover td{background:#fafbff}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(2px);
  display:none;
  align-items:center;justify-content:center;
  z-index:200;
  padding:1rem;
}
.modal-backdrop.visible{display:flex}
.modal{
  background:#fff;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  width:100%;
  max-width:720px;
  max-height:90vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.modal.large{max-width:1080px}
.modal.small{max-width:460px}
.modal-head{
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
}
.modal-head h3{font-size:1.05rem}
.modal-close{
  background:transparent;border:none;
  font-size:1.5rem;line-height:1;color:var(--text-muted);
  cursor:pointer;padding:.2rem .4rem;border-radius:var(--radius-sm);
}
.modal-close:hover{background:var(--bg-muted);color:var(--tmk-navy)}
.modal-body{
  padding:1.25rem;
  overflow-y:auto;
  flex:1;
}
.modal-foot{
  padding:1rem 1.25rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:.6rem;
  background:var(--bg-muted);
}

/* Toast */
.toast-zone{
  position:fixed;
  bottom:1.5rem;right:1.5rem;
  z-index:300;
  display:flex;flex-direction:column;gap:.5rem;
  pointer-events:none;
}
.toast{
  background:var(--tmk-navy-3);
  color:#fff;
  padding:.7rem 1.1rem;
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  font-size:.88rem;
  font-weight:500;
  animation:slideIn .25s ease;
  max-width:340px;
  pointer-events:auto;
  display:flex;align-items:center;gap:.5rem;
}
.toast.success{background:var(--tmk-green)}
.toast.error{background:var(--tmk-red)}
.toast.warn{background:var(--tmk-yellow);color:#3a2a00}
@keyframes slideIn{
  from{transform:translateX(20px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

/* ============================================================
   ACCUEIL STAGIAIRE
   ============================================================ */
.welcome-banner{
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;
  border-radius:var(--radius-lg);
  padding:1.75rem 2rem;
  margin-bottom:1.5rem;
  position:relative;
  overflow:hidden;
}
.welcome-banner::after{
  content:"";
  position:absolute;
  top:-30px;right:-30px;
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(242,103,73,.25) 0%, transparent 70%);
}
.welcome-banner h1{color:#fff;margin-bottom:.4rem}
.welcome-banner p{margin:0;color:rgba(255,255,255,.85);font-size:.95rem;max-width:680px;position:relative;z-index:1}
.welcome-banner .actions{margin-top:1.1rem;display:flex;gap:.6rem;flex-wrap:wrap;position:relative;z-index:1}
.welcome-banner .btn{background:#fff;color:var(--tmk-navy);font-weight:700}
.welcome-banner .btn:hover{background:var(--tmk-orange-soft);color:var(--tmk-orange-2)}
.welcome-banner .btn.orange{background:var(--tmk-orange);color:#fff}
.welcome-banner .btn.orange:hover{background:var(--tmk-orange-2)}

/* Grid d'activités */
.activity-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1rem;
  margin-bottom:1.25rem;
}
.activity-tile{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem 1.1rem;
  text-align:left;
  cursor:pointer;
  transition:all .18s ease;
  display:flex;flex-direction:column;gap:.5rem;
  position:relative;overflow:hidden;
  min-height:130px;
}
.activity-tile::before{
  content:"";
  position:absolute;
  bottom:-30px;right:-30px;
  width:90px;height:90px;border-radius:50%;
  background:var(--tmk-blue-soft);
  transition:all .18s ease;
  z-index:0;
}
.activity-tile:hover{
  border-color:var(--tmk-navy);
  transform:translateY(-3px);
  box-shadow:var(--shadow);
}
.activity-tile:hover::before{background:var(--tmk-orange-soft);transform:scale(1.4)}
.activity-tile > *{position:relative;z-index:1}
.activity-tile .num{
  font-family:var(--font-display);
  font-size:1.7rem;
  color:var(--tmk-navy);
  line-height:1;
}
.activity-tile.active-tile{border-color:var(--tmk-orange);background:var(--tmk-orange-soft)}
.activity-tile.active-tile::before{background:rgba(242,103,73,.22)}
.activity-tile h4{color:var(--tmk-navy-3)}
.activity-tile small{color:var(--text-muted);font-size:.8rem}

/* ============================================================
   CRM - SIMULATION D'APPEL
   ============================================================ */
.crm{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:1rem;
  align-items:start;
}
@media(max-width:1100px){
  .crm{grid-template-columns:1fr}
}
.crm-aside{
  position:sticky;top:5rem;
}
.client-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.client-card-head{
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;padding:1rem 1.1rem;
}
.client-card-head .ref{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.7);font-weight:700;
}
.client-card-head h3{
  color:#fff;font-size:1.1rem;margin-top:.15rem;
}
.client-card-head .society{
  color:rgba(255,255,255,.85);font-size:.85rem;
}
.client-card-body{
  padding:1rem 1.1rem;
}
.field-row{
  display:flex;justify-content:space-between;
  padding:.4rem 0;
  border-bottom:1px dashed var(--border);
  font-size:.85rem;
}
.field-row:last-child{border-bottom:none}
.field-row .lbl{color:var(--text-muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.field-row .val{color:var(--text);text-align:right;font-weight:500;max-width:62%;word-break:break-word}
.field-row .val.mono{font-variant-numeric:tabular-nums}

.action-bar{
  display:flex;flex-wrap:wrap;gap:.4rem;
  padding:.85rem 1.1rem;
  border-top:1px solid var(--border);
  background:var(--bg-muted);
}

/* History timeline */
.timeline{
  list-style:none;padding:0;margin:0;
  position:relative;
}
.timeline::before{
  content:"";position:absolute;left:11px;top:6px;bottom:6px;
  width:2px;background:var(--border);
}
.timeline li{
  position:relative;
  padding:.4rem 0 .8rem 2.2rem;
  font-size:.88rem;
}
.timeline li::before{
  content:"";
  position:absolute;left:5px;top:.55rem;
  width:14px;height:14px;border-radius:50%;
  background:var(--tmk-navy);
  border:3px solid #fff;
  box-shadow:0 0 0 1px var(--border);
}
.timeline li.new::before{background:var(--tmk-orange)}
.timeline .when{
  font-size:.74rem;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
}
.timeline .what{display:block;color:var(--text);margin-top:.1rem}
.timeline .who-edit{font-size:.72rem;color:var(--text-soft);margin-top:.1rem}
.timeline-empty{
  text-align:center;padding:1.25rem;color:var(--text-muted);
  background:var(--bg-muted);border-radius:var(--radius-sm);
  font-size:.85rem;font-style:italic;
}

/* Mission box */
.mission-box{
  background:linear-gradient(135deg, var(--tmk-orange-soft) 0%, #fff5ed 100%);
  border:1px solid #f9c4b3;
  border-left:4px solid var(--tmk-orange);
  border-radius:var(--radius);
  padding:1rem 1.1rem;
  margin-bottom:1rem;
}
.mission-box h4{
  font-size:.78rem;color:var(--tmk-orange-2);
  text-transform:uppercase;letter-spacing:.05em;
  margin-bottom:.4rem;
}
.mission-box p{margin:0;color:var(--tmk-navy-3);font-size:.92rem;line-height:1.55}

/* Tabs (sub-tabs inside main panel) */
.subtabs{
  display:flex;gap:.25rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1rem;
}
.subtab{
  background:transparent;border:none;
  padding:.6rem .9rem;
  font-size:.85rem;font-weight:600;
  color:var(--text-muted);
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all .15s;
}
.subtab:hover{color:var(--tmk-navy)}
.subtab.active{
  color:var(--tmk-navy);
  border-bottom-color:var(--tmk-orange);
}

/* ============================================================
   FORM-LIKE INPUTS in panels
   ============================================================ */
.input-row{display:flex;gap:.5rem;align-items:flex-start;flex-wrap:wrap}
.input-row > *{flex:1;min-width:0}
textarea{min-height:80px;resize:vertical}
.well{
  background:var(--bg-muted);
  border-radius:var(--radius-sm);
  padding:1rem;
}

/* Checkbox / radio group */
.checkbox-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:.5rem;
}
.checkbox-grid label{
  display:flex;align-items:center;gap:.5rem;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.55rem .75rem;
  font-size:.85rem;cursor:pointer;
  transition:all .12s;
}
.checkbox-grid label:hover{border-color:var(--tmk-navy)}
.checkbox-grid input[type=checkbox]:checked + span{font-weight:700;color:var(--tmk-navy)}

/* ============================================================
   ADMIN (formateur) - TABLES + EDITION
   ============================================================ */
.admin-toolbar{
  display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;
  margin-bottom:1rem;
}
.admin-toolbar .search{
  flex:1;min-width:200px;
  padding:.55rem .85rem;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  font-size:.88rem;
}
.admin-toolbar .search:focus{
  outline:none;border-color:var(--tmk-navy);box-shadow:0 0 0 3px rgba(26,46,92,.12);
}

.admin-table-wrap{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
}
.admin-table-wrap .scroll{
  max-height:65vh;overflow:auto;
}

.row-actions{display:flex;gap:.3rem}
.icon-btn{
  background:transparent;border:1px solid transparent;
  padding:.3rem .5rem;border-radius:var(--radius-sm);
  font-size:.78rem;font-weight:600;
  color:var(--text-muted);cursor:pointer;
}
.icon-btn:hover{background:var(--bg-muted);color:var(--tmk-navy)}
.icon-btn.danger:hover{background:#fdecea;color:var(--tmk-red)}

/* ============================================================
   PRINT (PDF generation)
   ============================================================ */
@media print{
  .no-print{display:none !important}
  body{background:#fff;font-size:11pt}
  .print-only{display:block !important}
  .print-page{
    page-break-after:always;
    padding:1cm;
    max-width:none;
  }
  .print-page:last-child{page-break-after:auto}
  h1{font-size:18pt}
  h2{font-size:13pt}
  h3{font-size:11pt}
}
.print-only{display:none}
.print-page{padding:1.5cm;background:#fff;max-width:21cm;margin:0 auto;border:1px solid var(--border)}
.print-header{

  border-bottom:3px solid var(--tmk-navy);
  padding-bottom:.6rem;margin-bottom:1rem;
}
.print-header .brand-mark{font-size:1.4rem}
.print-meta{
  font-size:.78rem;color:var(--text-muted);text-align:right;
}
.print-section{margin-bottom:1.1rem}
.print-section h3{

  font-size:.95rem;
  margin-bottom:.5rem;
}
.print-section .info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.5rem;
  font-size:.92rem;
}
.print-section .info-grid div span:first-child{
  font-weight:700;color:var(--tmk-navy);
  display:inline-block;min-width:130px;
}
.print-section .narrative{
  background:var(--bg-muted);
  padding:.7rem .9rem;border-radius:var(--radius-sm);
  font-size:.92rem;
  white-space:pre-wrap;line-height:1.55;
}
.print-section .narrative.role{
  background:var(--tmk-orange-soft);
  border-left:4px solid var(--tmk-orange);
}

/* ============================================================
   MANUAL d'utilisation
   ============================================================ */
.manual-toc{
  background:var(--bg-muted);
  padding:1rem 1.25rem;border-radius:var(--radius);
  margin-bottom:1.25rem;
}
.manual-toc ul{margin:.4rem 0 0;padding-left:1.2rem}
.manual-toc a{font-weight:600}
.manual section{margin-bottom:1.5rem}
.manual h2{
  border-bottom:2px solid var(--tmk-orange);

}
.manual h3{margin-top:1rem;color:var(--tmk-navy)}
.manual .keybox{

  border-radius:var(--radius-sm);margin:.6rem 0;
  font-size:.9rem;
}
.manual ol li,.manual ul li{margin:.25rem 0}

/* ============================================================
   UTIL
   ============================================================ */
.text-muted{color:var(--text-muted)}
.text-small{font-size:.82rem}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}

.flex{display:flex}.between{justify-content:space-between}.center{align-items:center}

.hide{display:none !important}

}
.empty .ico{font-size:2.6rem;opacity:.4;margin-bottom:.5rem}

function loadStore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      // 1ère initialisation : on copie la seed
      const fresh = structuredClone(SEED_DATA);
      fresh.sessions = []; // historique des appels joués
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
      return fresh;
    }
    const data = JSON.parse(raw);
    if(!data.sessions) data.sessions = [];
    return data;
  }catch(e){
    console.error("loadStore", e);
    const fresh = structuredClone(SEED_DATA);
    fresh.sessions = [];
    return fresh;
  }
}

/* ---------------- HELPERS ------------------------------- */
const $ = (sel, root) => (root||document).querySelector(sel);
const $$ = (sel, root) => Array.from((root||document).querySelectorAll(sel));

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k === "class") e.className = v;
    else if(k === "html") e.innerHTML = v;
    else if(k === "text") e.textContent = v;
    else if(k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if(v !== null && v !== undefined && v !== false) e.setAttribute(k, v);
  }
  for(const c of children){
    if(c == null || c === false) continue;
    if(Array.isArray(c)) c.forEach(cc=>cc && e.appendChild(typeof cc==="string"?document.createTextNode(cc):cc));
    else if(typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function nl2br(s){
  return escapeHtml(s).replace(/\n/g, "<br>");
}
function fmtMoney(n){
  if(n==null||n==="") return "—";
  const v = typeof n === "number" ? n : parseFloat(n);
  if(isNaN(v)) return "—";
  return v.toLocaleString("fr-FR", {minimumFractionDigits:2, maximumFractionDigits:2}) + " €";
}
function fmtDate(s){
  if(!s) return "—";
  // déjà au format JJ/MM/AAAA ?
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  return s;
}
function todayFr(){
  const d = new Date();
  return String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + d.getFullYear();
}
function nowTimeFr(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function initials(name){
  if(!name) return "??";
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join("");
}
function fullName(c){
  return [c.civilite, c.prenom, c.nom].filter(Boolean).join(" ").trim();
}
function societe(c){
  return c.raison_sociale && c.raison_sociale.trim() ? c.raison_sociale : "Particulier";
}

function toast(msg, type="info"){
  const t = el("div", {class:"toast " + (type||"")}, msg);
  $("#toastZone").appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(20px)";t.style.transition="all .3s";setTimeout(()=>t.remove(),300)}, 3000);
}

function openModal({title, body, foot, size}){
  const m = $("#modal");
  const box = $("#modalBox");
  box.classList.remove("large","small");
  if(size) box.classList.add(size);
  $("#modalTitle").textContent = title || "";
  const b = $("#modalBody");
  b.innerHTML = "";
  if(typeof body === "string") b.innerHTML = body;
  else if(body) b.appendChild(body);
  const f = $("#modalFoot");
  f.innerHTML = "";
  if(foot){
    if(typeof foot === "string") f.innerHTML = foot;
    else if(Array.isArray(foot)) foot.forEach(b=>b && f.appendChild(b));
    else f.appendChild(foot);
  }else{
    f.appendChild(el("button",{class:"btn outline", type:"button", onclick:closeModal}, "Fermer"));
  }
  m.classList.add("visible");
}
function closeModal(){
  $("#modal").classList.remove("visible");
}
$("#modal").addEventListener("click", e => {
  if(e.target.id === "modal") closeModal();
});

function confirmDialog(question, onConfirm){
  openModal({
    title:"Confirmer",
    body: el("p", {}, question),
    size:"small",
    foot: [
      el("button",{class:"btn outline", type:"button", onclick:closeModal}, "Annuler"),
      el("button",{class:"btn danger", type:"button", onclick: ()=>{closeModal(); onConfirm();}}, "Confirmer"),
    ]
  });
}

function setupLogin(){
  $$(".role-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      $$(".role-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      const role = btn.dataset.role;
      $("#formateurPwdField").style.display = role === "formateur" ? "block" : "none";
      $("#loginScreen").dataset.role = role;
    });
  });

  // Default = stagiaire
  $$(".role-btn")[0].click();

  $("#btnLogin").addEventListener("click", doLogin);
  $("#loginName").addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
  $("#loginPwd").addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });

  $("#btnLogout").addEventListener("click", () => {
    STATE.user = null;
    STATE.currentCase = null;
    STATE.currentSession = null;
    $("#app").classList.remove("visible");
    $("#loginScreen").style.display = "flex";
    $("#loginName").value = "";
    $("#loginPwd").value = "";
  });
}

function doLogin(){
  const name = $("#loginName").value.trim();
  const role = $("#loginScreen").dataset.role || "stagiaire";
  if(!name){
    toast("Merci de saisir votre nom", "error");
    $("#loginName").focus();
    return;
  }
  if(role === "formateur"){
    const pwd = $("#loginPwd").value;
    if(pwd !== getFormateurPwd()){
      toast("Code formateur incorrect", "error");
      $("#loginPwd").focus();
      return;
    }
  }
  STATE.user = { name, role };
  $("#loginScreen").style.display = "none";
  $("#app").classList.add("visible");
  $("#userName").textContent = name;
  $("#userRole").textContent = role === "formateur" ? "Formateur" : "Stagiaire";
  $("#userAvatar").textContent = initials(name);
  $("#userAvatar").classList.toggle("formateur", role === "formateur");
  buildNav();
  navigateTo(role === "formateur" ? "tableau" : "accueil");
}

function buildNav(){

  const nav = $("#navTabs");
  nav.innerHTML = "";
  tabs.forEach(t => {
    const b = el("button", {
      class:"nav-tab",
      "data-tab":t.id,
      type:"button",
      onclick: () => navigateTo(t.id),
      html: t.label,
    });
    nav.appendChild(b);
  });

function navigateTo(tabId){
  STATE.currentTab = tabId;
  $$(".nav-tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  const main = $("#mainView");
  main.innerHTML = "";
  // Render the right view
  const render = VIEWS[tabId];
  if(render){
    render(main);
  }else{
    main.innerHTML = "<p>Page introuvable.</p>";
  }
  // scroll top
  window.scrollTo(0,0);
}

/* Function used to launch a case from accueil */
function startCase(numAppel){
  const cas = STORE.cas.find(c => c.num_appel === numAppel);
  if(!cas){ toast("Cas introuvable", "error"); return; }
  const client = STORE.clients.find(c => c.ref === numAppel);
  if(!client){ toast("Fiche client introuvable pour ce cas", "error"); return; }

  // Create a session
  STATE.currentCase = numAppel;
  STATE.currentSession = {
    id: "S" + Date.now(),
    stagiaire: STATE.user.name,
    case_ref: numAppel,
    competence: client.competence,
    started_at: new Date().toISOString(),
    historisation: [], // {date, action, comment}
    productions: {},   // {mail, sms, courrier, etc}
    finished: false,
  };
  navigateTo("crm");
}

/* === CRM = Simulation d'appel === */
VIEWS.crm = function(root){

/* Build the client info card (left aside in CRM) */
function buildClientCard(client, cas){
  const card = el("div", {class:"client-card"});
  const head = el("div", {class:"client-card-head"});
  head.innerHTML = `
    <div class="ref">Réf. ${escapeHtml(client.ref)} · ${escapeHtml(cas.activite_type==="I"?"Activité I":cas.activite_type==="II"?"Activité II":cas.activite_type)}</div>
    <h3>${escapeHtml(fullName(client))}</h3>
    <div class="society">${escapeHtml(societe(client))}${client.fonction?" · "+escapeHtml(client.fonction):""}</div>
  `;
  card.appendChild(head);

  const body = el("div", {class:"client-card-body"});
  function rowIf(label, val, opts){
    if(!val) return null;
    return el("div", {class:"field-row"}, [
      el("span", {class:"lbl"}, label),
      el("span", {class:"val" + ((opts&&opts.mono)?" mono":"")}, String(val)),
    ]);
  }
  [
    rowIf("Adresse facturation", client.adresse_f),
    rowIf("Code postal", client.cp_f, {mono:true}),
    rowIf("Ville", client.ville_f),
    rowIf("Tél fixe", client.fixe_1, {mono:true}),
    rowIf("Mobile", client.portable_1, {mono:true}),
    rowIf("E-mail", client.mail_1),
    rowIf("Ancienneté", client.anciennete),
    client.nom_2 ? rowIf("Contact 2", `${client.civilite||""} ${client.prenom_2||""} ${client.nom_2}`.trim()) : null,
    client.fonction_2 ? rowIf("Fonction contact 2", client.fonction_2) : null,
    client.adresse_l ? rowIf("Adresse livraison", client.adresse_l) : null,
    client.cp_l ? rowIf("CP livraison", client.cp_l, {mono:true}) : null,
    client.ville_l ? rowIf("Ville livraison", client.ville_l) : null,
    client.fixe_2 ? rowIf("Tél fixe 2", client.fixe_2, {mono:true}) : null,
    client.portable_2 ? rowIf("Mobile 2", client.portable_2, {mono:true}) : null,
    client.mail_2 ? rowIf("E-mail 2", client.mail_2) : null,
    rowIf("Compétence ciblée", client.competence),
  ].filter(Boolean).forEach(r => body.appendChild(r));

  card.appendChild(body);

  // Action bar
  const actBar = el("div", {class:"action-bar"});
  actBar.innerHTML = `
    <button class="btn sm" type="button" onclick="navigator.clipboard&&navigator.clipboard.writeText('${escapeHtml(client.fixe_1||client.portable_1||"")}')">📋 Copier le tel</button>
    <button class="btn sm outline" type="button" onclick="navigator.clipboard&&navigator.clipboard.writeText('${escapeHtml(client.mail_1||"")}')">📧 Copier le mail</button>
  `;
  card.appendChild(actBar);

  return card;
}

/* End the current session */
function endSession(showDialog){
  const s = STATE.currentSession;
  if(!s) return;
  s.finished = true;
  s.ended_at = new Date().toISOString();
  // duration in minutes
  s.duration_min = Math.round((new Date(s.ended_at) - new Date(s.started_at))/60000);
  // Save to STORE
  STORE.sessions.push(structuredClone(s));
  saveStore();
  if(showDialog){
    openModal({
      title:"✅ Session enregistrée",
      body: el("div", {}, [
        el("p", {}, "Votre simulation a bien été enregistrée."),
        el("p", {class:"text-muted text-small"}, `Durée : ${s.duration_min} min · ${s.historisation.length} historisations · ${Object.values(s.productions).filter(Boolean).filter(p=>p.body||p.subject).length} production(s) écrite(s)`),
        el("p", {}, "Vous pouvez maintenant retourner à l'accueil pour choisir un autre cas, ou imprimer un récapitulatif PDF."),
      ]),
      foot: [
        el("button", {class:"btn outline", type:"button", onclick: () => { closeModal(); printSession(); }}, "🖨️ Imprimer le récap"),
        el("button", {class:"btn orange", type:"button", onclick: () => {
          closeModal();
          STATE.currentCase = null;
          STATE.currentSession = null;
          navigateTo("accueil");
        }}, "Retour à l'accueil"),
      ]
    });
  }
}

/* Print the current session as a recap */
function printSession(){
  if(!STATE.currentSession) return;
  buildSessionPrintable(STATE.currentSession);
  setTimeout(()=>window.print(), 200);
}

function buildSessionPrintable(s){
  // Remove any existing print zone
  $$(".print-zone").forEach(x=>x.remove());
  const cas = STORE.cas.find(c => c.num_appel === s.case_ref);
  const client = STORE.clients.find(c => c.ref === s.case_ref);
  const zone = el("div", {class:"print-only print-zone"});
  const page = el("div", {class:"print-page"});

  page.innerHTML = `
    <div class="print-header">
      <div class="brand-mark"><strong style="color:#1a2e5c">TMK</strong> <span style="color:#f26749">Performances</span></div>
      <div class="print-meta">
        <strong>Récapitulatif de session</strong><br>
        Stagiaire : ${escapeHtml(s.stagiaire)}<br>
        Cas : ${escapeHtml(s.case_ref)} · ${escapeHtml(client ? fullName(client) : "")}<br>
        Date : ${todayFr()} · Durée : ${s.duration_min||0} min
      </div>
    </div>
    <div class="print-section">
      <h3>Compétence travaillée</h3>
      <div>${escapeHtml(s.competence||"—")}</div>
    </div>
    <div class="print-section">
      <h3>Mission du conseiller</h3>
      <div class="narrative">${nl2br(client && client.mission || "")}</div>
    </div>
    <div class="print-section">
      <h3>Historisation de l'appel (${s.historisation.length})</h3>
      ${s.historisation.length ?
        '<ol>' + s.historisation.map(h => `<li><strong>${escapeHtml(h.date)} ${escapeHtml(h.time)}</strong> — ${escapeHtml(h.action)}${h.comment?'<br><em>'+escapeHtml(h.comment)+'</em>':''}</li>`).join('') + '</ol>'
        : '<em>Aucune historisation saisie</em>'
      }
    </div>
    ${s.wrap_up ? `<div class="print-section"><h3>Wrap-up</h3><div class="narrative">${nl2br(s.wrap_up)}</div></div>` : ''}
    ${s.productions.mail && s.productions.mail.body ? `
      <div class="print-section">
        <h3>📧 E-mail</h3>
        <div class="narrative">
          <strong>De :</strong> ${escapeHtml(s.productions.mail.from||"")}<br>
          <strong>À :</strong> ${escapeHtml(s.productions.mail.to||"")}<br>
          <strong>Objet :</strong> ${escapeHtml(s.productions.mail.subject||"")}<br>
          <hr style="margin:.5rem 0">${nl2br(s.productions.mail.body)}
        </div>
      </div>
    ` : ''}
    ${s.productions.sms && s.productions.sms.body ? `
      <div class="print-section">
        <h3>📱 SMS</h3>
        <div class="narrative">À : ${escapeHtml(s.productions.sms.to||"")}<br><hr style="margin:.5rem 0">${nl2br(s.productions.sms.body)}</div>
      </div>
    ` : ''}
    ${s.productions.courrier && s.productions.courrier.body ? `
      <div class="print-section">
        <h3>✉️ Courrier</h3>
        <div class="narrative"><strong>Objet :</strong> ${escapeHtml(s.productions.courrier.subject||"")}<hr style="margin:.5rem 0">${nl2br(s.productions.courrier.body)}</div>
      </div>
    ` : ''}
  `;
  zone.appendChild(page);
  document.body.appendChild(zone);
}

VIEWS.catalogue = function(root){

  const byCat = {};

    const k = p.categorie || "Autre";

  });

  root.appendChild(el("h1", {class:"mb-2"}, "Catalogue On The Road"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, "Liste des produits et services proposés par On The Road. Tous les tarifs sont affichés en TTC."));

  const tb = el("div", {class:"admin-toolbar"});
  const search = el("input", {type:"text", class:"search", placeholder:"🔍 Rechercher une référence, désignation, marque..."});
  tb.appendChild(search);
  if(isFormateur){
    tb.appendChild(el("button", {class:"btn orange", type:"button", onclick: () => editProduit(null)}, "+ Nouveau produit"));
  }
  root.appendChild(tb);

  const wrap = el("div", {class:"admin-table-wrap"});
  const scroll = el("div", {class:"scroll"});
  const table = el("table", {class:"table"});
  table.innerHTML = `
    <thead>
      <tr>
        <th>Réf.</th>
        <th>Désignation</th>
        <th>Description / véhicule</th>
        <th>Catégorie</th>

        ${isFormateur?'<th></th>':''}
      </tr>
    </thead>
    <tbody id="catBody"></tbody>
  `;
  scroll.appendChild(table);
  wrap.appendChild(scroll);
  root.appendChild(wrap);

  function render(filter){
    const tbody = $("#catBody");
    tbody.innerHTML = "";
    const f = (filter||"").toLowerCase();
    let count = 0;
    STORE.catalogue.forEach(p => {
      const hay = (p.ref + " " + p.designation + " " + p.description + " " + p.categorie + " " + p.explications).toLowerCase();

      count++;

        <td>${escapeHtml(p.designation)}</td>
        <td><small class="text-muted">${escapeHtml(p.description||"")}</small></td>
        <td><span class="badge-pill ${
          p.categorie==="Pneumatique"?"pill-navy":
          p.categorie==="service"?"pill-green":
          p.categorie==="offre partenaires"?"pill-yellow":
          "pill-orange"
        }">${escapeHtml(p.categorie||"—")}</span></td>
        <td style="text-align:right;font-variant-numeric:tabular-nums">${p.ht!=null?fmtMoney(p.ht):"—"}</td>
        <td style="text-align:right;font-variant-numeric:tabular-nums"><strong>${p.ttc!=null?fmtMoney(p.ttc):"—"}</strong></td>
        ${isFormateur?'<td><div class="row-actions"><button class="icon-btn" type="button" data-edit="'+escapeHtml(p.ref)+'">✏️</button><button class="icon-btn danger" type="button" data-del="'+escapeHtml(p.ref)+'">🗑️</button></div></td>':''}
      `;
      tbody.appendChild(tr);
    });
    if(count === 0){
      tbody.appendChild(el("tr", {}, el("td", {colspan: isFormateur?"7":"6", class:"empty"}, "Aucun résultat")));
    }
    if(isFormateur){
      $$("[data-edit]").forEach(b => b.addEventListener("click", () => editProduit(b.dataset.edit)));
      $$("[data-del]").forEach(b => b.addEventListener("click", () => {
        const ref = b.dataset.del;
        confirmDialog(`Supprimer le produit ${ref} ?`, () => {
          STORE.catalogue = STORE.catalogue.filter(p => p.ref !== ref);
          saveStore();
          render(search.value);
          toast("Produit supprimé", "success");
        });
      }));
    }
  }
  search.addEventListener("input", () => render(search.value));
  render("");
};

function editProduit(ref){
  const isNew = !ref;
  const p = isNew ? { ref:"", designation:"", description:"", ht:null, ttc:null, categorie:"Pneumatique", explications:"" }
                  : structuredClone(STORE.catalogue.find(x => x.ref === ref));
  if(!p){ toast("Produit introuvable", "error"); return; }

  const form = el("div", {});
  form.innerHTML = `
    <div class="grid-2">
      <div class="form-field"><label>Référence *</label><input id="pRef" value="${escapeHtml(p.ref)}" ${isNew?'':'readonly'}></div>
      <div class="form-field"><label>Catégorie</label>
        <select id="pCat">
          <option ${p.categorie==="Pneumatique"?"selected":""}>Pneumatique</option>
          <option ${p.categorie==="service"?"selected":""}>service</option>
          <option ${p.categorie==="offre partenaires"?"selected":""}>offre partenaires</option>
          <option ${p.categorie==="Service +"?"selected":""}>Service +</option>
          <option ${p.categorie==="Autre"?"selected":""}>Autre</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Désignation *</label><input id="pDes" value="${escapeHtml(p.designation)}"></div>
    <div class="form-field"><label>Description / conditionnement</label><textarea id="pDsc">${escapeHtml(p.description||"")}</textarea></div>
    <div class="grid-2">
      <div class="form-field"><label>Prix HT (€)</label><input type="number" step="0.01" id="pHt" value="${p.ht!=null?p.ht:''}"></div>
      <div class="form-field"><label>Prix TTC (€)</label><input type="number" step="0.01" id="pTtc" value="${p.ttc!=null?p.ttc:''}"></div>
    </div>
    <div class="form-field"><label>Explications complémentaires (utile pour les stagiaires)</label><textarea id="pExp">${escapeHtml(p.explications||"")}</textarea></div>
  `;
  openModal({
    title: isNew?"Nouveau produit":"Modifier le produit "+p.ref,
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn", type:"button", onclick: () => {
        const newRef = $("#pRef").value.trim();
        const des = $("#pDes").value.trim();
        if(!newRef || !des){ toast("Référence et désignation obligatoires", "error"); return; }
        if(isNew && STORE.catalogue.find(x => x.ref === newRef)){
          toast("Cette référence existe déjà", "error"); return;
        }
        const updated = {
          ref: newRef,
          designation: des,
          description: $("#pDsc").value.trim(),
          ht: $("#pHt").value === "" ? null : parseFloat($("#pHt").value),
          ttc: $("#pTtc").value === "" ? null : parseFloat($("#pTtc").value),
          categorie: $("#pCat").value,
          explications: $("#pExp").value.trim(),
        };
        if(isNew) STORE.catalogue.push(updated);
        else {
          const idx = STORE.catalogue.findIndex(x => x.ref === ref);
          STORE.catalogue[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Produit ajouté":"Produit modifié", "success");
        navigateTo("catalogue");
      }}, "Enregistrer"),
    ]
  });
}

/* === CENTRES AGREES === */
VIEWS.centres = function(root){
  const isFormateur = STATE.user.role === "formateur";
  root.appendChild(el("h1", {class:"mb-2"}, "Centres agréés On The Road"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, `${STORE.centres.length} centres partenaires sur le territoire national qui assurent les livraisons et les prestations.`));

  // Group by region
  const regions = {};
  STORE.centres.forEach(c => {
    (regions[c.region] = regions[c.region]||[]).push(c);
  });

  const tb = el("div", {class:"admin-toolbar"});
  const search = el("input", {type:"text", class:"search", placeholder:"🔍 Rechercher (département, ville, nom)…"});
  tb.appendChild(search);
  root.appendChild(tb);

  const list = el("div", {});
  function render(filter){
    list.innerHTML = "";
    const f = (filter||"").toLowerCase();
    Object.keys(regions).sort().forEach(reg => {
      const matching = regions[reg].filter(c => {
        const hay = (c.departement+" "+c.nom+" "+c.ville+" "+c.adresse+" "+c.cp).toLowerCase();
        return !f || hay.includes(f);
      });
      if(matching.length === 0) return;
      const sec = el("div", {class:"card mb-2"});
      sec.appendChild(el("div", {class:"card-header"}, [
        el("h2", {}, "📍 " + reg),
        el("span", {class:"badge-pill pill-grey"}, matching.length + " centre" + (matching.length>1?"s":"")),
      ]));
      const t = el("table", {class:"table"});
      t.innerHTML = `<thead><tr><th>Dép.</th><th>Centre</th><th>Adresse</th><th>Ville</th><th>Téléphone</th></tr></thead>`;
      const tb = el("tbody");
      matching.forEach(c => {
        const tr = el("tr", {});
        tr.innerHTML = `<td><strong>${escapeHtml(c.departement)}</strong></td><td>${escapeHtml(c.nom)}</td><td>${escapeHtml(c.adresse)}</td><td>${escapeHtml(c.cp)} ${escapeHtml(c.ville)}</td><td>${escapeHtml(c.telephone)}</td>`;
        tb.appendChild(tr);
      });
      t.appendChild(tb);
      sec.appendChild(t);
      list.appendChild(sec);
    });
  }
  search.addEventListener("input", () => render(search.value));
  render("");
  root.appendChild(list);
};

  const competences = new Set(STORE.sessions.map(s => s.competence).filter(Boolean));
  const last7 = STORE.sessions.filter(s => {
    if(!s.started_at) return false;
    return (Date.now() - new Date(s.started_at).getTime()) < 7*24*3600*1000;
  });

  const kpis = el("div", {class:"grid-4 mb-3"});
  kpis.innerHTML = `
    <div class="kpi"><span class="kpi-label">Cas clients</span><span class="kpi-value">${STORE.cas.length}</span><span class="kpi-sub">briefs disponibles</span></div>

    <div class="kpi green"><span class="kpi-label">Sessions enregistrées</span><span class="kpi-value">${totalSessions}</span><span class="kpi-sub">${last7.length} sur 7 jours</span></div>
    <div class="kpi yellow"><span class="kpi-label">Stagiaires actifs</span><span class="kpi-value">${stagiaires.size}</span><span class="kpi-sub">${competences.size} compétences travaillées</span></div>
  `;
  root.appendChild(kpis);

  // Quick actions
  root.appendChild(el("h2", {class:"mb-2"}, "🚀 Actions rapides"));

  });

  if(totalSessions){
    root.appendChild(el("h2", {class:"mt-3 mb-2"}, "📊 Compétences travaillées par les stagiaires"));
    const byComp = {};
    STORE.sessions.forEach(s => {
      const k = s.competence || "Non défini";
      byComp[k] = (byComp[k]||0) + 1;
    });
    const card = el("div", {class:"card"});
    const list = el("div", {});
    Object.entries(byComp).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => {
      const max = Math.max(...Object.values(byComp));
      const pct = (v/max)*100;
      list.appendChild(el("div", {class:"mb-2"}, [
        el("div", {class:"flex between center mb-1"}, [
          el("strong", {}, k),
          el("span", {class:"badge-pill pill-navy"}, `${v} session${v>1?"s":""}`),

          el("div", {style:`height:100%;width:${pct}%;background:linear-gradient(90deg, var(--tmk-navy) 0%, var(--tmk-orange) 100%);border-radius:4px`})
        ),
      ]));
    });
    card.appendChild(list);
    root.appendChild(card);
  }
};

  root.appendChild(tb);

  const wrap = el("div", {class:"admin-table-wrap"});

  const table = el("table", {class:"table"});
  table.innerHTML = `
    <thead>

        <th>N°</th><th>Activité</th><th>Compétence / Canal</th><th>Client</th><th>Rôle joué</th><th></th>
      </tr>
    </thead>

  `;

  function render(){
    const f = (search.value||"").toLowerCase();
    const a = filterAct.value;
    const tbody = $("#casBody");
    tbody.innerHTML = "";

    STORE.cas.forEach(c => {
      const client = STORE.clients.find(cl => cl.ref === c.num_appel);
      const hay = (c.num_appel + " " + c.competence_canal + " " + c.role + " " + (client?fullName(client):"")).toLowerCase();
      if(f && !hay.includes(f)) return;
      if(a && c.activite_type !== a) return;
      count++;
      const tr = el("tr", {});
      tr.innerHTML = `
        <td><strong>${escapeHtml(c.num_appel)}</strong></td>
        <td><span class="badge-pill ${c.activite_type==="I"?"pill-navy":"pill-orange"}">${escapeHtml(c.activite_type)}</span></td>
        <td><small>${escapeHtml((c.competence_canal||"").split("\n").slice(0,2).join(" / ").substring(0,80))}…</small></td>

        <td>
          <div class="row-actions">
            <button class="icon-btn" type="button" data-edit="${escapeHtml(c.num_appel)}" title="Modifier">✏️</button>
            <button class="icon-btn" type="button" data-pdf="${escapeHtml(c.num_appel)}" title="Exporter PDF">📄</button>
            <button class="icon-btn danger" type="button" data-del="${escapeHtml(c.num_appel)}" title="Supprimer">🗑️</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
    if(count===0) tbody.appendChild(el("tr", {}, el("td", {colspan:"6", class:"empty"}, "Aucun cas correspondant")));
    $$("[data-edit]").forEach(b => b.addEventListener("click", () => editCas(b.dataset.edit)));
    $$("[data-pdf]").forEach(b => b.addEventListener("click", () => exportCasPdf(b.dataset.pdf)));
    $$("[data-del]").forEach(b => b.addEventListener("click", () => {
      confirmDialog(`Supprimer le cas ${b.dataset.del} ?`, () => {
        STORE.cas = STORE.cas.filter(x => x.num_appel !== b.dataset.del);
        saveStore();
        render();
        toast("Cas supprimé", "success");

    }));

  search.addEventListener("input", render);
  filterAct.addEventListener("change", render);
  render();
};

function editCas(num){
  const isNew = !num;
  const c = isNew ? { num_appel:"", activite_type:"I", competence_canal:"", role:"", objet:"", profil:"" }
                  : structuredClone(STORE.cas.find(x => x.num_appel === num));
  if(!c){ toast("Cas introuvable", "error"); return; }
  const linkedClient = STORE.clients.find(cl => cl.ref === c.num_appel);

  const form = el("div", {});
  form.innerHTML = `
    <div class="grid-2">
      <div class="form-field"><label>N° d'appel *</label><input id="cNum" value="${escapeHtml(c.num_appel)}" ${isNew?'':'readonly'} placeholder="ex : 5-01"></div>
      <div class="form-field"><label>Activité</label>
        <select id="cAct">
          <option value="I" ${c.activite_type==="I"?"selected":""}>I — Renseignement / accueil</option>
          <option value="II" ${c.activite_type==="II"?"selected":""}>II — Vente / fidélisation / recouvrement</option>
          <option value="III" ${c.activite_type==="III"?"selected":""}>III — Autre</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Compétence + canal (1 par ligne)</label><textarea id="cCompCan" rows="4" placeholder="- Réaliser des actions de prospection...&#10;- B to B&#10;- SMS / mail / chat...">${escapeHtml(c.competence_canal||"")}</textarea></div>
    <div class="form-field"><label>Rôle joué par le candidat-client *</label><textarea id="cRole" rows="3" placeholder="Ex : M. DUPONT. Vous contactez le service client de On the Road pour…">${escapeHtml(c.role||"")}</textarea></div>
    <div class="form-field"><label>Objet (produits, références, montants demandés)</label><textarea id="cObj" rows="2" placeholder="Ex : - PNEU 255/55R18 (4 unités) - PNEU 215/55R18 (2 unités)">${escapeHtml(c.objet||"")}</textarea></div>
    <div class="form-field"><label>Profil candidat (informations cachées du conseiller)</label><textarea id="cProfil" rows="4" placeholder="Ex : Vous êtes attentif aux promotions. Vous avez un budget de 600€ TTC…">${escapeHtml(c.profil||"")}</textarea></div>
    ${linkedClient ? `<div class="well mt-2"><strong>Fiche client liée :</strong> ${escapeHtml(fullName(linkedClient))} (réf. ${escapeHtml(linkedClient.ref)})</div>` 
      : `<div class="well mt-2" style="border-left:3px solid var(--tmk-orange)"><strong>⚠️ Aucune fiche client n'a la même référence</strong>. Pensez à créer la fiche dans l'onglet "Fiches clients" pour que ce cas soit jouable.</div>`}
  `;
  openModal({
    title: isNew?"Nouveau cas client":"Modifier le cas "+c.num_appel,
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn", type:"button", onclick: () => {
        const newNum = $("#cNum").value.trim();
        const role = $("#cRole").value.trim();
        if(!newNum || !role){ toast("N° et rôle obligatoires", "error"); return; }
        if(isNew && STORE.cas.find(x => x.num_appel === newNum)){
          toast("Ce numéro existe déjà", "error"); return;
        }
        const updated = {
          num_appel: newNum,
          activite_type: $("#cAct").value,
          competence_canal: $("#cCompCan").value.trim(),
          role: role,
          objet: $("#cObj").value.trim(),
          profil: $("#cProfil").value.trim(),
        };
        if(isNew) STORE.cas.push(updated);
        else {
          const idx = STORE.cas.findIndex(x => x.num_appel === num);
          STORE.cas[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Cas créé":"Cas modifié", "success");
        navigateTo("cas");
      }}, "Enregistrer"),
    ]
  });
}

      <div class="form-field"><label>Ville livraison</label><input id="fVilleL" value="${escapeHtml(c.ville_l||"")}"></div>
      <div class="form-field"><label>Cedex livraison</label><input id="fCedexL" value="${escapeHtml(c.cedex_l||"")}"></div>
    </div>
    <div class="grid-2">
      <div class="form-field"><label>Contact 2 — nom</label><input id="fNom2" value="${escapeHtml(c.nom_2||"")}"></div>
      <div class="form-field"><label>Contact 2 — prénom</label><input id="fPre2" value="${escapeHtml(c.prenom_2||"")}"></div>
    </div>
    <div class="grid-3">
      <div class="form-field"><label>Tél fixe 2</label><input id="fTel2" value="${escapeHtml(c.fixe_2||"")}"></div>
      <div class="form-field"><label>Mobile 2</label><input id="fMob2" value="${escapeHtml(c.portable_2||"")}"></div>
      <div class="form-field"><label>E-mail 2</label><input id="fMail2" value="${escapeHtml(c.mail_2||"")}"></div>
    </div>
  `;
  openModal({
    title: isNew?"Nouvelle fiche client":"Modifier "+c.ref+" — "+fullName(c),
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn", type:"button", onclick: () => {
        const newRef = $("#fRef").value.trim();
        const nom = $("#fNom").value.trim();
        if(!newRef || !nom){ toast("Référence et nom obligatoires", "error"); return; }
        if(isNew && STORE.clients.find(x => x.ref === newRef)){ toast("Cette référence existe déjà", "error"); return; }
        const v = (id) => $("#"+id).value.trim();
        const updated = {
          ref: newRef, civilite: v("fCiv"), nom, prenom: v("fPre"), raison_sociale: v("fRS"),
          fonction: v("fFon"), service:"",
          adresse_f: v("fAdr"), complement_adresse_f: v("fAdrC"), cp_f: v("fCP"), ville_f: v("fVille"), cedex_f: v("fCedex"),
          fixe_1: v("fTel"), portable_1: v("fMob"), mail_1: v("fMail"),
          nom_2: v("fNom2"), prenom_2: v("fPre2"), fonction_2: c.fonction_2||"",
          service_l:"", adresse_l: v("fAdrL"), complement_adresse_l: v("fAdrLC"),
          cp_l: v("fCPL"), ville_l: v("fVilleL"), cedex_l: v("fCedexL"),
          fixe_2: v("fTel2"), portable_2: v("fMob2"), mail_2: v("fMail2"),
          anciennete: v("fAnc"),
          mission: v("fMis"), competence: v("fCom"), montant_facture: v("fMon"),
        };
        for(let i=1;i<=6;i++){
          updated["evt"+i+"_date"] = v("fEd"+i);
          updated["evt"+i] = v("fEv"+i);
        }
        if(isNew) STORE.clients.push(updated);
        else {
          const idx = STORE.clients.findIndex(x => x.ref === ref);
          STORE.clients[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Fiche créée":"Fiche modifiée", "success");
        navigateTo("clients");
      }}, "Enregistrer"),
    ]
  });
}

/* === FORMATEUR : SESSIONS STAGIAIRES === */
VIEWS.sessions = function(root){
  root.appendChild(el("h1", {class:"mb-2"}, "Sessions stagiaires"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, `${STORE.sessions.length} session(s) enregistrée(s) sur ce poste.`));

  const tb = el("div", {class:"admin-toolbar"});
  const search = el("input", {type:"text", class:"search", placeholder:"🔍 Rechercher (stagiaire, cas, compétence)…"});
  tb.appendChild(search);
  tb.appendChild(el("button", {class:"btn outline", type:"button", onclick: () => {
    confirmDialog("Effacer toutes les sessions enregistrées ? Cette action est irréversible.", () => {
      STORE.sessions = [];
      saveStore();
      navigateTo("sessions");
      toast("Sessions effacées", "success");
    });
  }}, "🗑️ Tout effacer"));
  root.appendChild(tb);

  if(STORE.sessions.length === 0){
    root.appendChild(el("div", {class:"empty"}, [
      el("div", {class:"ico"}, "📞"),
      el("h4", {}, "Aucune session enregistrée pour le moment"),
      el("p", {}, "Les sessions de simulation des stagiaires s'afficheront ici."),
    ]));
    return;
  }

  const wrap = el("div", {class:"admin-table-wrap"});
  const scroll = el("div", {class:"scroll"});
  const table = el("table", {class:"table"});
  table.innerHTML = `
    <thead><tr><th>Stagiaire</th><th>Cas</th><th>Compétence</th><th>Début</th><th>Durée</th><th>Hist.</th><th>Prod.</th><th></th></tr></thead>
    <tbody id="sessBody"></tbody>
  `;
  scroll.appendChild(table);
  wrap.appendChild(scroll);
  root.appendChild(wrap);

  function render(){
    const f = (search.value||"").toLowerCase();
    const tbody = $("#sessBody");
    tbody.innerHTML = "";
    [...STORE.sessions].reverse().forEach((s, idx) => {
      const realIdx = STORE.sessions.length - 1 - idx;
      const hay = (s.stagiaire+" "+s.case_ref+" "+(s.competence||"")).toLowerCase();
      if(f && !hay.includes(f)) return;
      const dur = s.duration_min || 0;
      const date = s.started_at ? new Date(s.started_at).toLocaleString("fr-FR") : "—";
      const prods = Object.values(s.productions||{}).filter(p => p && (p.body || p.subject)).length;
      const tr = el("tr", {});
      tr.innerHTML = `
        <td><strong>${escapeHtml(s.stagiaire)}</strong></td>
        <td><span class="badge-pill pill-navy">${escapeHtml(s.case_ref)}</span></td>
        <td><small>${escapeHtml((s.competence||"—").substring(0,40))}</small></td>
        <td><small>${escapeHtml(date)}</small></td>
        <td>${dur} min</td>
        <td>${(s.historisation||[]).length}</td>
        <td>${prods}</td>
        <td><div class="row-actions">
          <button class="icon-btn" type="button" data-view="${realIdx}">👁️</button>
          <button class="icon-btn danger" type="button" data-del="${realIdx}">🗑️</button>
        </div></td>
      `;
      tbody.appendChild(tr);
    });
    $$("[data-view]").forEach(b => b.addEventListener("click", () => viewSession(parseInt(b.dataset.view))));
    $$("[data-del]").forEach(b => b.addEventListener("click", () => {
      const i = parseInt(b.dataset.del);
      confirmDialog("Supprimer cette session ?", () => {
        STORE.sessions.splice(i, 1);
        saveStore(); render(); toast("Session supprimée", "success");
      });
    }));
  }
  search.addEventListener("input", render);
  render();
};

function viewSession(idx){
  const s = STORE.sessions[idx];
  if(!s){ return; }
  const client = STORE.clients.find(c => c.ref === s.case_ref);
  const body = el("div", {});
  body.innerHTML = `
    <div class="grid-2 mb-2">
      <div><strong>Stagiaire :</strong> ${escapeHtml(s.stagiaire)}</div>
      <div><strong>Cas :</strong> ${escapeHtml(s.case_ref)} — ${escapeHtml(client?fullName(client):"")}</div>
      <div><strong>Durée :</strong> ${s.duration_min||0} min</div>
      <div><strong>Compétence :</strong> ${escapeHtml(s.competence||"—")}</div>
    </div>
    <h4 class="mb-1">📝 Historisation (${(s.historisation||[]).length})</h4>
    ${(s.historisation||[]).length ? '<ol>' + s.historisation.map(h => `<li><strong>${escapeHtml(h.date)} ${escapeHtml(h.time||"")}</strong> — ${escapeHtml(h.action)}${h.comment?'<br><em>'+escapeHtml(h.comment)+'</em>':''}</li>`).join('') + '</ol>' : '<em class="text-muted">Aucune historisation</em>'}
    ${s.wrap_up ? `<h4 class="mb-1 mt-2">🎬 Wrap-up</h4><div class="well">${nl2br(s.wrap_up)}</div>` : ''}
    ${(s.productions && s.productions.mail && s.productions.mail.body) ? `<h4 class="mb-1 mt-2">📧 E-mail</h4><div class="well"><strong>Objet :</strong> ${escapeHtml(s.productions.mail.subject||"")}<br><br>${nl2br(s.productions.mail.body)}</div>` : ''}
    ${(s.productions && s.productions.sms && s.productions.sms.body) ? `<h4 class="mb-1 mt-2">📱 SMS</h4><div class="well">${nl2br(s.productions.sms.body)}</div>` : ''}
    ${(s.productions && s.productions.courrier && s.productions.courrier.body) ? `<h4 class="mb-1 mt-2">✉️ Courrier</h4><div class="well"><strong>Objet :</strong> ${escapeHtml(s.productions.courrier.subject||"")}<br><br>${nl2br(s.productions.courrier.body)}</div>` : ''}
  `;
  openModal({
    title: "Session " + s.stagiaire + " · " + s.case_ref,
    body, size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: () => {
        // Export this session as PDF
        STATE.currentSession = s;
        buildSessionPrintable(s);
        setTimeout(()=>window.print(), 200);
      }}, "🖨️ Imprimer / PDF"),
      el("button", {class:"btn", type:"button", onclick: closeModal}, "Fermer"),
    ]
  });
}

/* === FORMATEUR : PARAMETRES === */
VIEWS.params = function(root){
  root.appendChild(el("h1", {class:"mb-2"}, "Paramètres"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, "Sauvegarde, import, code formateur et réinitialisation."));

  const grid = el("div", {class:"grid-2"});

  // Card: code formateur
  const c1 = el("div", {class:"card"});
  c1.innerHTML = `
    <div class="card-header"><h2>🔐 Code formateur</h2></div>
    <p class="text-muted text-small">Mot de passe demandé à la connexion en mode Formateur.</p>
    <div class="form-field"><label>Code actuel</label><input type="password" id="oldPwd"></div>
    <div class="form-field"><label>Nouveau code</label><input type="password" id="newPwd"></div>
    <button class="btn" type="button" id="btnChangePwd">Changer le code</button>
  `;
  grid.appendChild(c1);

  // Card: export / import
  const c2 = el("div", {class:"card"});
  c2.innerHTML = `
    <div class="card-header"><h2>💾 Sauvegarde</h2></div>
    <p class="text-muted text-small">Exportez ou importez l'ensemble de la base (catalogue, fiches, cas, sessions) au format JSON.</p>
    <div class="flex gap-1 mt-1">
      <button class="btn" type="button" id="btnExport">📥 Exporter en JSON</button>
      <label class="btn outline" style="cursor:pointer">📤 Importer un JSON
        <input type="file" id="fileImport" accept="application/json" style="display:none">
      </label>
    </div>
    <p class="text-small mt-2 text-muted">L'import remplace l'intégralité des données par celles du fichier importé.</p>
  `;
  grid.appendChild(c2);

  // Card: reset
  const c3 = el("div", {class:"card"});
  c3.innerHTML = `
    <div class="card-header"><h2>♻️ Réinitialiser</h2></div>
    <p class="text-muted text-small">Restaurer les données d'origine (catalogue, fiches et cas du fichier Excel initial).</p>
    <p class="text-small">⚠️ Toutes vos modifications, ajouts et sessions seront perdus.</p>
    <button class="btn danger" type="button" id="btnReset">Réinitialiser la base</button>
  `;
  grid.appendChild(c3);

  // Card: stats
  const c4 = el("div", {class:"card"});
  c4.innerHTML = `
    <div class="card-header"><h2>📊 Données actuelles</h2></div>
    <ul class="text-small">
      <li><strong>${STORE.cas.length}</strong> cas clients</li>
      <li><strong>${STORE.clients.length}</strong> fiches BDD</li>
      <li><strong>${STORE.catalogue.length}</strong> produits / services</li>
      <li><strong>${STORE.centres.length}</strong> centres agréés</li>
      <li><strong>${STORE.sessions.length}</strong> sessions enregistrées</li>
    </ul>
    <p class="text-small text-muted mt-2">Taille en localStorage : <strong>${Math.round(JSON.stringify(STORE).length/1024)} Ko</strong></p>
  `;
  grid.appendChild(c4);

  root.appendChild(grid);

  // Bind handlers
  $("#btnChangePwd").addEventListener("click", () => {
    const old = $("#oldPwd").value;
    const nw = $("#newPwd").value;
    if(old !== getFormateurPwd()){ toast("Code actuel incorrect", "error"); return; }
    if(nw.length < 4){ toast("Le nouveau code doit faire au moins 4 caractères", "error"); return; }
    setFormateurPwd(nw);
    $("#oldPwd").value = "";
    $("#newPwd").value = "";
    toast("Code formateur modifié", "success");
  });
  $("#btnExport").addEventListener("click", () => {
    const data = JSON.stringify(STORE, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tmk-otr-" + new Date().toISOString().substring(0,10) + ".json";
    a.click();
  });
  $("#fileImport").addEventListener("change", (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        if(!obj.cas || !obj.clients || !obj.catalogue){ toast("Fichier invalide", "error"); return; }
        confirmDialog("Remplacer toute la base par le contenu du fichier importé ?", () => {
          STORE = obj;
          if(!STORE.sessions) STORE.sessions = [];
          saveStore();
          toast("Base importée avec succès", "success");
          navigateTo("tableau");
        });
      }catch(err){
        toast("Fichier invalide", "error");
      }
    };
    reader.readAsText(f);
  });
  $("#btnReset").addEventListener("click", () => {
    confirmDialog("Réinitialiser la base aux données d'origine ? Toutes vos modifications seront perdues.", () => {
      const fresh = structuredClone(SEED_DATA);
      fresh.sessions = [];
      STORE = fresh;
      saveStore();
      toast("Base réinitialisée", "success");
      navigateTo("tableau");
    });
  });
};
