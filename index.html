function buildNav(){
  let tabs = STATE.user.role === "formateur" ? [...TABS_FORMATEUR] : TABS_STAGIAIRE;
  // Ajouter le tab Formateurs juste avant Paramètres pour l'admin
  if(STATE.user.role === "formateur" && STATE.user.isAdmin){
    const idxParams = tabs.findIndex(t => t.id === "params");
    const formateursTab = { id:"formateurs", label:"👨‍🏫 Formateurs" };
    if(idxParams >= 0){
      tabs.splice(idxParams, 0, formateursTab);
    } else {
      tabs.push(formateursTab);
    }
  }
  const nav = $("#navTabs");
  nav.innerHTML = "";
  tabs.forEach(t => {
    const b = el("button", {
      class:"nav-tab",
      "data-tab":t.id,
      type:"button",
      onclick: () => navigateTo(t.id),
      html: t.label,
    });
    nav.appendChild(b);
  });
}

function navigateTo(tabId){
  STATE.currentTab = tabId;
  $$(".nav-tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  const main = $("#mainView");
  main.innerHTML = "";
  // Render the right view
  const render = VIEWS[tabId];
  if(render){
    render(main);
  }else{
    main.innerHTML = "<p>Page introuvable.</p>";
  }
  // scroll top
  window.scrollTo(0,0);
}

/* Filtre les cas selon la journée choisie */
function filterCasByJournee(cas, journee){
  if(!journee || journee === "tout") return cas;
  const j = parseInt(journee);
  return cas.filter(c => (c.journee||1) === j);
}

/* Function used to launch a case from accueil */
function startCase(numAppel){
  const cas = STORE.cas.find(c => c.num_appel === numAppel);
  if(!cas){ toast("Cas introuvable", "error"); return; }
  const client = STORE.clients.find(c => c.ref === numAppel);
  if(!client){ toast("Fiche client introuvable pour ce cas", "error"); return; }

  // Create a session
  STATE.currentCase = numAppel;
  STATE.currentSession = {
    id: "S" + Date.now(),
    stagiaire: STATE.user.name,
    case_ref: numAppel,
    competence: client.competence,
    started_at: new Date().toISOString(),
    historisation: [], // {date, action, comment}
    productions: {},   // {mail, sms, courrier, etc}
    finished: false,
  };
  navigateTo("crm");
}

/* Build the client info card (left aside in CRM) */
function buildClientCard(client, cas){
  const card = el("div", {class:"client-card"});
  const head = el("div", {class:"client-card-head"});
  head.innerHTML = `
    <div class="ref">Réf. ${escapeHtml(client.ref)} · ${escapeHtml(cas.activite_type==="I"?"Activité I":cas.activite_type==="II"?"Activité II":cas.activite_type)}</div>
    <h3>${escapeHtml(fullName(client))}</h3>
    <div class="society">${escapeHtml(societe(client))}${client.fonction?" · "+escapeHtml(client.fonction):""}</div>
  `;
  card.appendChild(head);

  const body = el("div", {class:"client-card-body"});
  function rowIf(label, val, opts){
    if(!val) return null;
    return el("div", {class:"field-row"}, [
      el("span", {class:"lbl"}, label),
      el("span", {class:"val" + ((opts&&opts.mono)?" mono":"")}, String(val)),
    ]);
  }
  [
    rowIf("Adresse facturation", client.adresse_f),
    rowIf("Code postal", client.cp_f, {mono:true}),
    rowIf("Ville", client.ville_f),
    rowIf("Tél fixe", client.fixe_1, {mono:true}),
    rowIf("Mobile", client.portable_1, {mono:true}),
    rowIf("E-mail", client.mail_1),
    rowIf("Ancienneté", client.anciennete),
    client.nom_2 ? rowIf("Contact 2", `${client.civilite_2||client.civilite||""} ${client.prenom_2||""} ${client.nom_2}`.trim()) : null,
    client.fonction_2 ? rowIf("Fonction contact 2", client.fonction_2) : null,
    client.adresse_l ? rowIf("Adresse livraison", client.adresse_l) : null,
    client.cp_l ? rowIf("CP livraison", client.cp_l, {mono:true}) : null,
    client.ville_l ? rowIf("Ville livraison", client.ville_l) : null,
    client.fixe_2 ? rowIf("Tél fixe 2", client.fixe_2, {mono:true}) : null,
    client.portable_2 ? rowIf("Mobile 2", client.portable_2, {mono:true}) : null,
    client.mail_2 ? rowIf("E-mail 2", client.mail_2) : null,
    rowIf("Compétence ciblée", client.competence),
  ].filter(Boolean).forEach(r => body.appendChild(r));

  card.appendChild(body);

  // Action bar
  const actBar = el("div", {class:"action-bar"});
  actBar.innerHTML = `
    <button class="btn sm" type="button" onclick="navigator.clipboard&&navigator.clipboard.writeText('${escapeHtml(client.fixe_1||client.portable_1||"")}')">📋 Copier le tel</button>
    <button class="btn sm outline" type="button" onclick="navigator.clipboard&&navigator.clipboard.writeText('${escapeHtml(client.mail_1||"")}')">📧 Copier le mail</button>
  `;
  card.appendChild(actBar);

  return card;
}

/* End the current session */
function endSession(showDialog){
  const s = STATE.currentSession;
  if(!s) return;
  s.finished = true;
  s.ended_at = new Date().toISOString();
  // duration in minutes
  s.duration_min = Math.round((new Date(s.ended_at) - new Date(s.started_at))/60000);
  // Save to STORE
  STORE.sessions.push(structuredClone(s));
  saveStore();
  if(showDialog){
    openModal({
      title:"✅ Session enregistrée",
      body: el("div", {}, [
        el("p", {}, "Votre simulation a bien été enregistrée."),
        el("p", {class:"text-muted text-small"}, `Durée : ${s.duration_min} min · ${s.historisation.length} historisations · ${Object.values(s.productions||{}).filter(Boolean).filter(p=>p.body||p.subject).length} production(s) écrite(s) · ${Object.keys(s.outils||{}).length} outil(s) mobilisé(s)`),
        el("p", {}, "Vous pouvez maintenant retourner à l'accueil pour choisir un autre cas, ou imprimer un récapitulatif PDF."),
      ]),
      foot: [
        el("button", {class:"btn outline", type:"button", onclick: () => { closeModal(); printSession(); }}, "🖨️ Imprimer le récap"),
        el("button", {class:"btn orange", type:"button", onclick: () => {
          closeModal();
          STATE.currentCase = null;
          STATE.currentSession = null;
          navigateTo("accueil");
        }}, "Retour à l'accueil"),
      ]
    });
  }
}

/* Print the current session as a recap */
function printSession(){
  if(!STATE.currentSession) return;
  buildSessionPrintable(STATE.currentSession);
  setTimeout(()=>window.print(), 200);
}

  page.innerHTML = `

    <div class="print-section">
      <h3>Compétence travaillée</h3>

  `;
  zone.appendChild(page);
  document.body.appendChild(zone);
}

/* Rendu pour impression des outils saisis pendant la session */
function renderOutilsForPrint(s){
  if(!s.outils || !Object.keys(s.outils).length) return "";
  const outilsLabels = {
    bdc: "🧾 Bon de commande",
    reglement: "💳 Encaissement / Règlement",
    recouvrement: "⚖️ Recouvrement",
    rdv_co: "📅 RDV commercial",
    rdv_tech: "🔧 RDV technicien",
    parrainage: "🤝 Parrainage",
    remontee: "📣 Remontée client",
    sav: "🆘 Assistance & dépannage",
  };
  let html = '<div class="print-page"><div class="print-header"><div class="brand-mark"><strong style="color:#1a2e5c">TMK</strong> <span style="color:#f26749">Performances</span></div><div class="print-meta"><strong>Outils mobilisés pendant la session</strong></div></div>';
  for(const [id, data] of Object.entries(s.outils)){
    if(!data || (typeof data === "object" && !Object.values(data).some(v => v && (typeof v !== "object" || (Array.isArray(v) && v.length))))) continue;
    html += `<div class="print-section"><h3>${outilsLabels[id] || id}</h3>`;
    if(id === "bdc"){
      html += `<p><strong>N° :</strong> ${escapeHtml(data.num_bdc||"")} · <strong>Date :</strong> ${escapeHtml(data.date||"")}</p>`;
      if(data.lignes && data.lignes.length){
        html += '<table style="width:100%;border-collapse:collapse;font-size:.85rem"><thead><tr><th style="text-align:left;border-bottom:1px solid #ccc">Réf.</th><th style="text-align:left;border-bottom:1px solid #ccc">Désignation</th><th style="text-align:right;border-bottom:1px solid #ccc">Qté</th><th style="text-align:right;border-bottom:1px solid #ccc">PU HT</th><th style="text-align:right;border-bottom:1px solid #ccc">Rem.</th><th style="text-align:right;border-bottom:1px solid #ccc">Total HT</th></tr></thead><tbody>';
        let total = 0;
        data.lignes.forEach(l => {
          html += `<tr><td>${escapeHtml(l.ref||"")}</td><td>${escapeHtml(l.designation||"")}</td><td style="text-align:right">${l.qte||0}</td><td style="text-align:right">${(l.pu_ht||0).toFixed(2)} €</td><td style="text-align:right">${l.remise_pct||0}%</td><td style="text-align:right">${(l.total_ht||0).toFixed(2)} €</td></tr>`;
          total += (l.total_ht || 0);
        });
        const remGlob = parseFloat(data.remise_globale)||0;
        const totalApresRem = total * (1 - remGlob/100);
        const ttc = totalApresRem * 1.20;
        html += `</tbody><tfoot><tr><td colspan="5" style="text-align:right;border-top:1px solid #ccc"><strong>Sous-total HT</strong></td><td style="text-align:right;border-top:1px solid #ccc"><strong>${total.toFixed(2)} €</strong></td></tr>`;
        if(remGlob){ html += `<tr><td colspan="5" style="text-align:right">Remise supplémentaire (${remGlob}%)</td><td style="text-align:right">−${(total-totalApresRem).toFixed(2)} €</td></tr>`; }
        html += `<tr><td colspan="5" style="text-align:right"><strong>Total TTC (TVA 20%)</strong></td><td style="text-align:right"><strong>${ttc.toFixed(2)} €</strong></td></tr></tfoot></table>`;
      }
      if(data.commentaires) html += `<p><em>${escapeHtml(data.commentaires)}</em></p>`;
    }
    else if(id === "reglement"){
      const m = (STORE.modes_reglement.find(x => x.code === data.mode) || {}).label || data.mode || "";
      html += `<p><strong>Mode :</strong> ${escapeHtml(m)} · <strong>Montant :</strong> ${data.montant||0} € · <strong>Échéances :</strong> ${data.echeances||1}</p>`;
      if(data.titulaire) html += `<p>Titulaire : ${escapeHtml(data.titulaire)}</p>`;
      if(data.cb_num) html += `<p>Carte : ****${escapeHtml((data.cb_num||"").slice(-4))} · Validité ${escapeHtml(data.cb_validite||"—")}</p>`;
      if(data.iban) html += `<p>IBAN : ${escapeHtml(data.iban)} · BIC ${escapeHtml(data.bic||"")}</p>`;
      if(data.dates_echeances) html += `<p>Dates échéances : ${escapeHtml(data.dates_echeances)}</p>`;
      if(data.commentaires) html += `<p><em>${escapeHtml(data.commentaires)}</em></p>`;
    }
    else if(id === "recouvrement"){
      html += `<p><strong>Facture :</strong> ${escapeHtml(data.ref_facture||"")} du ${escapeHtml(data.date_facture||"")} · <strong>Montant dû :</strong> ${data.montant_du||0} €</p>`;
      html += `<p><strong>Échéancier :</strong> ${data.nb_echeances||"?"} × ${data.montant_echeance||0} € en ${escapeHtml(data.mode||"")} · Recouvrement total visé : ${escapeHtml(data.date_solde||"—")}</p>`;
      if(data.cr_negociation) html += `<p><strong>Compte-rendu :</strong><br>${nl2br(data.cr_negociation)}</p>`;
    }
    else if(id === "rdv_co"){
      html += `<p><strong>Commercial :</strong> ${escapeHtml(data.commercial||"—")} · <strong>Date :</strong> ${escapeHtml(data.date_rdv||"—")} · <strong>Créneau :</strong> ${escapeHtml(data.creneau||"—")}</p>`;
      if(data.presents) html += `<p><strong>Présents :</strong> ${escapeHtml(data.presents)}</p>`;
      if(data.info_transmettre) html += `<p><strong>À transmettre :</strong><br>${nl2br(data.info_transmettre)}</p>`;
      if(data.commentaires) html += `<p><em>${escapeHtml(data.commentaires)}</em></p>`;
    }
    else if(id === "rdv_tech"){
      html += `<p><strong>Date :</strong> ${escapeHtml(data.date_rdv||"—")} · <strong>Créneau :</strong> ${escapeHtml(data.creneau||"—")} · <strong>Centre :</strong> ${escapeHtml(data.centre||"—")}</p>`;
      if(data.type_intervention) html += `<p><strong>Type d'intervention :</strong> ${escapeHtml(data.type_intervention)}</p>`;
      if(data.commentaires) html += `<p>${nl2br(data.commentaires)}</p>`;
    }
    else if(id === "parrainage"){
      html += `<p><strong>Parrain :</strong> ${escapeHtml(data.parrain_nom||"")} ${escapeHtml(data.parrain_prenom||"")} · <strong>Filleul :</strong> ${escapeHtml(data.filleul_nom||"")} ${escapeHtml(data.filleul_prenom||"")} (${escapeHtml(data.envoi||"—")})</p>`;
      if(data.description) html += `<p>${nl2br(data.description)}</p>`;
    }
    else if(id === "remontee"){
      html += `<p><strong>Type :</strong> ${escapeHtml(data.type||"—")} · <strong>Canal :</strong> ${escapeHtml(data.canal||"—")}</p>`;
      if(data.description) html += `<p><strong>Demande :</strong><br>${nl2br(data.description)}</p>`;
      if(data.actions) html += `<p><strong>Actions attendues :</strong><br>${nl2br(data.actions)}</p>`;
    }
    else if(id === "sav"){
      if(data.motif) html += `<p><strong>Motif :</strong> ${nl2br(data.motif)}</p>`;
      if(data.diagnostic) html += `<p><strong>Diagnostic :</strong> ${nl2br(data.diagnostic)}</p>`;
      if(data.solution) html += `<p><strong>Solution :</strong> ${nl2br(data.solution)}</p>`;
      if(data.actions_realisees) html += `<p><strong>Actions réalisées :</strong> ${nl2br(data.actions_realisees)}</p>`;
      if(data.actions_attendues) html += `<p><strong>Actions attendues :</strong> ${nl2br(data.actions_attendues)}</p>`;
      if(data.date_rdv) html += `<p><strong>RDV :</strong> ${escapeHtml(data.date_rdv)}</p>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  return html;
}

VIEWS.catalogue = function(root){
  const isFormateur = STATE.user.role === "formateur";
  // Group by category
  const byCat = {};
  STORE.catalogue.forEach(p => {
    const k = p.categorie || "Autre";
    (byCat[k] = byCat[k]||[]).push(p);
  });

  root.appendChild(el("h1", {class:"mb-2"}, "Catalogue On The Road"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, "Liste des produits et services proposés par On The Road. Tous les tarifs sont affichés en TTC."));

  // Toolbar
  const tb = el("div", {class:"admin-toolbar"});
  const search = el("input", {type:"text", class:"search", placeholder:"🔍 Rechercher une référence, désignation, marque..."});
  tb.appendChild(search);
  if(isFormateur){
    tb.appendChild(el("button", {class:"btn orange", type:"button", onclick: () => editProduit(null)}, "+ Nouveau produit"));
  }
  root.appendChild(tb);

  const wrap = el("div", {class:"admin-table-wrap"});
  const scroll = el("div", {class:"scroll"});
  const table = el("table", {class:"table"});
  table.innerHTML = `
    <thead>
      <tr>
        <th>Réf.</th>
        <th>Désignation</th>
        <th>Description / véhicule</th>
        <th>Catégorie</th>
        <th style="text-align:right">Px HT</th>
        <th style="text-align:right">Px TTC</th>
        ${isFormateur?'<th></th>':''}
      </tr>
    </thead>
    <tbody id="catBody"></tbody>
  `;
  scroll.appendChild(table);
  wrap.appendChild(scroll);
  root.appendChild(wrap);

  function render(filter){
    const tbody = $("#catBody");
    tbody.innerHTML = "";
    const f = (filter||"").toLowerCase();
    let count = 0;
    STORE.catalogue.forEach(p => {
      const hay = (p.ref + " " + p.designation + " " + p.description + " " + p.categorie + " " + p.explications).toLowerCase();
      if(f && !hay.includes(f)) return;
      count++;
      const tr = el("tr", {});
      tr.innerHTML = `
        <td><strong>${escapeHtml(p.ref)}</strong></td>
        <td>${escapeHtml(p.designation)}</td>
        <td><small class="text-muted">${escapeHtml(p.description||"")}</small></td>
        <td><span class="badge-pill ${
          p.categorie==="Pneumatique"?"pill-navy":
          p.categorie==="service"?"pill-green":
          p.categorie==="offre partenaires"?"pill-yellow":
          "pill-orange"
        }">${escapeHtml(p.categorie||"—")}</span></td>
        <td style="text-align:right;font-variant-numeric:tabular-nums">${p.ht!=null?fmtMoney(p.ht):"—"}</td>
        <td style="text-align:right;font-variant-numeric:tabular-nums"><strong>${p.ttc!=null?fmtMoney(p.ttc):"—"}</strong></td>
        ${isFormateur?'<td><div class="row-actions"><button class="icon-btn" type="button" data-edit="'+escapeHtml(p.ref)+'">✏️</button><button class="icon-btn danger" type="button" data-del="'+escapeHtml(p.ref)+'">🗑️</button></div></td>':''}
      `;
      tbody.appendChild(tr);
    });
    if(count === 0){
      tbody.appendChild(el("tr", {}, el("td", {colspan: isFormateur?"7":"6", class:"empty"}, "Aucun résultat")));
    }
    if(isFormateur){
      $$("[data-edit]").forEach(b => b.addEventListener("click", () => editProduit(b.dataset.edit)));
      $$("[data-del]").forEach(b => b.addEventListener("click", () => {
        const ref = b.dataset.del;
        confirmDialog(`Supprimer le produit ${ref} ?`, () => {
          STORE.catalogue = STORE.catalogue.filter(p => p.ref !== ref);
          saveStore();
          render(search.value);
          toast("Produit supprimé", "success");
        });
      }));
    }
  }
  search.addEventListener("input", () => render(search.value));
  render("");
};

function editProduit(ref){
  const isNew = !ref;
  const p = isNew ? { ref:"", designation:"", description:"", ht:null, ttc:null, categorie:"Pneumatique", explications:"" }
                  : structuredClone(STORE.catalogue.find(x => x.ref === ref));
  if(!p){ toast("Produit introuvable", "error"); return; }

  const form = el("div", {});
  form.innerHTML = `
    <div class="grid-2">
      <div class="form-field"><label>Référence *</label><input id="pRef" value="${escapeHtml(p.ref)}" ${isNew?'':'readonly'}></div>
      <div class="form-field"><label>Catégorie</label>
        <select id="pCat">
          <option ${p.categorie==="Pneumatique"?"selected":""}>Pneumatique</option>
          <option ${p.categorie==="service"?"selected":""}>service</option>
          <option ${p.categorie==="offre partenaires"?"selected":""}>offre partenaires</option>
          <option ${p.categorie==="Service +"?"selected":""}>Service +</option>
          <option ${p.categorie==="Autre"?"selected":""}>Autre</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Désignation *</label><input id="pDes" value="${escapeHtml(p.designation)}"></div>
    <div class="form-field"><label>Description / conditionnement</label><textarea id="pDsc">${escapeHtml(p.description||"")}</textarea></div>
    <div class="grid-2">
      <div class="form-field"><label>Prix HT (€)</label><input type="number" step="0.01" id="pHt" value="${p.ht!=null?p.ht:''}"></div>
      <div class="form-field"><label>Prix TTC (€)</label><input type="number" step="0.01" id="pTtc" value="${p.ttc!=null?p.ttc:''}"></div>
    </div>
    <div class="form-field"><label>Explications complémentaires (utile pour les stagiaires)</label><textarea id="pExp">${escapeHtml(p.explications||"")}</textarea></div>
  `;
  openModal({
    title: isNew?"Nouveau produit":"Modifier le produit "+p.ref,
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn", type:"button", onclick: () => {
        const newRef = $("#pRef").value.trim();
        const des = $("#pDes").value.trim();
        if(!newRef || !des){ toast("Référence et désignation obligatoires", "error"); return; }
        if(isNew && STORE.catalogue.find(x => x.ref === newRef)){
          toast("Cette référence existe déjà", "error"); return;
        }
        const updated = {
          ref: newRef,
          designation: des,
          description: $("#pDsc").value.trim(),
          ht: $("#pHt").value === "" ? null : parseFloat($("#pHt").value),
          ttc: $("#pTtc").value === "" ? null : parseFloat($("#pTtc").value),
          categorie: $("#pCat").value,
          explications: $("#pExp").value.trim(),
        };
        if(isNew) STORE.catalogue.push(updated);
        else {
          const idx = STORE.catalogue.findIndex(x => x.ref === ref);
          STORE.catalogue[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Produit ajouté":"Produit modifié", "success");
        navigateTo("catalogue");
      }}, "Enregistrer"),
    ]
  });
}

/* Imprimer les CGV en PDF */
function printCgv(){
  const cgv = STORE.cgv || {};
  if(!cgv.sections || !cgv.sections.length){ toast("Pas de CGV à imprimer", "error"); return; }
  document.querySelectorAll(".print-zone").forEach(x=>x.remove());
  const zone = el("div", {class:"print-only print-zone"});
  const page = el("div", {class:"print-page"});
  let html = `
    <div class="print-header">
      <div class="brand-mark"><strong style="color:#1a2e5c">TMK</strong> <span style="color:#f26749">Performances</span></div>
      <div class="print-meta">
        <strong>${escapeHtml(cgv.titre||"CGV On The Road")}</strong><br>
        Document de référence — Formation Relation Client à Distance
      </div>
    </div>
  `;
  if(cgv.preambule) html += `<p style="font-style:italic;color:#555">${escapeHtml(cgv.preambule)}</p>`;
  cgv.sections.forEach(s => {
    html += `
      <div class="print-section" style="page-break-inside:avoid">
        <h3>${escapeHtml(s.num)}. ${escapeHtml(s.titre)}</h3>
        <div class="narrative">${nl2br(s.contenu)}</div>
      </div>
    `;
  });
  html += `<p style="font-size:.78rem;color:#6b7280;text-align:center;margin-top:2rem;border-top:1px solid #e1e5ee;padding-top:.4rem">TMK Performances · Plateforme de simulation Relation Client · ${todayFr()}</p>`;
  page.innerHTML = html;
  zone.appendChild(page);
  document.body.appendChild(zone);
  setTimeout(()=>window.print(), 200);
}

/* Éditer les CGV (formateur) */
function editCgv(){
  const cgv = STORE.cgv || { titre:"", preambule:"", sections:[] };
  if(!cgv.sections) cgv.sections = [];
  const wrap = el("div", {});

  const titre = el("input", {type:"text", id:"cgvTitre", value: cgv.titre || ""});
  wrap.appendChild(el("div", {class:"form-field"}, [el("label", {}, "Titre"), titre]));

  const preamb = el("textarea", {id:"cgvPreamb", rows:"2"}, cgv.preambule || "");
  wrap.appendChild(el("div", {class:"form-field"}, [el("label", {}, "Préambule"), preamb]));

  wrap.appendChild(el("h4", {class:"mt-2 mb-1"}, "Sections"));
  const sectionsBox = el("div", {id:"cgvSections"});

  const renderSection = (s, idx) => {
    const row = el("div", {class:"cgv-edit-row card mb-1"});
    row.innerHTML = `
      <div class="grid-bdc-cgv">
        <input type="text" name="num" placeholder="N°" value="${escapeHtml(s.num||"")}">
        <input type="text" name="titre" placeholder="Titre de la section" value="${escapeHtml(s.titre||"")}">
        <button type="button" class="btn sm outline" data-up="${idx}" title="Monter">▲</button>
        <button type="button" class="btn sm outline" data-down="${idx}" title="Descendre">▼</button>
        <button type="button" class="btn sm outline" style="color:var(--danger)" data-del="${idx}" title="Supprimer">✕</button>
      </div>
      <textarea name="contenu" rows="6" placeholder="Contenu de la section…">${escapeHtml(s.contenu||"")}</textarea>
    `;
    return row;
  };
  const refreshSections = () => {
    sectionsBox.innerHTML = "";
    cgv.sections.forEach((s, i) => sectionsBox.appendChild(renderSection(s, i)));
    sectionsBox.querySelectorAll("[data-up]").forEach(b => b.addEventListener("click", () => {
      const i = parseInt(b.dataset.up); if(i<=0) return;
      // Save current values first
      saveCurrent();
      [cgv.sections[i-1], cgv.sections[i]] = [cgv.sections[i], cgv.sections[i-1]];
      refreshSections();
    }));
    sectionsBox.querySelectorAll("[data-down]").forEach(b => b.addEventListener("click", () => {
      const i = parseInt(b.dataset.down); if(i>=cgv.sections.length-1) return;
      saveCurrent();
      [cgv.sections[i+1], cgv.sections[i]] = [cgv.sections[i], cgv.sections[i+1]];
      refreshSections();
    }));
    sectionsBox.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => {
      const i = parseInt(b.dataset.del);
      confirmDialog("Supprimer cette section ?", () => {
        saveCurrent();
        cgv.sections.splice(i, 1);
        refreshSections();
      });
    }));
  };
  const saveCurrent = () => {
    const rows = sectionsBox.querySelectorAll(".cgv-edit-row");
    rows.forEach((r, i) => {
      if(cgv.sections[i]){
        cgv.sections[i].num = r.querySelector('[name="num"]').value;
        cgv.sections[i].titre = r.querySelector('[name="titre"]').value;
        cgv.sections[i].contenu = r.querySelector('[name="contenu"]').value;
      }
    });
  };
  refreshSections();
  wrap.appendChild(sectionsBox);

  const addBtn = el("button", {class:"btn outline mt-1", type:"button", onclick: () => {
    saveCurrent();
    cgv.sections.push({num:"", titre:"Nouvelle section", contenu:""});
    refreshSections();
  }}, "+ Ajouter une section");
  wrap.appendChild(addBtn);

  openModal({
    title: "✏️ Modifier les CGV",
    body: wrap,
    size: "large",
    foot: [
      el("button", {class:"btn orange", type:"button", onclick: () => {
        saveCurrent();
        cgv.titre = titre.value;
        cgv.preambule = preamb.value;
        STORE.cgv = cgv;
        saveStore();
        closeModal();
        toast("CGV mises à jour", "success");
        navigateTo("infos");
      }}, "💾 Enregistrer"),
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler")
    ]
  });
}

VIEWS.centres = function(root){
  const isFormateur = STATE.user.role === "formateur";
  root.appendChild(el("h1", {class:"mb-2"}, "Centres agréés On The Road"));
  root.appendChild(el("p", {class:"text-muted mb-3"}, `${STORE.centres.length} centres partenaires sur le territoire national qui assurent les livraisons et les prestations.`));

  // Group by region
  const regions = {};
  STORE.centres.forEach(c => {
    (regions[c.region] = regions[c.region]||[]).push(c);
  });

  const tb = el("div", {class:"admin-toolbar"});
  const search = el("input", {type:"text", class:"search", placeholder:"🔍 Rechercher (département, ville, nom)…"});
  tb.appendChild(search);
  root.appendChild(tb);

  const list = el("div", {});
  function render(filter){
    list.innerHTML = "";
    const f = (filter||"").toLowerCase();
    Object.keys(regions).sort().forEach(reg => {
      const matching = regions[reg].filter(c => {
        const hay = (c.departement+" "+c.nom+" "+c.ville+" "+c.adresse+" "+c.cp).toLowerCase();
        return !f || hay.includes(f);
      });
      if(matching.length === 0) return;
      const sec = el("div", {class:"card mb-2"});
      sec.appendChild(el("div", {class:"card-header"}, [
        el("h2", {}, "📍 " + reg),
        el("span", {class:"badge-pill pill-grey"}, matching.length + " centre" + (matching.length>1?"s":"")),
      ]));
      const t = el("table", {class:"table"});
      t.innerHTML = `<thead><tr><th>Dép.</th><th>Centre</th><th>Adresse</th><th>Ville</th><th>Téléphone</th></tr></thead>`;
      const tb = el("tbody");
      matching.forEach(c => {
        const tr = el("tr", {});
        tr.innerHTML = `<td><strong>${escapeHtml(c.departement)}</strong></td><td>${escapeHtml(c.nom)}</td><td>${escapeHtml(c.adresse)}</td><td>${escapeHtml(c.cp)} ${escapeHtml(c.ville)}</td><td>${escapeHtml(c.telephone)}</td>`;
        tb.appendChild(tr);
      });
      t.appendChild(tb);
      sec.appendChild(t);
      list.appendChild(sec);
    });
  }
  search.addEventListener("input", () => render(search.value));
  render("");
  root.appendChild(list);
};

  root.appendChild(actions);

  // Compétences travaillées
  if(totalSessions){
    root.appendChild(el("h2", {class:"mt-3 mb-2"}, "📊 Compétences travaillées par les stagiaires"));

      const k = s.competence || "Non défini";

    const card = el("div", {class:"card"});
    const list = el("div", {});

    root.appendChild(card);

    <tbody id="casBody"></tbody>
  `;
  scroll.appendChild(table);
  wrap.appendChild(scroll);
  root.appendChild(wrap);

  function render(){
    const f = (search.value||"").toLowerCase();
    const a = filterAct.value;
    const j = filterJ.value;
    const tbody = $("#casBody");
    tbody.innerHTML = "";
    let count = 0;
    STORE.cas.forEach(c => {
      const client = STORE.clients.find(cl => cl.ref === c.num_appel);
      const hay = (c.num_appel + " " + c.competence_canal + " " + c.role + " " + (client?fullName(client):"")).toLowerCase();
      if(f && !hay.includes(f)) return;
      if(a && c.activite_type !== a) return;
      if(j && (c.journee||1) !== parseInt(j)) return;
      count++;
      const journeeNum = c.journee || 1;
      const tr = el("tr", {});
      tr.innerHTML = `
        <td><strong>${escapeHtml(c.num_appel)}</strong></td>
        <td><span class="badge-pill ${journeeNum===2?'pill-orange-mini':'pill-navy-mini'}">J${journeeNum}</span></td>
        <td><span class="badge-pill ${c.activite_type==="I"?"pill-navy":"pill-orange"}">${escapeHtml(c.activite_type)}</span></td>
        <td><small>${escapeHtml((c.competence_canal||"").split("\n").slice(0,2).join(" / ").substring(0,80))}…</small></td>
        <td>${client ? escapeHtml(fullName(client)) + " <small class='text-muted'>("+escapeHtml(societe(client))+")</small>" : "<em class='text-muted'>aucune fiche</em>"}</td>
        <td><small>${escapeHtml((c.role||"").substring(0,80))}…</small></td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" type="button" data-edit="${escapeHtml(c.num_appel)}" title="Modifier">✏️</button>
            <button class="icon-btn" type="button" data-pdf="${escapeHtml(c.num_appel)}" title="Exporter PDF">📄</button>
            <button class="icon-btn danger" type="button" data-del="${escapeHtml(c.num_appel)}" title="Supprimer">🗑️</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
    if(count===0) tbody.appendChild(el("tr", {}, el("td", {colspan:"7", class:"empty"}, "Aucun cas correspondant")));
    $$("[data-edit]").forEach(b => b.addEventListener("click", () => editCas(b.dataset.edit)));
    $$("[data-pdf]").forEach(b => b.addEventListener("click", () => exportCasPdf(b.dataset.pdf)));
    $$("[data-del]").forEach(b => b.addEventListener("click", () => {
      confirmDialog(`Supprimer le cas ${b.dataset.del} ?`, () => {
        STORE.cas = STORE.cas.filter(x => x.num_appel !== b.dataset.del);
        saveStore();
        render();
        toast("Cas supprimé", "success");
      });
    }));
  }
  search.addEventListener("input", render);
  filterAct.addEventListener("change", render);
  filterJ.addEventListener("change", render);
  render();
};

function editCas(num){
  const isNew = !num;
  const c = isNew ? { num_appel:"", activite_type:"I", competence_canal:"", role:"", objet:"", profil:"", journee: 1 }
                  : structuredClone(STORE.cas.find(x => x.num_appel === num));
  if(!c){ toast("Cas introuvable", "error"); return; }
  if(!c.journee) c.journee = 1;
  const linkedClient = STORE.clients.find(cl => cl.ref === c.num_appel);

  const form = el("div", {});
  form.innerHTML = `
    <div class="grid-3">
      <div class="form-field"><label>N° d'appel *</label><input id="cNum" value="${escapeHtml(c.num_appel)}" ${isNew?'':'readonly'} placeholder="ex : 5-01 ou J2-25"></div>
      <div class="form-field"><label>Journée</label>
        <select id="cJour">
          <option value="1" ${c.journee===1?"selected":""}>Journée 1 (initial)</option>
          <option value="2" ${c.journee===2?"selected":""}>Journée 2 (approfondi)</option>
        </select>
      </div>
      <div class="form-field"><label>Activité</label>
        <select id="cAct">
          <option value="I" ${c.activite_type==="I"?"selected":""}>I — Renseignement / accueil</option>
          <option value="II" ${c.activite_type==="II"?"selected":""}>II — Vente / fidélisation / recouvrement</option>
          <option value="III" ${c.activite_type==="III"?"selected":""}>III — Autre</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Compétence + canal (1 par ligne)</label><textarea id="cCompCan" rows="4" placeholder="- Réaliser des actions de prospection...&#10;- B to B&#10;- SMS / mail / chat...">${escapeHtml(c.competence_canal||"")}</textarea></div>
    <div class="form-field"><label>Rôle joué par le candidat-client *</label><textarea id="cRole" rows="3" placeholder="Ex : M. DUPONT. Vous contactez le service client de On the Road pour…">${escapeHtml(c.role||"")}</textarea></div>
    <div class="form-field"><label>Objet (produits, références, montants demandés)</label><textarea id="cObj" rows="2" placeholder="Ex : - PNEU 255/55R18 (4 unités) - PNEU 215/55R18 (2 unités)">${escapeHtml(c.objet||"")}</textarea></div>
    <div class="form-field"><label>Profil candidat (informations cachées du conseiller)</label><textarea id="cProfil" rows="4" placeholder="Ex : Vous êtes attentif aux promotions. Vous avez un budget de 600€ TTC…">${escapeHtml(c.profil||"")}</textarea></div>
    ${linkedClient ? `<div class="well mt-2"><strong>Fiche client liée :</strong> ${escapeHtml(fullName(linkedClient))} (réf. ${escapeHtml(linkedClient.ref)})</div>` 
      : `<div class="well mt-2" style="border-left:3px solid var(--tmk-orange)"><strong>⚠️ Aucune fiche client n'a la même référence</strong>. Pensez à créer la fiche dans l'onglet "Fiches clients" pour que ce cas soit jouable.</div>`}
  `;
  openModal({
    title: isNew?"Nouveau cas client":"Modifier le cas "+c.num_appel,
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn", type:"button", onclick: () => {
        const newNum = $("#cNum").value.trim();
        const role = $("#cRole").value.trim();
        if(!newNum || !role){ toast("N° et rôle obligatoires", "error"); return; }
        if(isNew && STORE.cas.find(x => x.num_appel === newNum)){
          toast("Ce numéro existe déjà", "error"); return;
        }
        const updated = {
          num_appel: newNum,
          journee: parseInt($("#cJour").value) || 1,
          activite_type: $("#cAct").value,
          competence_canal: $("#cCompCan").value.trim(),
          role: role,
          objet: $("#cObj").value.trim(),
          profil: $("#cProfil").value.trim(),
        };
        if(isNew) STORE.cas.push(updated);
        else {
          const idx = STORE.cas.findIndex(x => x.num_appel === num);
          STORE.cas[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Cas créé":"Cas modifié", "success");
        navigateTo("cas");
      }}, "Enregistrer"),
    ]
  });
}

      const prods = Object.values(s.productions||{}).filter(p => p && (p.body || p.subject)).length;

          <button class="icon-btn danger" type="button" data-del="${realIdx}">🗑️</button>
        </div></td>
      `;
      tbody.appendChild(tr);
    });
    $$("[data-view]").forEach(b => b.addEventListener("click", () => viewSession(parseInt(b.dataset.view))));

        saveStore(); render(); toast("Session supprimée", "success");

  }
  search.addEventListener("input", render);
  render();
};

function renderOutilsForFormateur(s){
  if(!s.outils || !Object.keys(s.outils).length) return "";
  const labels = {
    bdc:"🧾 Bon de commande", reglement:"💳 Règlement", recouvrement:"⚖️ Recouvrement",
    rdv_co:"📅 RDV commercial", rdv_tech:"🔧 RDV technicien",
    parrainage:"🤝 Parrainage", remontee:"📣 Remontée client", sav:"🆘 SAV"
  };
  let h = `<h4 class="mb-1 mt-3">🧰 Outils mobilisés (${Object.keys(s.outils).length})</h4>`;
  for(const [id, data] of Object.entries(s.outils)){
    if(!data) continue;
    h += `<div class="well mb-1"><strong>${labels[id]||id}</strong><br>`;
    if(id === "bdc" && data.lignes){
      h += `<small>BDC ${escapeHtml(data.num_bdc||"")} · ${data.lignes.length} ligne(s) · Total HT ${data.lignes.reduce((a,l)=>a+(l.total_ht||0),0).toFixed(2)} €</small>`;
    } else {
      const summary = Object.entries(data).filter(([k,v]) => v && typeof v !== "object").slice(0,4).map(([k,v]) => `${k}: ${escapeHtml(String(v))}`).join(" · ");
      h += `<small>${summary}</small>`;
    }
    h += `</div>`;
  }
  return h;
}

function viewSession(idx){
  const s = STORE.sessions[idx];

  const body = el("div", {});
  body.innerHTML = `
    <div class="grid-2 mb-2">
      <div><strong>Stagiaire :</strong> ${escapeHtml(s.stagiaire)}</div>
      <div><strong>Cas :</strong> ${escapeHtml(s.case_ref)} — ${escapeHtml(client?fullName(client):"")}</div>
      <div><strong>Durée :</strong> ${s.duration_min||0} min</div>
      <div><strong>Compétence :</strong> ${escapeHtml(s.competence||"—")}</div>
    </div>
    <h4 class="mb-1">📝 Historisation (${(s.historisation||[]).length})</h4>
    ${(s.historisation||[]).length ? '<ol>' + s.historisation.map(h => `<li><strong>${escapeHtml(h.date)} ${escapeHtml(h.time||"")}</strong> — ${escapeHtml(h.action)}${h.comment?'<br><em>'+escapeHtml(h.comment)+'</em>':''}</li>`).join('') + '</ol>' : '<em class="text-muted">Aucune historisation</em>'}
    ${s.wrap_up ? `<h4 class="mb-1 mt-2">🎬 Wrap-up</h4><div class="well">${nl2br(s.wrap_up)}</div>` : ''}
    ${(s.productions && s.productions.mail && s.productions.mail.body) ? `<h4 class="mb-1 mt-2">📧 E-mail</h4><div class="well"><strong>Objet :</strong> ${escapeHtml(s.productions.mail.subject||"")}<br><br>${nl2br(s.productions.mail.body)}</div>` : ''}

function editFormateur(id){
  const isNew = !id;
  const f = isNew ? {id:"", civilite:"M.", nom:"", prenom:"", role:"formateur"}
                  : structuredClone(STORE.formateurs.find(x => x.id === id));
  if(!f){ toast("Formateur introuvable", "error"); return; }

  const form = el("div", {});
  form.innerHTML = `
    <div class="grid-3">
      <div class="form-field"><label>Civilité</label>
        <select id="fCiv">
          <option ${f.civilite==='M.'?'selected':''}>M.</option>
          <option ${f.civilite==='Mme'?'selected':''}>Mme</option>
        </select>
      </div>
      <div class="form-field"><label>Nom *</label><input id="fNom" value="${escapeHtml(f.nom||'')}" placeholder="DUPONT"></div>
      <div class="form-field"><label>Prénom *</label><input id="fPrenom" value="${escapeHtml(f.prenom||'')}" placeholder="Marie"></div>
    </div>
    <div class="form-field"><label>Rôle</label>
      <select id="fRole">
        <option value="formateur" ${f.role==='formateur'?'selected':''}>Formateur (accès standard)</option>
        <option value="admin" ${f.role==='admin'?'selected':''}>Administrateur (peut gérer les formateurs)</option>
      </select>
    </div>
    <div class="well text-small mt-2">
      <strong>Identifiant :</strong> ${isNew ? "généré automatiquement à partir du nom" : escapeHtml(f.id)}<br>
      <strong>Code à utiliser :</strong> Le formateur utilisera le code formateur standard ou admin selon son rôle (ces codes sont gérés dans la page principale).
    </div>
  `;

  openModal({
    title: isNew ? "Ajouter un formateur" : "Modifier "+f.nom,
    body: form,
    size:"large",
    foot: [
      el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler"),
      el("button", {class:"btn orange", type:"button", onclick: () => {
        const nom = $("#fNom").value.trim();
        const prenom = $("#fPrenom").value.trim();
        if(!nom || !prenom){ toast("Nom et prénom obligatoires", "error"); return; }
        const updated = {
          id: isNew ? makeFormateurId(nom, prenom) : f.id,
          civilite: $("#fCiv").value,
          nom: nom.toUpperCase(),
          prenom: prenom,
          role: $("#fRole").value
        };
        // Vérifier unicité id si création
        if(isNew && STORE.formateurs.find(x => x.id === updated.id)){
          updated.id = updated.id + "_" + Date.now().toString().slice(-4);
        }
        if(isNew){
          STORE.formateurs.push(updated);
        } else {
          const idx = STORE.formateurs.findIndex(x => x.id === id);
          STORE.formateurs[idx] = updated;
        }
        saveStore();
        closeModal();
        toast(isNew?"Formateur ajouté":"Formateur modifié", "success");
        navigateTo("formateurs");
      }}, "Enregistrer")
    ]
  });
}

function makeFormateurId(nom, prenom){
  // Normalisation : minuscules, sans accent, _
  const norm = (s) => s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
  return norm(nom) + "_" + norm(prenom).charAt(0);
}

  else if(ci.portable) sub.push(`Mobile ${ci.portable}`);

  // Body (dépliable)
  const body = el("div", {class:"client-panel-body"});
  const grid = el("div", {class:"client-panel-grid"});

  // Bloc identité complète
  const lignesId = [];
  lignesId.push(`<dt>Référence</dt><dd>${escapeHtml(ci.ref)} <span class="badge-pill ${ci.journee===2?'pill-orange-mini':'pill-navy-mini'}">J${ci.journee}</span></dd>`);
  if(ci.raison_sociale) lignesId.push(`<dt>Raison sociale</dt><dd>${escapeHtml(ci.raison_sociale)}</dd>`);
  lignesId.push(`<dt>Identité</dt><dd>${escapeHtml(fullName(client))}</dd>`);
  if(ci.fonction) lignesId.push(`<dt>Fonction</dt><dd>${escapeHtml(ci.fonction)}</dd>`);
  if(ci.adresse || ci.ville){
    const adr = [ci.adresse, [ci.cp, ci.ville].filter(Boolean).join(" ")].filter(Boolean).join(", ");
    lignesId.push(`<dt>Adresse facturation</dt><dd>${escapeHtml(adr)}</dd>`);
  }
  if(ci.adresse_l && ci.adresse_l !== ci.adresse){
    const adrL = [ci.adresse_l, [ci.cp_l, ci.ville_l].filter(Boolean).join(" ")].filter(Boolean).join(", ");
    lignesId.push(`<dt>Adresse livraison</dt><dd>${escapeHtml(adrL)}</dd>`);
  }
  if(ci.fixe) lignesId.push(`<dt>Tél. fixe</dt><dd>${escapeHtml(ci.fixe)}</dd>`);
  if(ci.portable) lignesId.push(`<dt>Mobile</dt><dd>${escapeHtml(ci.portable)}</dd>`);
  if(ci.mail) lignesId.push(`<dt>E-mail</dt><dd>${escapeHtml(ci.mail)}</dd>`);
  if(ci.anciennete) lignesId.push(`<dt>Ancienneté</dt><dd>${escapeHtml(ci.anciennete)}</dd>`);
  if(ci.montant_facture) lignesId.push(`<dt>Montant en jeu</dt><dd>${escapeHtml(ci.montant_facture)} €</dd>`);
  // Contact 2 si présent
  if(ci.contact_2 && (ci.contact_2.nom || ci.contact_2.fixe)){
    const c2 = ci.contact_2;
    const c2Name = [c2.civilite, c2.prenom, c2.nom].filter(Boolean).join(" ");
    const c2Tel = c2.fixe || c2.portable || "";
    lignesId.push(`<dt>Contact 2</dt><dd>${escapeHtml(c2Name)} ${c2Tel?'<small>'+escapeHtml(c2Tel)+'</small>':''}</dd>`);
  }

  const colId = el("div", {class:"client-panel-col"});
  colId.innerHTML = `<h5>📄 Identité</h5><dl class="cp-dl">${lignesId.join("")}</dl>`;
  grid.appendChild(colId);

  // Bloc historique
  const colHist = el("div", {class:"client-panel-col"});
  if(ci.evenements.length){
    let html = `<h5>📅 Historique de la relation</h5><div class="cp-events">`;
    ci.evenements.forEach(e => {
      html += `<div class="cp-event"><span class="cp-event-date">${escapeHtml(e.date || "—")}</span><span class="cp-event-text">${escapeHtml(e.texte)}</span></div>`;
    });
    html += `</div>`;
    colHist.innerHTML = html;
  } else {
    colHist.innerHTML = `<h5>📅 Historique de la relation</h5><p class="text-muted text-small"><em>Aucun événement antérieur enregistré.</em></p>`;
  }
  grid.appendChild(colHist);

  body.appendChild(grid);

  // Bloc mission (en bas, sur toute la largeur, optionnel)
  if(options.showMission && ci.mission){
    const missionBlock = el("div", {class:"client-panel-mission"});
    missionBlock.innerHTML = `<h5>🎯 Mission</h5><p>${escapeHtml(ci.mission)}</p>`;
    body.appendChild(missionBlock);
  }

  wrap.appendChild(body);

  // Toggle
  header.addEventListener("click", () => {
    wrap.classList.toggle("open");
    header.querySelector(".cp-arrow").textContent = wrap.classList.contains("open") ? "▼" : "▶";
  });

  // Ouvert par défaut si options.open
  if(options.open){
    wrap.classList.add("open");
    header.querySelector(".cp-arrow").textContent = "▼";
  }

  return wrap;
}

/* Helper : ouvre un outil dans une grosse modale et persiste le résultat */
function openOutil(outil){
  const session = STATE.currentSession;
  if(!session) return;
  // STATE.currentCase est le num_appel (string), pas l'objet — on récupère l'objet ici
  const numAppel = STATE.currentCase;
  const cas = STORE.cas.find(c => c.num_appel === numAppel) || null;
  // Le lien cas → client se fait par num_appel === client.ref (les 48 cas suivent cette règle)
  const client = STORE.clients.find(c => c.ref === numAppel) || null;
  session.outils = session.outils || {};
  const data = session.outils[outil.id] || {};

  // Wrapper avec : panneau client dépliable + formulaire de l'outil
  const wrapper = el("div", {});
  // Pour la remontée client, le panneau est géré différemment (choix client/prospect)
  if(outil.id !== "remontee"){
    wrapper.appendChild(clientPanel(client, {open: false, showMission: false}));
  }

  // === Onglets : Outil / Références ===
  const tabBar = el("div", {class:"outil-tabs"});
  tabBar.innerHTML = `
    <button class="outil-tab active" data-pane="outil" type="button">🛠 ${escapeHtml(outil.titre)}</button>
    <button class="outil-tab" data-pane="ref" type="button">📚 Références</button>
  `;
  wrapper.appendChild(tabBar);

  // Pane outil (le formulaire spécifique)
  const paneOutil = el("div", {class:"outil-pane active", "data-pane":"outil"});
  const form = outil.builder(client, cas, data);
  paneOutil.appendChild(form);
  wrapper.appendChild(paneOutil);

  // Pane références (chargé à la demande, et seulement à la 1ère bascule)
  const paneRef = el("div", {class:"outil-pane", "data-pane":"ref"});
  const refTabs = el("div", {class:"ref-subtabs"});
  refTabs.innerHTML = `
    <button class="ref-subtab active" data-ref="infos" type="button">📚 Infos</button>
    <button class="ref-subtab" data-ref="catalogue" type="button">🛞 Catalogue</button>
    <button class="ref-subtab" data-ref="cgv" type="button">📄 CGV</button>
    <button class="ref-subtab" data-ref="centres" type="button">📍 Centres</button>
  `;
  paneRef.appendChild(refTabs);
  const refContent = el("div", {class:"ref-content"});
  paneRef.appendChild(refContent);
  wrapper.appendChild(paneRef);

  // Cache du contenu déjà rendu (économise un peu de DOM)
  const refCache = {};
  function showRef(which){
    refTabs.querySelectorAll(".ref-subtab").forEach(b => b.classList.toggle("active", b.dataset.ref === which));
    if(!refCache[which]){
      const cnt = el("div", {});
      if(which === "infos") renderInfosLite(cnt);
      else if(which === "catalogue") renderCatalogueLite(cnt);
      else if(which === "cgv") renderCgvLite(cnt);
      else if(which === "centres") renderCentresLite(cnt);
      refCache[which] = cnt;
    }
    refContent.innerHTML = "";
    refContent.appendChild(refCache[which]);
  }
  refTabs.querySelectorAll(".ref-subtab").forEach(b => {
    b.addEventListener("click", () => showRef(b.dataset.ref));
  });

  // Bascule entre Outil et Références
  let refLoaded = false;
  tabBar.querySelectorAll(".outil-tab").forEach(b => {
    b.addEventListener("click", () => {
      tabBar.querySelectorAll(".outil-tab").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      wrapper.querySelectorAll(".outil-pane").forEach(p => p.classList.toggle("active", p.dataset.pane === b.dataset.pane));
      if(b.dataset.pane === "ref" && !refLoaded){
        showRef("infos");
        refLoaded = true;
      }
    });
  });

  // Boutons
  const saveBtn = el("button", {class:"btn orange", type:"button", onclick: () => {
    // Lecture restreinte au pane outil pour ne pas capter les inputs des références (ex: search)
    const result = readOutilForm(outil.id, paneOutil);
    session.outils[outil.id] = result;
    saveStore();
    closeModal();
    toast(`${outil.titre} enregistré dans la session`, "success");
    navigateTo("crm");
    setTimeout(() => {
      const t = document.querySelector('.subtab[data-sub="outils"]');
      if(t) t.click();
    }, 50);
  }}, "💾 Enregistrer");
  const cancelBtn = el("button", {class:"btn outline", type:"button", onclick: closeModal}, "Annuler");
  const buttons = [saveBtn, cancelBtn];
  if(session.outils[outil.id]){
    buttons.push(el("button", {class:"btn outline", type:"button", style:"margin-left:auto;color:var(--danger)", onclick: () => {
      confirmDialog(`Supprimer la saisie de "${outil.titre}" ?`, () => {
        delete session.outils[outil.id];
        saveStore();
        closeModal();
        navigateTo("crm");
        setTimeout(() => {
          const t = document.querySelector('.subtab[data-sub="outils"]');
          if(t) t.click();
        }, 50);
      });
    }}, "🗑 Supprimer"));
  }

  openModal({
    title: `${outil.emoji} ${outil.titre}`,
    body: wrapper,
    foot: buttons,
    size: "large"
  });
}

/* Lecture générique d'un formulaire (chaque champ a un name="..." ) */
function readOutilForm(outilId, form){
  const inputs = form.querySelectorAll("input, textarea, select");
  const result = {};
  inputs.forEach(inp => {
    if(!inp.name) return;
    if(inp.type === "checkbox"){
      // Cas particulier : evt_N pour le recouvrement → liste d'événements cochés
      if(inp.name.startsWith("evt_")){
        result.factures_evt = result.factures_evt || [];
        if(inp.checked){
          const idx = parseInt(inp.name.replace("evt_",""));
          if(!isNaN(idx)) result.factures_evt.push(idx);
        }
        return;
      }
      result[inp.name] = inp.checked;
    }
    else if(inp.type === "radio"){ if(inp.checked) result[inp.name] = inp.value; }
    else { result[inp.name] = inp.value; }
  });
  // Cas particulier : lignes du bon de commande
  if(outilId === "bdc"){
    result.lignes = [];
    form.querySelectorAll(".bdc-ligne").forEach(row => {
      const ref = row.querySelector('[name="l_ref"]').value;
      const qte = parseFloat(row.querySelector('[name="l_qte"]').value) || 0;
      const des = row.querySelector('[name="l_des"]').value;
      const pu  = parseFloat(row.querySelector('[name="l_pu"]').value) || 0;
      const rem = parseFloat(row.querySelector('[name="l_rem"]').value) || 0;
      if(ref || des){
        result.lignes.push({ref, qte, designation:des, pu_ht:pu, remise_pct:rem, total_ht: qte*pu*(1-rem/100)});
      }
    });
  }
  // Cas particulier : factures du recouvrement (lignes manuelles)
  if(outilId === "recouv"){
    result.factures = [];
    form.querySelectorAll(".recouv-line").forEach(row => {
      const ref = row.querySelector('[name="rl_ref"]').value;
      const date = row.querySelector('[name="rl_date"]').value;
      const montant = parseFloat(row.querySelector('[name="rl_montant"]').value) || 0;
      if(ref || date || montant){
        result.factures.push({ref, date, montant});
      }
    });
  }
  return result;
}

    row.querySelector('[name="l_ref"]').addEventListener("change", (e) => {
      const ref = e.target.value.trim();

  const datalist = el("datalist", {id:"catalogueRefs"});
  STORE.catalogue.forEach(c => {
    const opt = el("option", {value: c.ref}, c.designation || "");

  wrap.appendChild(heads);

  wrap.appendChild(lignesWrap);

  else { addLigne(); }

  const btnAdd = el("button", {class:"btn sm outline mt-1", type:"button", onclick: () => addLigne()}, "+ Ajouter une ligne");
  wrap.appendChild(btnAdd);

  const pied = el("div", {class:"grid-2 mt-2"});

    <div class="form-field">
      <label>Remise supplémentaire (%)</label>

    <div class="form-field">
      <label>Commentaires / mode d'expédition</label>
      <input type="text" name="commentaires" value="${escapeHtml(data.commentaires||"")}">
    </div>
  `;
  wrap.appendChild(pied);

  return wrap;
}

function generateBdcNum(){
  const yy = new Date().getFullYear().toString().slice(-2);
  const seq = (STORE.sessions || []).reduce((acc, s) => acc + ((s.outils && s.outils.bdc) ? 1 : 0), 0) + 1;
  return `BDC${yy}-${String(seq).padStart(4,'0')}`;
}

function todayISO(){
  return new Date().toISOString().slice(0,10);
}

/* ---------- Règlement ---------- */
function buildReglement(client, cas, data){

  const candidates = [];
  if(ci){
    ci.evenements.forEach(e => {
      const txt = (e.texte || "").toLowerCase();
      if(/bdc|commande|facture|devis|€|ttc|ht\b/.test(txt)){

    const help = el("div", {class:"well text-small mb-2"});

      hh += `<button type="button" class="regl-suggest-btn" data-i="${i}" data-text="${escapeHtml(e.texte)}">${escapeHtml(e.date||"—")} · ${escapeHtml(e.texte.substring(0,60))}${e.texte.length>60?"…":""}</button>`;

  wrap.appendChild(el("h4", {class:"mb-1"}, "Type de règlement"));
  const typesRow = el("div", {class:"radio-row"});
  STORE.modes_reglement.forEach((m,i) => {
    const id = `mode_${m.code}`;
    const rad = el("label", {class:"radio-card"});
    const checked = (data.mode === m.code) || (!data.mode && i===0);
    rad.innerHTML = `
      <input type="radio" name="mode" value="${m.code}" ${checked?"checked":""}>
      <strong>${escapeHtml(m.label)}</strong>
      <small>${escapeHtml(m.details)}</small>
    `;
    typesRow.appendChild(rad);
  });
  wrap.appendChild(typesRow);

  // Montant

    <div class="form-field">
      <label>Montant total à régler (€ TTC)</label>
      <input type="number" name="montant" min="0" step="0.01" value="${data.montant || ""}">
    </div>
    <div class="form-field">
      <label>Référence facture / BDC</label>
      <input type="text" name="ref_doc" value="${escapeHtml(data.ref_doc || (cas?.num_appel || ""))}">
    </div>
  `;
  wrap.appendChild(grid);

  // Coordonnées bancaires (CB / SEPA)
  wrap.appendChild(el("h4", {class:"mt-2 mb-1"}, "Coordonnées (selon mode choisi)"));
  const bank = el("div", {class:"grid-2"});
  bank.innerHTML = `
    <div class="form-field">
      <label>Nom & prénom du titulaire</label>
      <input type="text" name="titulaire" value="${escapeHtml(data.titulaire||"")}">
    </div>
    <div class="form-field">
      <label>N° de carte (si CB) — 16 chiffres</label>
      <input type="text" name="cb_num" maxlength="19" placeholder="XXXX XXXX XXXX XXXX" value="${escapeHtml(data.cb_num||"")}">
    </div>
    <div class="form-field">
      <label>Validité MM/AA + CVC</label>
      <input type="text" name="cb_validite" placeholder="MM/AA · CVC" value="${escapeHtml(data.cb_validite||"")}">
    </div>
    <div class="form-field">
      <label>IBAN (si prélèvement / virement)</label>
      <input type="text" name="iban" placeholder="FR.. .... .... .... .... .... ..." value="${escapeHtml(data.iban||"")}">
    </div>
    <div class="form-field">
      <label>BIC</label>
      <input type="text" name="bic" value="${escapeHtml(data.bic||"")}">
    </div>
    <div class="form-field">
      <label>Banque / agence de domiciliation</label>
      <input type="text" name="banque" value="${escapeHtml(data.banque||"")}">
    </div>
  `;
  wrap.appendChild(bank);

  // Facilités
  wrap.appendChild(el("h4", {class:"mt-2 mb-1"}, "Facilité de paiement"));
  const facilities = el("div", {class:"radio-row"});
  STORE.facilites_paiement.forEach((f, i) => {
    const id = `fac_${f.echeances}`;
    const lab = el("label", {class:"radio-card"});
    const checked = (parseInt(data.echeances) === f.echeances) || (!data.echeances && i===0);
    lab.innerHTML = `
      <input type="radio" name="echeances" value="${f.echeances}" ${checked?"checked":""}>
      <strong>${escapeHtml(f.label)}</strong>
    `;
    facilities.appendChild(lab);
  });
  wrap.appendChild(facilities);

  const datesGrid = el("div", {class:"grid-2 mt-1"});
  datesGrid.innerHTML = `
    <div class="form-field">
      <label>Dates des échéances (séparées par ;)</label>
      <input type="text" name="dates_echeances" placeholder="01/05/2026; 01/06/2026; 01/07/2026" value="${escapeHtml(data.dates_echeances||"")}">
    </div>
    <div class="form-field">
      <label>Commentaires</label>
      <input type="text" name="commentaires" value="${escapeHtml(data.commentaires||"")}">
    </div>
  `;
  wrap.appendChild(datesGrid);

  // Comportement : clic sur suggestion → pré-remplit ref_doc + montant détecté
  wrap.querySelectorAll(".regl-suggest-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const txt = btn.dataset.text || "";
      // Tenter d'extraire un montant (1ère occurrence "X €" ou "X,XX")
      const m = txt.match(/(\d+[\d\s.,]*)\s*€/);
      if(m){
        const num = parseFloat(m[1].replace(/\s/g,"").replace(",","."));
        if(!isNaN(num)){
          const inp = wrap.querySelector('[name="montant"]');
          if(inp && !inp.value) inp.value = num;
        }
      }
      // Tenter d'extraire une référence type "BDC..." ou "FAC..."
      const r = txt.match(/(BDC[\d\-]+|FAC[\d\-]+|N°\s*[\w\-]+)/i);
      if(r){
        const inp = wrap.querySelector('[name="ref_doc"]');
        if(inp) inp.value = r[1];
      } else {
        const inp = wrap.querySelector('[name="ref_doc"]');
        if(inp && !inp.value) inp.value = txt.substring(0, 60);
      }
      toast("Référence pré-remplie depuis l'historique", "success");
    });
  });

  return wrap;
}

      <input type="text" name="rl_ref" placeholder="ex : FAC26-0142" value="${escapeHtml(l.ref||"")}">
      <input type="date" name="rl_date" value="${l.date||""}">
      <input type="number" name="rl_montant" min="0" step="0.01" placeholder="0.00" value="${l.montant||""}">
      <button type="button" class="btn sm outline" title="Supprimer">✕</button>
    `;
    row.querySelector("button").addEventListener("click", () => row.remove());
    linesWrap.appendChild(row);
  };

  if(data.factures && data.factures.length){
    data.factures.forEach(addRecouvLine);
  } else {
    addRecouvLine();
  }

  const btnAddFact = el("button", {class:"btn sm outline mt-1", type:"button", onclick: () => addRecouvLine()}, "+ Ajouter une facture");
  factWrap.appendChild(btnAddFact);
  wrap.appendChild(factWrap);

  // === Total dû ===
  const totalGrid = el("div", {class:"grid-2 mt-2"});
  totalGrid.innerHTML = `
    <div class="form-field">
      <label>Total créance restant due (€) — somme</label>
      <input type="number" name="montant_du" min="0" step="0.01" value="${data.montant_du || ""}">
    </div>
    <div class="form-field">
      <label>Date du recouvrement total visée</label>
      <input type="date" name="date_solde" value="${data.date_solde || ""}">
    </div>
  `;
  wrap.appendChild(totalGrid);

  wrap.appendChild(el("h4", {class:"mt-2 mb-1"}, "Échéancier négocié"));
  const echeanceGrid = el("div", {class:"grid-2"});
  echeanceGrid.innerHTML = `
    <div class="form-field">
      <label>Nombre d'échéances</label>
      <select name="nb_echeances">
        <option value="2" ${data.nb_echeances=="2"?"selected":""}>2 échéances</option>
        <option value="3" ${data.nb_echeances=="3"?"selected":""}>3 échéances</option>
        <option value="4" ${data.nb_echeances=="4"?"selected":""}>4 échéances</option>
        <option value="6" ${data.nb_echeances=="6"?"selected":""}>6 échéances</option>
      </select>
    </div>
    <div class="form-field">
      <label>Mode de paiement</label>
      <select name="mode">
        <option value="PRELEV" ${data.mode=="PRELEV"?"selected":""}>Prélèvement SEPA</option>
        <option value="CB" ${data.mode=="CB"?"selected":""}>Carte bancaire</option>
        <option value="CHEQUE" ${data.mode=="CHEQUE"?"selected":""}>Chèque</option>
        <option value="VIR" ${data.mode=="VIR"?"selected":""}>Virement</option>
      </select>
    </div>
    <div class="form-field">
      <label>Montant de chaque échéance (€)</label>
      <input type="number" name="montant_echeance" min="0" step="0.01" value="${data.montant_echeance||""}">
    </div>
    <div class="form-field">
      <label>Date 1ère échéance</label>
      <input type="date" name="date_premiere" value="${data.date_premiere||""}">
    </div>
  `;
  wrap.appendChild(echeanceGrid);

  const commGrid = el("div", {class:"grid-1 mt-2"});
  commGrid.innerHTML = `
    <div class="form-field">
      <label>Compte-rendu de la négociation / engagement client</label>
      <textarea name="cr_negociation" rows="4">${escapeHtml(data.cr_negociation||"")}</textarea>
    </div>
  `;
  wrap.appendChild(commGrid);

  return wrap;
}

/* ---------- Remontée client ---------- */
function buildRemonteeClient(client, cas, data){
  const wrap = el("div", {class:"outil-form"});

  wrap.appendChild(el("p", {class:"text-muted"}, "Fiche de remontée client : enregistrer une demande, une réclamation ou un retour client."));

  // === Mode : client existant / nouveau prospect ===
  // Pré-sélection : si client existe en BDD pour le cas en cours -> CLIENT, sinon PROSPECT
  const initialMode = data.mode || (client && client.ref ? "CLIENT" : "PROSPECT");

  const modeSelector = el("div", {class:"mode-selector mt-2 mb-2"});
  modeSelector.innerHTML = `
    <label class="mode-radio ${initialMode==='CLIENT'?'active':''}">
      <input type="radio" name="mode" value="CLIENT" ${initialMode==='CLIENT'?'checked':''}>
      <span class="mode-icon">👤</span>
      <span class="mode-text"><strong>Client existant</strong><small>Sélection dans la base</small></span>
    </label>
    <label class="mode-radio ${initialMode==='PROSPECT'?'active':''}">
      <input type="radio" name="mode" value="PROSPECT" ${initialMode==='PROSPECT'?'checked':''}>
      <span class="mode-icon">🆕</span>
      <span class="mode-text"><strong>Nouveau prospect</strong><small>Saisie libre</small></span>
    </label>
  `;
  wrap.appendChild(modeSelector);

  // === Bloc Client existant ===
  const blocClient = el("div", {class:"remontee-bloc bloc-client"});
  // Pré-sélectionner le client du cas en cours si pas de saisie ou saisie matchant
  const refSelected = data.client_ref || (client && client.ref) || "";
  const optionsHtml = STORE.clients.map(c =>
    `<option value="${escapeHtml(c.ref)}" ${c.ref===refSelected?"selected":""}>${escapeHtml(c.ref)} — ${escapeHtml(clientLabel(c))}</option>`
  ).join("");
  blocClient.innerHTML = `
    <div class="form-field">
      <label>Sélectionnez le client dans la base</label>
      <select name="client_ref" class="remontee-select">
        <option value="">— Choisir un client —</option>
        ${optionsHtml}
      </select>
    </div>
    <div class="remontee-client-info" id="remonteeClientInfo"></div>
  `;
  wrap.appendChild(blocClient);

  // === Bloc Nouveau prospect ===
  const blocProspect = el("div", {class:"remontee-bloc bloc-prospect"});
  blocProspect.innerHTML = `
    <div class="grid-2">
      <div class="form-field">
        <label>Nom / raison sociale</label>
        <input type="text" name="prospect_nom" value="${escapeHtml(data.prospect_nom||"")}" placeholder="Ex : DUPONT ou SARL DURAND">
      </div>
      <div class="form-field">
        <label>Prénom</label>
        <input type="text" name="prospect_prenom" value="${escapeHtml(data.prospect_prenom||"")}">
      </div>
      <div class="form-field">
        <label>Téléphone</label>
        <input type="tel" name="prospect_tel" value="${escapeHtml(data.prospect_tel||"")}">
      </div>
      <div class="form-field">
        <label>E-mail</label>
        <input type="email" name="prospect_mail" value="${escapeHtml(data.prospect_mail||"")}">
      </div>
      <div class="form-field" style="grid-column: span 2">
        <label>Ville / société d'activité (optionnel)</label>
        <input type="text" name="prospect_ville" value="${escapeHtml(data.prospect_ville||"")}">
      </div>
    </div>
  `;
  wrap.appendChild(blocProspect);

  // === Canal + description ===
  const grid = el("div", {class:"grid-1 mt-2"});
  grid.innerHTML = `
    <div class="form-field">
      <label>Canal de la demande</label>
      <select name="canal">
        <option value="">— Sélectionner —</option>
        <option value="TELEPHONE" ${data.canal==="TELEPHONE"?"selected":""}>Téléphone</option>
        <option value="TCHAT" ${data.canal==="TCHAT"?"selected":""}>Tchat</option>
        <option value="EMAIL" ${data.canal==="EMAIL"?"selected":""}>Email</option>
        <option value="COURRIER" ${data.canal==="COURRIER"?"selected":""}>Courrier</option>
        <option value="SMS" ${data.canal==="SMS"?"selected":""}>SMS</option>
      </select>
    </div>
    <div class="form-field">
      <label>Description de la demande</label>
      <textarea name="description" rows="3">${escapeHtml(data.description||"")}</textarea>
    </div>
    <div class="form-field">
      <label>Action(s) attendue(s)</label>
      <textarea name="actions" rows="3" placeholder="Email, RDV, SMS, courrier, autre…">${escapeHtml(data.actions||"")}</textarea>
    </div>
    <div class="form-field">
      <label>Commentaires</label>
      <textarea name="commentaires" rows="2">${escapeHtml(data.commentaires||"")}</textarea>
    </div>
  `;
  wrap.appendChild(grid);

  // --- Comportement dynamique ---
  function applyMode(mode){
    blocClient.style.display = (mode === "CLIENT") ? "block" : "none";
    blocProspect.style.display = (mode === "PROSPECT") ? "block" : "none";
    wrap.querySelectorAll(".mode-radio").forEach(l => {
      l.classList.toggle("active", l.querySelector("input").value === mode);
    });
  }
  function refreshClientInfo(){
    const sel = wrap.querySelector('[name="client_ref"]');
    const ref = sel ? sel.value : "";
    const c = STORE.clients.find(x => x.ref === ref);
    const box = wrap.querySelector("#remonteeClientInfo");
    if(!c){ box.innerHTML = ""; return; }
    const ci = clientInfo(c);
    const adr = [ci.adresse, [ci.cp, ci.ville].filter(Boolean).join(" ")].filter(Boolean).join(", ");
    box.innerHTML = `
      <div class="well text-small mt-1">
        <strong>${escapeHtml(clientLabel(c))}</strong> · <span class="badge-pill ${ci.journee===2?'pill-orange-mini':'pill-navy-mini'}">J${ci.journee}</span><br>
        ${ci.fonction ? '<small>' + escapeHtml(ci.fonction) + '</small><br>' : ''}
        ${escapeHtml(adr || "—")}<br>
        <small>${ci.fixe ? "<strong>Tél. :</strong> " + escapeHtml(ci.fixe) : ""}${ci.mail ? " · <strong>E-mail :</strong> " + escapeHtml(ci.mail) : ""}</small>
      </div>
    `;
  }

  applyMode(initialMode);
  refreshClientInfo();
  wrap.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener("change", e => applyMode(e.target.value)));
  const sel = wrap.querySelector('[name="client_ref"]');
  if(sel) sel.addEventListener("change", refreshClientInfo);

  return wrap;
}
