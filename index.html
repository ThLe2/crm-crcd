<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMK Performances — Plateforme de simulation Relation Client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CHARTE GRAPHIQUE TMK PERFORMANCES
   Bleu marine profond + orange corail (logo) / blanc / gris perle
   ============================================================ */
:root{
  --tmk-navy:        #1a2e5c;     /* couleur principale - identité TMK */
  --tmk-navy-2:      #243d75;     /* navy secondaire un peu + clair */
  --tmk-navy-3:      #0e1d3f;     /* navy foncé pour titres */
  --tmk-orange:      #f26749;     /* accent corail/orange du logo */
  --tmk-orange-2:    #e95234;     /* orange hover */
  --tmk-yellow:      #f7b733;     /* jaune secondaire (énergie) */
  --tmk-green:       #16a085;     /* validation / succès */
  --tmk-red:         #c0392b;     /* erreur / refus */
  --tmk-blue-soft:   #e8edf7;     /* fond doux navy */
  --tmk-orange-soft: #fdece6;     /* fond doux orange */

  --bg:              #f5f6fa;     /* fond app */
  --bg-card:         #ffffff;
  --bg-muted:        #f0f2f7;
  --border:          #e1e5ee;
  --border-strong:   #c7cee0;
  --text:            #1a2236;
  --text-muted:      #6b7280;
  --text-soft:       #9aa0b1;

  --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);
  --shadow:    0 4px 12px rgba(15,23,42,.08), 0 1px 3px rgba(15,23,42,.06);
  --shadow-lg: 0 12px 32px rgba(15,23,42,.12), 0 4px 12px rgba(15,23,42,.08);

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;

  --font-sans:    'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--font-sans);
  font-size:14.5px;
  line-height:1.55;
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
h1,h2,h3,h4{margin:0;line-height:1.25;color:var(--tmk-navy-3)}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.01em}
h2{font-size:1.25rem;font-weight:700}
h3{font-size:1.05rem;font-weight:700}
h4{font-size:.95rem;font-weight:700}
p{margin:.5rem 0}
a{color:var(--tmk-navy);text-decoration:none}
a:hover{color:var(--tmk-orange)}

/* ============================================================
   ÉCRAN DE CONNEXION
   ============================================================ */
.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  background:
    radial-gradient(circle at 15% 0%, rgba(242,103,73,.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 100%, rgba(26,46,92,.08) 0%, transparent 50%),
    linear-gradient(135deg, #f5f6fa 0%, #e8edf7 100%);
}
.login-card{
  width:100%;
  max-width:480px;
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:2.5rem 2.25rem;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:"";
  position:absolute; top:0; left:0; right:0; height:6px;
  background:linear-gradient(90deg, var(--tmk-navy) 0%, var(--tmk-orange) 100%);
}
.login-logo{
  display:flex; align-items:center; justify-content:center; gap:.6rem;
  margin-bottom:1.5rem;
}
.login-logo .badge{
  font-family:var(--font-display);
  font-size:1.6rem;
  font-weight:400;
  letter-spacing:.02em;
  color:var(--tmk-navy);
}
.login-logo .badge .accent{color:var(--tmk-orange)}
.login-subtitle{
  text-align:center;
  color:var(--text-muted);
  font-size:.92rem;
  margin-bottom:2rem;
}
.role-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.85rem;
  margin-bottom:1.5rem;
}
.role-btn{
  border:2px solid var(--border);
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:1.1rem .8rem;
  text-align:center;
  transition:all .18s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
  font-weight:600;
  font-size:.92rem;
  color:var(--text);
}
.role-btn .role-icon{
  font-size:1.6rem;
  line-height:1;
}
.role-btn:hover{
  border-color:var(--tmk-navy);
  transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.role-btn.active{
  border-color:var(--tmk-navy);
  background:var(--tmk-navy);
  color:#fff;
}
.role-btn.active.formateur{
  border-color:var(--tmk-orange);
  background:var(--tmk-orange);
}
.form-field{margin-bottom:1rem}
.form-field label{
  display:block;
  font-size:.82rem;
  font-weight:600;
  color:var(--text-muted);
  margin-bottom:.35rem;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.form-field input, .form-field textarea, .form-field select{
  width:100%;
  padding:.7rem .85rem;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  background:#fff;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.form-field input:focus, .form-field textarea:focus, .form-field select:focus{
  border-color:var(--tmk-navy);
  box-shadow:0 0 0 3px rgba(26,46,92,.12);
}
.btn-primary{
  width:100%;
  padding:.85rem 1rem;
  border:none;
  border-radius:var(--radius-sm);
  background:var(--tmk-navy);
  color:#fff;
  font-weight:700;
  font-size:.95rem;
  letter-spacing:.01em;
  transition:background .15s, transform .1s;
}
.btn-primary:hover{background:var(--tmk-navy-2)}
.btn-primary:active{transform:scale(.98)}
.btn-primary.orange{background:var(--tmk-orange)}
.btn-primary.orange:hover{background:var(--tmk-orange-2)}
.login-footer{
  margin-top:1.5rem;
  text-align:center;
  font-size:.78rem;
  color:var(--text-soft);
}

/* ============================================================
   APP - HEADER + NAVIGATION
   ============================================================ */
.app{display:none}
.app.visible{display:block}

.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:var(--shadow-sm);
}
.app-header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.65rem 1.5rem;
  max-width:1480px;
  margin:0 auto;
}
.brand{
  display:flex;align-items:center;gap:.6rem;
}
.brand-mark{
  font-family:var(--font-display);
  font-size:1.35rem;
  color:var(--tmk-navy);
}
.brand-mark .accent{color:var(--tmk-orange)}
.brand-tagline{
  font-size:.72rem;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  border-left:1px solid var(--border);
  padding-left:.7rem;
  margin-left:.2rem;
}
.user-chip{
  display:flex;align-items:center;gap:.7rem;
  font-size:.88rem;
}
.user-chip .who{
  display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;
}
.user-chip .who strong{color:var(--tmk-navy-3);font-weight:700;font-size:.9rem}
.user-chip .who small{color:var(--text-muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;
}
.avatar.formateur{background:linear-gradient(135deg, var(--tmk-orange) 0%, var(--tmk-yellow) 100%)}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.45rem .75rem;
  color:var(--text-muted);
  font-size:.82rem;
  font-weight:600;
  transition:all .15s;
}
.btn-ghost:hover{
  background:var(--bg-muted);
  color:var(--tmk-navy);
  border-color:var(--border-strong);
}

.app-nav{
  background:var(--tmk-navy-3);
  color:#fff;
}
.app-nav-inner{
  display:flex;
  gap:0;
  max-width:1480px;
  margin:0 auto;
  padding:0 1.5rem;
  overflow-x:auto;
}
.nav-tab{
  background:transparent;
  border:none;
  color:rgba(255,255,255,.7);
  padding:.85rem 1.1rem;
  font-size:.88rem;
  font-weight:600;
  position:relative;
  white-space:nowrap;
  transition:color .15s;
  border-bottom:3px solid transparent;
}
.nav-tab:hover{color:#fff}
.nav-tab.active{
  color:#fff;
  border-bottom-color:var(--tmk-orange);
}

.app-main{
  max-width:1480px;
  margin:0 auto;
  padding:1.5rem;
}

/* ============================================================
   COMPOSANTS GENERAUX
   ============================================================ */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem;
  box-shadow:var(--shadow-sm);
}
.card.no-pad{padding:0}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
  gap:1rem;
  flex-wrap:wrap;
}
.card-header h2{font-size:1.08rem}
.section-title{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text-muted);
  font-weight:700;
  margin:0 0 .65rem;
}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.5rem .85rem;
  background:var(--tmk-navy);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-weight:600;font-size:.85rem;
  transition:all .15s;
}
.btn:hover{background:var(--tmk-navy-2)}
.btn.orange{background:var(--tmk-orange)}
.btn.orange:hover{background:var(--tmk-orange-2)}
.btn.outline{
  background:transparent;color:var(--tmk-navy);border:1px solid var(--tmk-navy);
}
.btn.outline:hover{background:var(--tmk-blue-soft)}
.btn.danger{background:var(--tmk-red)}
.btn.danger:hover{background:#a93226}
.btn.sm{padding:.35rem .6rem;font-size:.78rem}
.btn[disabled]{opacity:.5;cursor:not-allowed}

.badge-pill{
  display:inline-block;
  font-size:.72rem;font-weight:700;
  padding:.18rem .55rem;
  border-radius:999px;
  text-transform:uppercase;letter-spacing:.04em;
}
.pill-navy{background:var(--tmk-blue-soft);color:var(--tmk-navy)}
.pill-orange{background:var(--tmk-orange-soft);color:var(--tmk-orange-2)}
.pill-green{background:#e6f6f1;color:var(--tmk-green)}
.pill-yellow{background:#fef4e0;color:#b8860b}
.pill-grey{background:var(--bg-muted);color:var(--text-muted)}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:960px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
}

.kpi{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem 1.1rem;
  display:flex;flex-direction:column;gap:.25rem;
  position:relative;overflow:hidden;
}
.kpi::before{
  content:"";position:absolute;top:0;left:0;height:100%;width:4px;
  background:var(--tmk-navy);
}
.kpi.orange::before{background:var(--tmk-orange)}
.kpi.green::before{background:var(--tmk-green)}
.kpi.yellow::before{background:var(--tmk-yellow)}
.kpi-label{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700}
.kpi-value{font-size:1.7rem;font-weight:800;color:var(--tmk-navy-3);line-height:1}
.kpi-sub{font-size:.78rem;color:var(--text-muted)}

/* Tables */
table.table{
  width:100%;
  border-collapse:collapse;
  font-size:.88rem;
}
table.table th{
  text-align:left;
  font-weight:700;
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--text-muted);
  padding:.55rem .75rem;
  border-bottom:2px solid var(--border);
  background:var(--bg-muted);
}
table.table td{
  padding:.65rem .75rem;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
table.table tr:hover td{background:#fafbff}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(2px);
  display:none;
  align-items:center;justify-content:center;
  z-index:200;
  padding:1rem;
}
.modal-backdrop.visible{display:flex}
.modal{
  background:#fff;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  width:100%;
  max-width:720px;
  max-height:90vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.modal.large{max-width:1080px}
.modal.small{max-width:460px}
.modal-head{
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
}
.modal-head h3{font-size:1.05rem}
.modal-close{
  background:transparent;border:none;
  font-size:1.5rem;line-height:1;color:var(--text-muted);
  cursor:pointer;padding:.2rem .4rem;border-radius:var(--radius-sm);
}
.modal-close:hover{background:var(--bg-muted);color:var(--tmk-navy)}
.modal-body{
  padding:1.25rem;
  overflow-y:auto;
  flex:1;
}
.modal-foot{
  padding:1rem 1.25rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:.6rem;
  background:var(--bg-muted);
}

/* Toast */
.toast-zone{
  position:fixed;
  bottom:1.5rem;right:1.5rem;
  z-index:300;
  display:flex;flex-direction:column;gap:.5rem;
  pointer-events:none;
}
.toast{
  background:var(--tmk-navy-3);
  color:#fff;
  padding:.7rem 1.1rem;
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  font-size:.88rem;
  font-weight:500;
  animation:slideIn .25s ease;
  max-width:340px;
  pointer-events:auto;
  display:flex;align-items:center;gap:.5rem;
}
.toast.success{background:var(--tmk-green)}
.toast.error{background:var(--tmk-red)}
.toast.warn{background:var(--tmk-yellow);color:#3a2a00}
@keyframes slideIn{
  from{transform:translateX(20px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

/* ============================================================
   ACCUEIL STAGIAIRE
   ============================================================ */
.welcome-banner{
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;
  border-radius:var(--radius-lg);
  padding:1.75rem 2rem;
  margin-bottom:1.5rem;
  position:relative;
  overflow:hidden;
}
.welcome-banner::after{
  content:"";
  position:absolute;
  top:-30px;right:-30px;
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(242,103,73,.25) 0%, transparent 70%);
}
.welcome-banner h1{color:#fff;margin-bottom:.4rem}
.welcome-banner p{margin:0;color:rgba(255,255,255,.85);font-size:.95rem;max-width:680px;position:relative;z-index:1}
.welcome-banner .actions{margin-top:1.1rem;display:flex;gap:.6rem;flex-wrap:wrap;position:relative;z-index:1}
.welcome-banner .btn{background:#fff;color:var(--tmk-navy);font-weight:700}
.welcome-banner .btn:hover{background:var(--tmk-orange-soft);color:var(--tmk-orange-2)}
.welcome-banner .btn.orange{background:var(--tmk-orange);color:#fff}
.welcome-banner .btn.orange:hover{background:var(--tmk-orange-2)}

/* Grid d'activités */
.activity-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1rem;
  margin-bottom:1.25rem;
}
.activity-tile{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem 1.1rem;
  text-align:left;
  cursor:pointer;
  transition:all .18s ease;
  display:flex;flex-direction:column;gap:.5rem;
  position:relative;overflow:hidden;
  min-height:130px;
}
.activity-tile::before{
  content:"";
  position:absolute;
  bottom:-30px;right:-30px;
  width:90px;height:90px;border-radius:50%;
  background:var(--tmk-blue-soft);
  transition:all .18s ease;
  z-index:0;
}
.activity-tile:hover{
  border-color:var(--tmk-navy);
  transform:translateY(-3px);
  box-shadow:var(--shadow);
}
.activity-tile:hover::before{background:var(--tmk-orange-soft);transform:scale(1.4)}
.activity-tile > *{position:relative;z-index:1}
.activity-tile .num{
  font-family:var(--font-display);
  font-size:1.7rem;
  color:var(--tmk-navy);
  line-height:1;
}
.activity-tile.active-tile{border-color:var(--tmk-orange);background:var(--tmk-orange-soft)}
.activity-tile.active-tile::before{background:rgba(242,103,73,.22)}
.activity-tile h4{color:var(--tmk-navy-3)}
.activity-tile small{color:var(--text-muted);font-size:.8rem}

/* ============================================================
   CRM - SIMULATION D'APPEL
   ============================================================ */
.crm{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:1rem;
  align-items:start;
}
@media(max-width:1100px){
  .crm{grid-template-columns:1fr}
}
.crm-aside{
  position:sticky;top:5rem;
}
.client-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.client-card-head{
  background:linear-gradient(135deg, var(--tmk-navy) 0%, var(--tmk-navy-2) 100%);
  color:#fff;padding:1rem 1.1rem;
}
.client-card-head .ref{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.7);font-weight:700;
}
.client-card-head h3{
  color:#fff;font-size:1.1rem;margin-top:.15rem;
}
.client-card-head .society{
  color:rgba(255,255,255,.85);font-size:.85rem;
}
.client-card-body{
  padding:1rem 1.1rem;
}
.field-row{
  display:flex;justify-content:space-between;
  padding:.4rem 0;
  border-bottom:1px dashed var(--border);
  font-size:.85rem;
}
.field-row:last-child{border-bottom:none}
.field-row .lbl{color:var(--text-muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.field-row .val{color:var(--text);text-align:right;font-weight:500;max-width:62%;word-break:break-word}
.field-row .val.mono{font-variant-numeric:tabular-nums}

.action-bar{
  display:flex;flex-wrap:wrap;gap:.4rem;
  padding:.85rem 1.1rem;
  border-top:1px solid var(--border);
  background:var(--bg-muted);
}

/* History timeline */
.timeline{
  list-style:none;padding:0;margin:0;
  position:relative;
}
.timeline::before{
  content:"";position:absolute;left:11px;top:6px;bottom:6px;
  width:2px;background:var(--border);
}
.timeline li{
  position:relative;
  padding:.4rem 0 .8rem 2.2rem;
  font-size:.88rem;
}
.timeline li::before{
  content:"";
  position:absolute;left:5px;top:.55rem;
  width:14px;height:14px;border-radius:50%;
  background:var(--tmk-navy);
  border:3px solid #fff;
  box-shadow:0 0 0 1px var(--border);
}
.timeline li.new::before{background:var(--tmk-orange)}
.timeline .when{
  font-size:.74rem;color:var(--text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
}
.timeline .what{display:block;color:var(--text);margin-top:.1rem}
.timeline .who-edit{font-size:.72rem;color:var(--text-soft);margin-top:.1rem}
.timeline-empty{
  text-align:center;padding:1.25rem;color:var(--text-muted);
  background:var(--bg-muted);border-radius:var(--radius-sm);
  font-size:.85rem;font-style:italic;
}

/* Mission box */
.mission-box{
  background:linear-gradient(135deg, var(--tmk-orange-soft) 0%, #fff5ed 100%);
  border:1px solid #f9c4b3;
  border-left:4px solid var(--tmk-orange);
  border-radius:var(--radius);
  padding:1rem 1.1rem;
  margin-bottom:1rem;
}
.mission-box h4{
  font-size:.78rem;color:var(--tmk-orange-2);
  text-transform:uppercase;letter-spacing:.05em;
  margin-bottom:.4rem;
}
.mission-box p{margin:0;color:var(--tmk-navy-3);font-size:.92rem;line-height:1.55}

/* Tabs (sub-tabs inside main panel) */
.subtabs{
  display:flex;gap:.25rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1rem;
}
.subtab{
  background:transparent;border:none;
  padding:.6rem .9rem;
  font-size:.85rem;font-weight:600;
  color:var(--text-muted);
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all .15s;
}
.subtab:hover{color:var(--tmk-navy)}
.subtab.active{
  color:var(--tmk-navy);
  border-bottom-color:var(--tmk-orange);
}

/* ============================================================
   FORM-LIKE INPUTS in panels
   ============================================================ */
.input-row{display:flex;gap:.5rem;align-items:flex-start;flex-wrap:wrap}
.input-row > *{flex:1;min-width:0}
textarea{min-height:80px;resize:vertical}
.well{
  background:var(--bg-muted);
  border-radius:var(--radius-sm);
  padding:1rem;
}

/* Checkbox / radio group */
.checkbox-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:.5rem;
}
.checkbox-grid label{
  display:flex;align-items:center;gap:.5rem;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:.55rem .75rem;
  font-size:.85rem;cursor:pointer;
  transition:all .12s;
}
.checkbox-grid label:hover{border-color:var(--tmk-navy)}
.checkbox-grid input[type=checkbox]:checked + span{font-weight:700;color:var(--tmk-navy)}

/* ============================================================
   ADMIN (formateur) - TABLES + EDITION
   ============================================================ */
.admin-toolbar{
  display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;
  margin-bottom:1rem;
}
.admin-toolbar .search{
  flex:1;min-width:200px;
  padding:.55rem .85rem;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  font-size:.88rem;
}
.admin-toolbar .search:focus{
  outline:none;border-color:var(--tmk-navy);box-shadow:0 0 0 3px rgba(26,46,92,.12);
}

.admin-table-wrap{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
}
.admin-table-wrap .scroll{
  max-height:65vh;overflow:auto;
}

.row-actions{display:flex;gap:.3rem}
.icon-btn{
  background:transparent;border:1px solid transparent;
  padding:.3rem .5rem;border-radius:var(--radius-sm);
  font-size:.78rem;font-weight:600;
  color:var(--text-muted);cursor:pointer;
}
.icon-btn:hover{background:var(--bg-muted);color:var(--tmk-navy)}
.icon-btn.danger:hover{background:#fdecea;color:var(--tmk-red)}

/* ============================================================
   OUTILS CONSEILLER (V2)
   ============================================================ */
.tools-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1rem;
  margin-top:1rem;
}
.tool-tile{
  position:relative;
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.25rem 1rem;
  cursor:pointer;
  text-align:center;
  transition:all .15s ease;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  gap:.4rem;
}
.tool-tile:hover{
  border-color:var(--tmk-orange);
  box-shadow:0 6px 16px rgba(26,46,92,.08);
  transform:translateY(-2px);
}
.tool-emoji{font-size:2rem;line-height:1}
.tool-title{font-weight:700;color:var(--tmk-navy);font-size:1rem}
.tool-desc{font-size:.82rem;color:var(--text-muted);line-height:1.35}
.tool-badge{
  position:absolute;top:.5rem;right:.5rem;
  background:var(--success);color:#fff;font-size:.7rem;
  padding:.15rem .5rem;border-radius:8px;font-weight:600;
}

/* Outils form */
.outil-form{display:flex;flex-direction:column;gap:.75rem}
.outil-form .grid-1{display:grid;grid-template-columns:1fr;gap:1rem}
.well-warning{
  background:#fff7e6;border-left:4px solid #f7b733;
  padding:.85rem 1rem;border-radius:8px;color:#7a5800;
  font-size:.92rem;
}
.radio-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.6rem;
}
.radio-card{
  display:flex;flex-direction:column;gap:.2rem;
  border:2px solid var(--border);border-radius:10px;
  padding:.75rem;cursor:pointer;transition:all .15s;
}
.radio-card:has(input:checked){
  border-color:var(--tmk-orange);
  background:#fff5f1;
}
.radio-card input{margin-bottom:.25rem}
.radio-card strong{color:var(--tmk-navy);font-size:.95rem}
.radio-card small{color:var(--text-muted);font-size:.78rem;line-height:1.3}

/* Bon de commande grid */
.grid-bdc{
  display:grid;
  grid-template-columns:90px 60px 1fr 100px 80px 36px;
  gap:.5rem;align-items:center;margin-bottom:.4rem;
}
.grid-bdc input{padding:.45rem .5rem;font-size:.88rem}
.bdc-head{font-weight:600;font-size:.8rem;color:var(--text-muted);padding:.2rem 0}
.bdc-head>div{padding:0 .4rem}
@media (max-width:880px){
  .grid-bdc{grid-template-columns:1fr 1fr;gap:.4rem}
  .bdc-head{display:none}
}

/* Modal large */
#modalBox.large{max-width:980px}
#modalBox.small{max-width:560px}

/* Sélecteur Journée */
.journee-selector{
  display:flex;align-items:center;gap:1rem;
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:.85rem 1.25rem;
  flex-wrap:wrap;
}
.journee-label{
  font-weight:600;color:var(--tmk-navy);font-size:.92rem;
}
.journee-tabs{
  display:flex;gap:.4rem;flex-wrap:wrap;
}
.journee-tab{
  background:#f5f6fa;color:var(--text);
  border:1.5px solid transparent;border-radius:8px;
  padding:.45rem 1.1rem;font-weight:600;font-size:.9rem;
  cursor:pointer;font-family:inherit;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:.4rem;
}
.journee-tab:hover{background:#e8eaf3}
.journee-tab.active{
  background:var(--tmk-navy);color:#fff;
  border-color:var(--tmk-navy);
}
.pill-orange-mini{
  background:#fff4ef;color:#c43e1a;
  font-size:.7rem;font-weight:700;padding:.1rem .45rem;
  border-radius:6px;letter-spacing:.3px;
}
.pill-navy-mini{
  background:#e8ecf6;color:var(--tmk-navy);
  font-size:.7rem;font-weight:700;padding:.1rem .45rem;
  border-radius:6px;letter-spacing:.3px;
}
.activity-tile{position:relative}

/* ============== ACCÈS RAPIDE ============== */
.quick-access-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  background:#fff4ef;color:#c43e1a;
  border:1.5px solid #ffd9c8;border-radius:8px;
  padding:.5rem .85rem;font-weight:600;font-size:.9rem;
  cursor:pointer;font-family:inherit;
  transition:all .15s;
  margin-right:.6rem;
}
.quick-access-btn:hover{
  background:var(--tmk-orange);color:#fff;border-color:var(--tmk-orange);
  transform:translateY(-1px);
  box-shadow:0 2px 6px rgba(242,103,73,.25);
}
.qa-icon{font-size:1rem;line-height:1}
@media(max-width: 600px){
  .qa-label{display:none}
}

/* Modale d'accès rapide */
.qa-grid{
  display:grid;grid-template-columns:repeat(2, 1fr);gap:.85rem;
  margin-top:.5rem;
}
.qa-tile{
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:1.1rem 1rem;text-align:left;cursor:pointer;
  display:flex;flex-direction:column;gap:.3rem;
  font-family:inherit;transition:all .15s;
}
.qa-tile:hover{
  border-color:var(--tmk-orange);
  background:#fff4ef;
  transform:translateY(-2px);
}
.qa-tile-emoji{font-size:1.6rem;line-height:1}
.qa-tile-title{font-weight:700;color:var(--tmk-navy);font-size:1rem}
.qa-tile-desc{font-size:.82rem;color:var(--text-muted);line-height:1.3}
@media(max-width: 600px){
  .qa-grid{grid-template-columns:1fr}
}

/* ============== CLIENT PANEL (dépliable) ============== */
.client-panel{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  margin-bottom:1rem;overflow:hidden;
}
.client-panel-empty{
  padding:.8rem 1rem;color:var(--text-muted);font-style:italic;
}
.client-panel-header{
  width:100%;display:flex;align-items:center;gap:.6rem;
  background:#f5f6fa;border:none;
  padding:.7rem 1rem;cursor:pointer;font-family:inherit;
  text-align:left;font-size:.92rem;
  color:var(--text);transition:background .15s;
}
.client-panel-header:hover{background:#eaecf3}
.client-panel.open .client-panel-header{background:#e8ecf6;border-bottom:1px solid var(--border)}
.cp-arrow{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;color:var(--tmk-navy);font-size:.7rem;flex-shrink:0;
}
.cp-label{flex:1;color:var(--tmk-navy)}
.cp-fonction,.cp-ville{color:var(--text-muted);font-weight:400;font-size:.85rem}
.cp-sub{
  color:var(--text-muted);font-size:.8rem;font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
@media(max-width: 720px){
  .cp-sub{display:none}
}
.client-panel-body{display:none;padding:1rem 1.25rem;background:#fcfcfd}
.client-panel.open .client-panel-body{display:block}
.client-panel-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;
}
@media(max-width:720px){
  .client-panel-grid{grid-template-columns:1fr}
}
.client-panel-col h5{
  margin:0 0 .55rem 0;color:var(--tmk-navy);font-size:.92rem;
  border-bottom:2px solid var(--tmk-orange);padding-bottom:.3rem;
}
.cp-dl{display:grid;grid-template-columns:auto 1fr;gap:.3rem .8rem;margin:0;font-size:.85rem}
.cp-dl dt{color:var(--text-muted);font-weight:600;white-space:nowrap}
.cp-dl dd{margin:0;color:var(--text);font-variant-numeric:tabular-nums}
.cp-events{display:flex;flex-direction:column;gap:.45rem}
.cp-event{
  display:grid;grid-template-columns:80px 1fr;gap:.6rem;
  font-size:.85rem;align-items:start;
}
.cp-event-date{
  color:var(--tmk-navy);font-weight:600;
  font-variant-numeric:tabular-nums;font-size:.8rem;
  background:#e8ecf6;padding:.15rem .4rem;border-radius:4px;
  text-align:center;height:fit-content;
}
.cp-event-text{color:var(--text);line-height:1.35}
.client-panel-mission{
  margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border);
}
.client-panel-mission h5{
  margin:0 0 .4rem 0;color:var(--tmk-navy);font-size:.9rem;
}
.client-panel-mission p{margin:0;font-size:.88rem;color:var(--text);line-height:1.45}

/* ============== MODE SELECTOR (Remontée) ============== */
.mode-selector{
  display:grid;grid-template-columns:1fr 1fr;gap:.8rem;
}
.mode-radio{
  display:flex;align-items:center;gap:.7rem;
  background:#fff;border:2px solid var(--border);border-radius:10px;
  padding:.85rem 1rem;cursor:pointer;
  transition:all .15s;
}
.mode-radio:hover{border-color:#cbd0e0}
.mode-radio.active{
  border-color:var(--tmk-orange);
  background:#fff4ef;
  box-shadow:0 2px 8px rgba(242,103,73,.15);
}
.mode-radio input[type=radio]{margin:0;cursor:pointer}
.mode-icon{font-size:1.6rem;line-height:1}
.mode-text{display:flex;flex-direction:column;gap:.1rem;flex:1}
.mode-text strong{color:var(--tmk-navy);font-size:.95rem}
.mode-text small{color:var(--text-muted);font-size:.8rem}
@media(max-width:600px){.mode-selector{grid-template-columns:1fr}}

.remontee-bloc{
  background:#fcfcfd;border:1px solid var(--border);border-radius:8px;
  padding:.9rem 1rem;margin-bottom:.6rem;
}
.remontee-select{font-family:inherit}
.remontee-client-info{margin-top:.4rem}

/* ============== RECOUVREMENT (factures) ============== */
.recouv-checklist{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:.4rem;display:flex;flex-direction:column;gap:.2rem;
}
.recouv-check-row{
  display:grid;grid-template-columns:auto 90px 1fr;gap:.6rem;
  padding:.45rem .6rem;border-radius:6px;cursor:pointer;
  align-items:start;font-size:.88rem;
}
.recouv-check-row:hover{background:#fff4ef}
.recouv-check-row input[type=checkbox]{margin:.2rem 0 0 0;cursor:pointer}
.recouv-evt-date{
  color:var(--tmk-navy);font-weight:600;font-size:.8rem;
  background:#e8ecf6;padding:.15rem .35rem;border-radius:4px;
  text-align:center;height:fit-content;
  font-variant-numeric:tabular-nums;
}
.recouv-evt-text{color:var(--text);line-height:1.4}

.grid-recouv{
  display:grid;grid-template-columns:2fr 1.2fr 1fr 30px;gap:.5rem;
}
.recouv-head{font-weight:600;color:var(--text-muted);padding:.3rem .2rem}
.recouv-line{padding:.15rem 0}
@media(max-width:600px){.grid-recouv{grid-template-columns:1fr 1fr}}

/* Suggestion règlement */
.regl-suggestions{display:flex;flex-direction:column;gap:.25rem;margin-top:.4rem}
.regl-suggest-btn{
  background:#fff;border:1px solid var(--border);border-radius:6px;
  padding:.4rem .7rem;cursor:pointer;font-family:inherit;
  text-align:left;font-size:.82rem;color:var(--text);
  transition:all .15s;
}
.regl-suggest-btn:hover{
  background:#fff4ef;border-color:var(--tmk-orange);
}

/* ============== ACCÈS RAPIDE — APERÇUS ============== */
.qa-ref-content{font-size:.92rem}
.qa-ref-content h3{
  color:var(--tmk-navy);font-size:1.05rem;margin:.6rem 0 .4rem 0;
  border-bottom:2px solid var(--tmk-orange);padding-bottom:.25rem;
}
.qa-cat-list{display:flex;flex-direction:column;gap:.35rem;max-height:540px;overflow-y:auto}
.qa-cat-row{
  display:grid;grid-template-columns:90px 1fr 100px;gap:.6rem;
  background:#fcfcfd;border:1px solid var(--border);border-radius:6px;
  padding:.5rem .75rem;font-size:.85rem;align-items:start;
}
.qa-cat-ref{color:var(--tmk-navy);font-variant-numeric:tabular-nums}
.qa-cat-des{display:flex;flex-direction:column;gap:.2rem;line-height:1.3}
.qa-cat-des strong{color:var(--text)}
.qa-cat-des .badge-pill{align-self:flex-start;margin-top:.1rem}
.qa-cat-price{
  text-align:right;font-variant-numeric:tabular-nums;
  color:var(--tmk-navy);font-size:.85rem;
}
.qa-cat-price small{color:var(--text-muted);font-size:.75rem}
.qa-centres-list{max-height:520px;overflow-y:auto}
.cgv-section-lite{
  background:#fff;border:1px solid var(--border);border-radius:6px;
  padding:.4rem .75rem;margin-bottom:.4rem;
}
.cgv-section-lite summary{
  cursor:pointer;padding:.3rem 0;color:var(--tmk-navy);
  list-style:revert;
}
.cgv-section-lite summary:hover{color:var(--tmk-orange)}
.cgv-section-lite .cgv-content{
  margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);
  font-size:.88rem;line-height:1.5;color:var(--text);
}

/* ============== ONGLETS DANS LA MODALE OUTIL ============== */
.outil-tabs{
  display:flex;gap:.25rem;
  border-bottom:2px solid var(--border);
  margin:.5rem 0 1rem 0;
}
.outil-tab{
  background:transparent;border:none;
  padding:.7rem 1.25rem;cursor:pointer;
  font-family:inherit;font-size:.95rem;font-weight:600;
  color:var(--text-muted);
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:all .15s;
}
.outil-tab:hover{color:var(--tmk-navy)}
.outil-tab.active{
  color:var(--tmk-navy);
  border-bottom-color:var(--tmk-orange);
}
.outil-pane{display:none}
.outil-pane.active{display:block}

.ref-subtabs{
  display:flex;gap:.3rem;flex-wrap:wrap;
  background:#f5f6fa;border-radius:8px;
  padding:.3rem;margin-bottom:.85rem;
}
.ref-subtab{
  background:transparent;border:none;
  padding:.5rem .9rem;cursor:pointer;border-radius:6px;
  font-family:inherit;font-size:.85rem;font-weight:600;
  color:var(--text-muted);transition:all .15s;
}
.ref-subtab:hover{background:rgba(255,255,255,.6);color:var(--tmk-navy)}
.ref-subtab.active{
  background:#fff;color:var(--tmk-navy);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.ref-content{min-height:200px}

/* CGV */
.cgv-section{
  border-bottom:1px solid var(--border);
  padding:.85rem 0;
}
.cgv-section:last-child{border-bottom:none}
.cgv-section summary{
  cursor:pointer;
  font-weight:600;
  color:var(--tmk-navy);
  font-size:1rem;
  padding:.3rem 0;
  list-style:none;
  display:flex;
  align-items:center;
  gap:.5rem;
}
.cgv-section summary::-webkit-details-marker{display:none}
.cgv-section summary::before{
  content:"▸";
  display:inline-block;
  transition:transform .2s;
  color:var(--tmk-orange);
}
.cgv-section[open] summary::before{transform:rotate(90deg)}
.cgv-num{
  display:inline-block;
  background:var(--tmk-navy);
  color:#fff;
  padding:.15rem .55rem;
  border-radius:6px;
  font-size:.8rem;
  font-weight:700;
  letter-spacing:.5px;
}
.cgv-content{
  padding:.6rem 0 .3rem 1.6rem;
  color:var(--text);
  font-size:.92rem;
  line-height:1.6;
}
.grid-bdc-cgv{
  display:grid;
  grid-template-columns:60px 1fr 36px 36px 36px;
  gap:.4rem;align-items:center;
  margin-bottom:.5rem;
}
.cgv-edit-row textarea{
  width:100%;font-family:inherit;font-size:.88rem;
  padding:.5rem;border:1px solid var(--border);border-radius:6px;
}

/* ============================================================
   PRINT (PDF generation)
   ============================================================ */
@media print{
  .no-print{display:none !important}
  body{background:#fff;font-size:11pt}
  .print-only{display:block !important}
  .print-page{
    page-break-after:always;
    padding:1cm;
    max-width:none;
  }
  .print-page:last-child{page-break-after:auto}
  h1{font-size:18pt}
  h2{font-size:13pt}
  h3{font-size:11pt}
}
.print-only{display:none}
.print-page{padding:1.5cm;background:#fff;max-width:21cm;margin:0 auto;border:1px solid var(--border)}
.print-header{
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:3px solid var(--tmk-navy);
  padding-bottom:.6rem;margin-bottom:1rem;
}
.print-header .brand-mark{font-size:1.4rem}
.print-meta{
  font-size:.78rem;color:var(--text-muted);text-align:right;
}
.print-section{margin-bottom:1.1rem}
.print-section h3{
  background:var(--tmk-navy);color:#fff;
  padding:.35rem .7rem;border-radius:var(--radius-sm);
  font-size:.95rem;
  margin-bottom:.5rem;
}
.print-section .info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.5rem;
  font-size:.92rem;
}
.print-section .info-grid div span:first-child{
  font-weight:700;color:var(--tmk-navy);
  display:inline-block;min-width:130px;
}
.print-section .narrative{
  background:var(--bg-muted);
  padding:.7rem .9rem;border-radius:var(--radius-sm);
  font-size:.92rem;
  white-space:pre-wrap;line-height:1.55;
}
.print-section .narrative.role{
  background:var(--tmk-orange-soft);
  border-left:4px solid var(--tmk-orange);
}

/* ============================================================
   MANUAL d'utilisation
   ============================================================ */
.manual-toc{
  background:var(--bg-muted);
  padding:1rem 1.25rem;border-radius:var(--radius);
  margin-bottom:1.25rem;
}
.manual-toc ul{margin:.4rem 0 0;padding-left:1.2rem}
.manual-toc a{font-weight:600}
.manual section{margin-bottom:1.5rem}
.manual h2{
  border-bottom:2px solid var(--tmk-orange);
  padding-bottom:.3rem;margin-bottom:.7rem;
}
.manual h3{margin-top:1rem;color:var(--tmk-navy)}
.manual .keybox{
  background:var(--bg-muted);
  padding:.85rem 1rem;border-left:3px solid var(--tmk-orange);
  border-radius:var(--radius-sm);margin:.6rem 0;
  font-size:.9rem;
}
.manual ol li,.manual ul li{margin:.25rem 0}

/* ============================================================
   UTIL
   ============================================================ */
.text-muted{color:var(--text-muted)}
.text-small{font-size:.82rem}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}.mb-3{margin-bottom:1.5rem}
.flex{display:flex}.between{justify-content:space-between}.center{align-items:center}
.gap-1{gap:.4rem}.gap-2{gap:.8rem}
.hide{display:none !important}
.divider{height:1px;background:var(--border);margin:1rem 0}

/* Empty state */

<!-- ======================================================
     ECRAN DE CONNEXION (login screen)
     ====================================================== -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="badge"><strong>TMK</strong> <span class="accent">Performances</span></span>
    </div>
    <p class="login-subtitle">
      Plateforme de simulation d'appels — Relation Client à distance
    </p>

    <div class="role-buttons">
      <button class="role-btn" data-role="stagiaire" type="button">
        <span class="role-icon">🎓</span>
        <span>Stagiaire</span>
      </button>
      <button class="role-btn formateur" data-role="formateur" type="button">
        <span class="role-icon">👤</span>
        <span>Formateur</span>
      </button>
    </div>

    <div class="form-field" id="loginNameField">
      <label for="loginName">Votre nom et prénom</label>
      <input type="text" id="loginName" autocomplete="off" placeholder="Ex : Martin DUPONT" />
    </div>

    <div class="form-field" id="formateurSelectField" style="display:none">
      <label for="formateurSelect">Sélectionnez votre identité</label>
      <select id="formateurSelect">
        <option value="">— Choisir —</option>
      </select>
    </div>

    <div class="form-field" id="formateurPwdField" style="display:none">
      <label for="loginPwd">Code formateur</label>
      <input type="password" id="loginPwd" autocomplete="off" />
    </div>

    <button class="btn-primary" id="btnLogin" type="button">Accéder à la plateforme</button>

    <div class="login-footer">
      © TMK Performances — Centre de formation Relation Client à Distance · Wasquehal
    </div>
  </div>
</div>

<!-- ======================================================
     APPLICATION
     ====================================================== -->
<div id="app" class="app">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <span class="brand-mark"><strong>TMK</strong> <span class="accent">Performances</span></span>
        <span class="brand-tagline">On The Road · Simulation Relation Client</span>
      </div>
      <div class="user-chip">
        <button class="quick-access-btn" id="btnQuickAccess" type="button" title="Accès rapide aux références">
          <span class="qa-icon">📚</span>
          <span class="qa-label">Références</span>
        </button>
        <div class="who">
          <strong id="userName">—</strong>
          <small id="userRole">—</small>
        </div>
        <div class="avatar" id="userAvatar">??</div>
        <button class="btn-ghost" id="btnLogout" type="button">Déconnexion</button>
      </div>
    </div>
  </header>

  <nav class="app-nav">
    <div class="app-nav-inner" id="navTabs">
      <!-- Tabs injected by JS based on role -->
    </div>
  </nav>

  <main class="app-main" id="mainView">
    <!-- View injected by JS -->
  </main>
</div>

<div class="modal-backdrop" id="modal">

e n'est pas résolu aujourd'hui.","objet":"Commande BDC26-0142 du 12/03/2026 : 4 × Michelin Primacy 4 205/55 R16 91V à 135 € HT/unité = 540 € HT (648 € TTC). Prélèvement effectué le 22/03 sur compte SEPA. 1 pneu réceptionné défectueux, 1 pneu manquant.","profil":"Vous restez professionnel mais ferme. Vous lâchez progressivement (si on vous écoute vraiment) : (1) vous avez perdu un client à cause de ça, (2) vous êtes prêt à accepter un remplacement RAPIDE + un avoir de 50% sur les 2 pneus défectueux, (3) vous voulez aussi un mail récapitulatif daté pour vos archives. Si le conseiller est lent ou minimise, vous montez en pression en mentionnant la DGCCRF.","journee":2,"client_ref":"J2-01"},{"num_appel":"J2-02","activite_type":"II","competence_canal":"Conseil et vente B to B avec parrainage et RDV commercial - Téléphone + Email","role":"Vous êtes Émilie CHARTIER, responsable du parc de 12 véhicules utilitaires (Renault Trafic et Citroën Jumpy) chez Transports CHARTIER & Fils. Vous avez été parrainée par votre confrère Marie FALAIZE du Garage LEFOUR qui vous a vanté les prix d'ON THE ROAD. Vous demandez un devis pour équiper TOUS vos utilitaires en pneus hiver avant novembre prochain. Votre budget global est de 6 500 € HT mais vous n'en parlerez que si on vous le demande clairement.","objet":"12 utilitaires Renault Trafic et Citroën Jumpy. Dimensions à valider (probablement 215/65 R16C). Pneus hiver. Budget cible 6 500 € HT. Référence parrain : 1-04 (Marie FALAIZE - Garage LEFOUR).","profil":"Vous êtes pressée, professionnelle, vous coupez la parole. Vous voulez : (1) un prix au pneu et un total HT, (2) une remise volume (vous attendez 10-15%), (3) une visite commerciale pour valider le contrat. Si on ne vous propose pas spontanément un RDV avec le commercial, vous demandez. Vous mentionnez aussi vos 8 chauffeurs comme potentiels filleuls.","journee":2,"client_ref":"J2-02"},{"num_appel":"J2-03","activite_type":"II","competence_canal":"Recouvrement amiable et négociation d'échéancier - B to C - Téléphone + SMS + Courrier","role":"Vous êtes Frédéric DELANNOY, particulier, en CDI mais en difficulté depuis 2 mois suite à un divorce. Vous savez très bien que vous devez 190 € (+15 € frais) à ON THE ROAD. Vous êtes embarrassé, presque honteux. Vous proposez de payer mais pas en une fois. Si on vous propose un nouvel échéancier, vous acceptez à condition que les mensualités ne dépassent pas 50 €. Vous préférez un prélèvement automatique pour ne pas oublier.","objet":"Solde dû : 205 € (190 € capital restant + 15 € frais bancaires de rejet). Initialement 285 € en 3 mensualités de 95 €. Une seule échéance honorée (95 € le 08/02/2026).","profil":"Vous êtes calme, conciliant, presque trop. Si on vous demande votre situation, vous expliquez le divorce. Vous lâchez : (1) vous pouvez payer 50 €/mois max, (2) vous préférez un prélèvement, (3) vous voulez surtout être tranquille. Si le conseiller est dur ou menaçant, vous vous fermez et raccrochez sans rien régler.","journee":2,"client_ref":"J2-03"},{"num_appel":"J2-04","activite_type":"II","competence_canal":"Gérer une demande de rétractation hors délai et appliquer les CGV - B to C - Téléphone + Courrier","role":"Vous êtes Patricia ROUSSEL. Vous avez commandé 4 pneus le 27/02, livrés le 02/03. Vous voulez ANNULER votre commande car votre voiture vient de tomber en panne grave (boîte de vitesses HS) et vous avez décidé de la vendre. Vous n'avez plus besoin des pneus. Vous savez que les 14 jours sont passés mais vous insistez : 'c'est pas votre faute mais c'est pas la mienne non plus'. Si on vous propose un échange ou une revente, vous écoutez mais vous préférez votre argent.","objet":"4 × Continental EcoContact 6 205/60 R16 92H à 103 € TTC/unité = 412 € TTC. Livraison du 02/03/2026. Demande de rétractation reçue le 20/03/2026 (J+18 après livraison).","profil":"Vous êtes triste plutôt que colérique. Vous racontez votre panne, votre âge, votre retraite modeste. Vous lâchez progressivement : (1) la voiture est inutilisable, (2) vous ne savez pas quoi faire des pneus, (3) si on vous propose une revente sur le bon coin avec assistance, vous acceptez. Si on est trop juridique et froid, vous pleurez (vraiment) et raccrochez.","journee":2,"client_ref":"J2-04"},{"num_appel":"J2-05","activite_type":"II","competence_canal":"Vente conseil et montée en gamme avec argumentaire technique - B to B - Téléphone + Email","role":"Vous êtes Jean-Pascal MERCIER, directeur d'une auto-école avec 4 véhicules-école. Vous avez commandé l'an dernier 8 pneus entrée de gamme (60 €/pneu) et vous trouvez qu'ils s'usent trop vite (15 000 km au lieu des 30 000 espérés). Vous appelez pour vous plaindre mais vous ÊTES OUVERT à une autre solution si on vous démontre que ça vaut le coup. Votre budget annuel pneus est plafonné à 700 € HT.","objet":"Auto-école 4 véhicules (Renault Clio + Peugeot 208), kilométrage moyen 60 000 km/an/véhicule. Dimensions 195/65 R15. Achat précédent : entrée de gamme 60 € HT/pneu. Budget annuel pneus plafonné à 700 € HT.","profil":"Vous êtes ouvert mais sceptique. Vous lâchez : (1) en vrai, vous changez de pneus 2 fois par an car ils s'usent vite, (2) si on vous démontre qu'un pneu à 90 € qui dure 30 000 km = moins cher au km qu'un pneu à 60 € qui dure 15 000 km, vous achetez, (3) vous voulez le RDV de montage dans un centre agréé proche (Lyon 2e) pour ne pas perdre vos véhicules.","journee":2,"client_ref":"J2-05"},{"num_appel":"J2-06","activite_type":"II","competence_canal":"Gérer un litige garantie complexe et défendre le client auprès du fournisseur - B to C - Téléphone + Courrier recommandé","role":"Vous êtes Karl ZIMMERMANN, ingénieur, méthodique. Le 8 février, votre pneu avant gauche a ÉCLATÉ sur l'autoroute A4 à 90 km/h. Vous avez failli avoir un grave accident. Vous avez : un PV de gendarmerie, des photos, une expertise rapide d'un garagiste indépendant (vice de fabrication selon lui). Le pneu n'avait que 15 000 km. Vous avez écrit au SAV qui a REFUSÉ la garantie en disant que c'était de l'usure. Vous menacez de la 60 millions de consommateurs et du tribunal.","objet":"Bridgestone Potenza S001 225/45 R17 91W. Acheté 580 € TTC le 14/06/2025. Monté chez centre agréé Strasbourg le 18/06/2025. Éclatement du pneu avant gauche à 15 000 km. PV constat + expertise indépendante mentionnant 'défaut de fabrication probable'.","profil":"Vous êtes posé mais déterminé. Vous lâchez : (1) le pneu était monté par un centre AGRÉÉ (donc CGV VI respectées), (2) vous avez TOUTES les preuves, (3) vous voulez le remboursement des 4 pneus + une indemnisation pour le danger subi. Si on vous écoute et qu'on défend votre dossier auprès de Bridgestone, vous lâchez prise sur l'indemnisation. Si on vous renvoie le 'pas-de-garantie' du collègue, vous menacez de la presse.","journee":2,"client_ref":"J2-06"},{"num_appel":"J2-07","activite_type":"II","competence_canal":"Vente conseil multi-offre (B2B + partenaire institutionnel + parrainage) - Email + Téléphone + Courrier","role":"Vous êtes Beatriz SOARES, co-gérante d'un garage à Bordeaux. Vous avez 2 demandes : (1) équiper vos 4 véhicules de service en pneus toutes saisons, (2) faire bénéficier les salariés du CSE Carrefour Mérignac (où votre mari travaille — 280 salariés) du tarif partenaire ON THE ROAD. Vous avez été parrainée par Marie FALAIZE.","objet":"Besoin 1 : 4 véhicules de service. Besoin 2 : partenariat CSE Carrefour Mérignac (280 salariés). Parrainage en cours : parrain Garage LEFOUR (1-04).","profil":"Vous êtes commerciale et entreprenante. Vous lâchez : (1) vous voulez voir le commercial régional EN PERSONNE pour le partenariat CSE, (2) le RDV doit être fixé avant fin du mois, (3) si on vous bâcle l'appel, vous abandonnez et appelez Allopneus.","journee":2,"client_ref":"J2-07"},{"num_appel":"J2-08","activite_type":"I","competence_canal":"Traiter une urgence SAV professionnelle et planifier intervention - B to B - Téléphone + SMS + Email","role":"Vous êtes Issa OUEDRAOGO, chauffeur VTC. Vous travaillez 12h/jour avec votre Mercedes Classe E. Depuis 2 jours, votre voiture vibre fortement à plus de 100 km/h. Vous êtes paniqué : sans voiture = pas de revenus pour votre famille. Vous voulez un RDV TODAY si possible. Vous parlez vite, accent francophone d'Afrique de l'Ouest, parfois vous mélangez les mots techniques.","objet":"Mercedes Classe E. 4 × Goodyear EfficientGrip Performance 215/55 R17 94W. Achetés 460 € TTC en janvier 2026, montés en centre agréé. Vibrations apparues à 12 000 km après le montage.","profil":"Vous êtes stressé mais reconnaissant si on vous aide. Vous lâchez : (1) vous habitez St-Denis, (2) le centre agréé du 93 vous va si possible aujourd'hui, (3) si on vous propose un RDV demain matin tôt + un SMS de confirmation, vous êtes satisfait. Si on vous dit 'la semaine prochaine', vous explosez parce que vous perdez 200 €/jour.","journee":2,"client_ref":"J2-08"},{"num_appel":"J2-09","activite_type":"II","competence_canal":"Médiation client expert juridique avec geste commercial - B to C - Téléphone + Courrier","role":"Vous êtes Maître Véronique HENRION-LEBLANC, avocate. Vous avez commandé 4 pneus Pirelli haut de gamme (920 €). À réception, vous constatez que les pneus ont un DOT 2023 (donc 2 ans de stockage). Vous estimez que c'est INACCEPTABLE pour ce prix. Vous avez fait des recherches juridiques : la directive européenne ne fixe pas de limite mais l'AFNOR recommande 4 ans max. Vous menacez la DGCCRF, l'UFC Que Choisir et de saisir le tribunal de proximité.","objet":"4 × Pirelli P Zero 245/40 R19 98Y, 230 € TTC/pneu = 920 € TTC. DOT 2023 (semaine 14). Livraison du 18/03/2026.","profil":"Vous êtes redoutable. Vous coupez la parole, citez des articles de loi. Vous lâchez progressivement : (1) ce qui vous gêne vraiment, c'est de ne pas avoir été INFORMÉE du DOT à la commande, (2) vous accepteriez un avoir de 15% sur la prochaine commande, (3) si on vous propose un courrier de la direction commerciale + le médiateur, vous calmez le jeu. Si le conseiller bafouille ou ment, vous l'écrasez et raccrochez en disant 'à demain pour la mise en demeure'.","journee":2,"client_ref":"J2-09"},{"num_appel":"J2-10","activite_type":"II","competence_canal":"Prospection grand compte et organisation visite commerciale - B to B - Téléphone + Email","role":"Vous êtes Pierre VANDENBROUCKE, acheteur dans une PME de logistique (35 véhicules : 20 utilitaires + 15 poids lourds 19T). Vous comparez 3 fournisseurs avant changement (vous quittez Allopneus). Vous voulez voir un commercial RÉEL avec un dossier solide. Vous décidez ce mois-ci.","objet":"Flotte 35 véhicules : 20 utilitaires (Renault Master, Iveco Daily) + 15 PL 19T (DAF, Renault). Volume annuel estimé : 280 pneus/an, budget 45 000 € HT. Décision dans le mois.","profil":"Vous êtes pro et exigeant. Vous voulez : (1) RDV dans les 10 jours, (2) un dossier prix complet PAR DIMENSION avant le RDV, (3) garantie de disponibilité (votre point bloquant chez Allopneus). Si on vous propose un RDV générique sans dossier prix, vous abandonnez.","journee":2,"client_ref":"J2-10"},{"num_appel":"J2-11","activite_type":"II","competence_canal":"Reconnaître une erreur entreprise et reconquérir le client - B to B - Téléphone + Courrier","role":"Vous êtes Sarah AKAJOUNE, gérante d'un petit garage marseillais. Vous êtes cliente fidèle depuis 3 ans, sans aucun incident. Vous avez commandé 6 pneus à 60 € HT/unité = 360 € HT. La facture reçue indique 432 € HT (72 € HT TROP). Vous avez signalé par mail le 10/03 sans aucune réponse. Aujourd'hui vous recevez une MISE EN DEMEURE de payer la facture gonflée. Vous êtes au bord du divorce commercial.","objet":"BDC26-0098 du 12/02/2026 : 6 × Hankook Kinergy Eco2 195/65 R15 91H à 60 € HT/unité = 360 € HT (au lieu de 432 € HT facturés). Mise en demeure envoyée le 08/04/2026 à tort.","profil":"Vous êtes en rage froide. Vous lâchez : (1) c'est une erreur grossière qu'on n'a pas voulu corriger, (2) la mise en demeure est inacceptable, (3) si on reconnaît l'erreur ET qu'on vous propose un geste, vous restez cliente (mais à reconquérir). Si on minimise, vous fermez votre compte et vous le faites savoir sur les forums pros.","journee":2,"client_ref":"J2-11"},{"num_appel":"J2-12","activite_type":"I","competence_canal":"Conseil technique réglementaire et vente conseil - B to C - Téléphone + Email","role":"Vous êtes Loïc FONTAINE, ingénieur dans le tertiaire. Vous habitez Annecy. Vous savez vaguement qu'il y a une 'loi montagne' depuis 2024 mais vous ne maîtrisez pas. Votre Peugeot 308 sera concernée. Vous voulez le MEILLEUR rapport qualité/prix ET la conformité légale. Budget 600 € maxi.","objet":"Peugeot 308 II. Dimension 205/55 R16 91V. Usage mixte ville + week-end ski. Annecy (zone Loi Montagne). Budget 600 € TTC.","profil":"Vous êtes ouvert et curieux. Vous lâchez : (1) si on vous explique bien la loi Montagne, vous accordez votre confiance, (2) vous préférez les 4 saisons 3PMSF si bon compromis, (3) RDV de montage entre les deux ponts de mai. Si on vous noie d'infos sans clarté, vous raccrochez pour aller chez Norauto.","journee":2,"client_ref":"J2-12"},{"num_appel":"J2-13","activite_type":"II","competence_canal":"Gérer un retard de livraison et fidéliser après incident - B to C - Téléphone + Email + Courrier","role":"Vous êtes Yuki TANAKA, jeune cliente urbaine. Vous avez commandé 4 pneus le 1er avril, livraison annoncée sous 5 jours. Reçus le 20 avril (J+15). En plus, le carton était déchiré mais les pneus eux-mêmes sont OK après inspection. Vous avez perdu 2 jours de location de voiture (60 €) pour rien.","objet":"4 × Michelin Pilot Sport 4 215/55 R17 94W à 145 € TTC = 580 € TTC. Commande 01/04, livraison 20/04 (engagement 5 jours ouvrés CGV).","profil":"Vous êtes calme mais ferme. Vous lâchez : (1) vous voulez SOIT un dédommagement (60 € de location perdue), SOIT le remboursement complet, (2) si on vous propose un avoir de 50 € + parrainage, vous acceptez, (3) vous parraineriez bien votre frère qui change ses pneus en mai.","journee":2,"client_ref":"J2-13"},{"num_appel":"J2-14","activite_type":"II","competence_canal":"Accompagner une rétractation client peu à l'aise avec internet - B to C - Téléphone + Courrier + SMS","role":"Vous êtes M. André BOUCHET, retraité de 72 ans. Vous avez commandé en ligne 4 pneus le 12 avril (votre fils vous a aidé). Reçus le 16. Vous avez finalement préféré faire poser des pneus par votre garagiste de toujours (vous ne maîtrisez pas internet, vous avez peur de mal faire). Vous voulez retourner les pneus. Vous parlez doucement, vous redemandez les choses 2 fois.","objet":"4 × pneus toutes saisons (Hankook Kinergy 4S2) 195/65 R15 91V à 80 € TTC/pneu = 320 € TTC. Livraison du 16/04. Délai de rétractation : 14 jours = jusqu'au 30/04 inclus.","profil":"Vous êtes poli, hésitant, perdu. Vous lâchez : (1) vous ne savez pas comment retourner, (2) vous demandez si quelqu'un peut venir reprendre les pneus, (3) vous avez peur de payer si vous faites mal. Si on vous explique calmement étape par étape avec un courrier postal en plus du mail, vous remerciez chaudement.","journee":2,"client_ref":"J2-14"},{"num_appel":"J2-15","activite_type":"II","competence_canal":"Négociation commerciale B2B avec valorisation fidélité - B to B - Téléphone + Email","role":"Vous êtes Nuno PEREIRA, gérant d'une carrosserie. Vous achetez chez ON THE ROAD depuis 1 an. Vous voulez étendre votre flotte (4 véhicules de prêt supplémentaires, donc 16 pneus à acheter d'ici juin). Vous demandez UNE GROSSE REMISE (15% minimum) en menaçant d'aller chez Allopneus.","objet":"Extension flotte : 4 véhicules de prêt = 16 pneus à acheter d'ici juin. Préférence dimensions 195/65 R15 et 205/55 R16. Budget cible 700 € HT. Vous adhérez à la CMA Toulouse.","profil":"Vous êtes négociateur né. Vous lâchez : (1) vous voulez 15% (mais vous accepterez 10%), (2) si l'offre arrive vite par mail signée, vous signez, (3) si on vous traite comme un nouveau client, vous menacez d'aller voir ailleurs. Le RDV avec début, vous criez à l'arnaque.","journee":2,"client_ref":"J2-19"},{"num_appel":"J2-20","activite_type":"II","competence_canal":"Gérer une demande non standard avec créativité commerciale - B to B - Téléphone + Email","role":"Vous êtes Rachel ELKAIM, dirigeante d'une PME d'import-export. Vous avez besoin de 40 pneus pour un de vos clients sénégalais (concession auto à Dakar). Vous voulez TOUT (commande + livraison) à Dakar. Vous savez que c'est compliqué mais vous testez.","objet":"40 pneus mixtes (20 × 195/65 R15, 20 × 215/55 R17). Livraison demandée Dakar (Sénégal). Budget cible 4 500 € HT. Acompte possible 30%.","profil":"Vous êtes pragmatique. Vous lâchez : (1) si livraison Dakar impossible, vous acceptez livraison transitaire Roissy, (2) vous voulez un BDC ferme avant le RDV, (3) si on vous trouve la solution avec créativité, vous êtes une cliente fidèle. Si on vous ferme la porte sec, vous allez chez un grossiste B2B.","journee":2,"client_ref":"J2-20"},{"num_appel":"J2-21","activite_type":"I","competence_canal":"Traiter une demande de renseignement multi-objet avec rigueur procédurale - B to C - Téléphone + Email","role":"Vous êtes Édouard TRAVIS, retraité actif. Vous venez de déménager (de Tours centre à Tours-Nord) et vous appelez pour : (1) mettre à jour vos coordonnées chez ON THE ROAD, (2) récupérer une facture de juin 2024 pour vos impôts (vous avez perdu l'original), (3) savoir comment marche le service 'Porter plainte' que vous avez vu sur le site (vous avez eu une mauvaise expérience avec un autre fournisseur).","objet":"Nouvelle adresse : 23 boulevard Heurteloup, 37000 TOURS. Facture à dupliquer : juin 2024 (commande de 4 pneus). Question Services+ : portée du service 'Porter plainte'.","profil":"Vous êtes calme, courtois, très organisé. Vous attendez : (1) confirmation immédiate de la mise à jour adresse, (2) facture par mail le jour même, (3) explication claire du service Porter plainte. Si tout est traité proprement, vous êtes très satisfait. Si on « Bonjour, (votre prénom) d'ON THE ROAD. Vous êtes bien M. /ou Mme X... »","Le réseau de distribution.\n\nLa société ON THE ROAD ne possède pas de magasin physique. \nElle vend ses produits et services en ligne grâce à son site e-commerce www.ontheroad.com. \nLes livraisons se font soit au domicile du client, soit chez l'un des 28 centres partenaires sur le territoire national qui assure aussi les prestations d'ON THE ROAD. \n\nDans le cadre de partenariat, ON THE ROAD intègre, dans son catalogue, certaines prestations des centres partenaires. \n\nTous les tarifs du catalogue sont affichés en TTC. \n\nPour les professionnels, la TVA est récupérable. \n\nON THE ROAD a su se démarquer de ses concurrents en proposant également des « services + » à ses clients en leur permettant de les soulager d'une partie des démarches avec les services public ou institutionnels, telles que la demande d'immatriculation de nouveaux véhicules, ainsi que le dépôt de plainte en ligne en cas de vol de véhicule."],"cgv":{"titre":"Conditions Générales de Vente — ON THE ROAD","preambule":"Extrait des conditions générales de vente de l'entreprise ON THE ROAD applicables aux commandes passées en ligne ou par téléphone.","sections":[{"num":"I","titre":"Introduction","contenu":"ON THE ROAD commercialise auprès du grand public des pneumatiques neufs et d'origine, conformes aux spécifications des constructeurs."},{"num":"II","titre":"Passer une commande","contenu":"Les commandes peuvent être directement effectuées en ligne ou bien en contactant le service client par téléphone.\n\nSur la page d'accueil du site, il suffit de cliquer sur « nouveau client » en haut à droite du bandeau supérieur et suivre la procédure d'enregistrement permettant d'obtenir un numéro de client. Le client reçoit un mail sur la boîte dont il a fourni l'adresse avec un lien pour confirmer l'enregistrement. Ainsi le client pourra suivre à tout instant sa commande, créer son compte, modifier ses données personnelles et contacter le service client.\n\nLa modification de commande est possible uniquement par téléphone dans un délai de 48h maximum. Au-delà, le client devra refuser la commande lors de la livraison ou la réceptionner et la renvoyer (voir conditions retour).\n\nToute commande passée sur le site ontheroad.com oblige le client à en payer immédiatement et intégralement le prix, sauf sélection du paiement par carte bancaire en trois fois sans frais.\n\nLes achats réalisés sur le site demeurent la propriété d'ON THE ROAD jusqu'à complet encaissement du prix de la commande."},{"num":"III","titre":"Livraison","contenu":"Le délai de préparation correspond à la vérification des informations saisies par le client + préparation de la commande + prise en charge du ou des colis par le transporteur.\n\nLes commandes sont préparées dans un délai de 24 à 48 heures (hors week-end et jour férié) :\n• Livraison normale à domicile avec So Colissimo (2 à 5 jours ouvrés sans frais supplémentaire)\n• Livraison normale en centres agréés avec Relais Colis agréé et So Colissimo (2 à 5 jours ouvrés sans frais supplémentaire)\n\nLa charge des risques est transférée au client dès la livraison réceptionnée. À partir de ce moment, le client est responsable de la bonne conservation des pneus.\n\nEn tout état de cause, ON THE ROAD s'engage à livrer le produit commandé dans un délai maximum de trente jours à compter de la validation de la commande (ou de l'enregistrement du chèque en cas de règlement par ce mode de paiement).\n\n— Contrôle du colis et de son contenu —\nEn fonction du mode de remise du colis :\n• En relais : contre signature\n• À domicile : en main propre (avec ou sans signature)\n\nDans les deux cas, son destinataire est tenu de vérifier l'état de l'emballage ainsi que le contenu du colis (avarie, pièce manquante, colis endommagé, pièce cassée)."},{"num":"IV","titre":"Délai de rétractation","contenu":"Suivant les dispositions de l'article L.121-21 du Code de la consommation, le consommateur dispose d'un délai de quatorze jours pour exercer son droit de rétractation d'un contrat conclu à distance sans avoir à motiver sa décision.\n\nLe client doit informer ON THE ROAD de sa décision de se rétracter en adressant, par courrier ou par e-mail, le formulaire de rétractation ainsi que le bordereau de retour préaffranchi prévu à cet effet sur le site et doit renvoyer les pièces dans un délai maximum de huit jours à compter de la date de rétractation.\n\nLe remboursement sera effectué à réception des produits par ON THE ROAD par virement ou chèque.\n\nAinsi, pour être pris en charge au titre du droit de rétractation, les produits retournés doivent impérativement parvenir chez ON THE ROAD :\n5 route des Plaines, ZI LES BUCHERONS, 95 356 SAINT OUEN L'AUMONE CEDEX.\n\n— Conditions de remboursement —\nTout remboursement se fera après réception du ou des produits et vérification de leur état."},{"num":"V","titre":"Moyen de paiement","contenu":"— Modalités de paiement —\n\nPour les particuliers et pour les entreprises clientes de moins de deux ans :\n• À la commande, paiement en ligne de la totalité du prix\n• Possibilité de règlement en « trois fois sans frais » pour tout achat entre 250 et 1500 €\n\nEn cas de non-paiement d'une seule échéance, le créancier pourra exiger le remboursement immédiat du capital restant dû.\n\nPour les entreprises clientes fidèles (ancienneté de plus de 2 ans) :\n• À réception de la commande\n\n— Moyens de paiement —\n• Par carte bancaire, paiement libre et sécurisé. Tous les paiements par carte sont garantis par la PNP Baribas et sa technologie de sécurisation Mercanet.\n• Par chèque lors d'un échelonnement « trois fois sans frais » pour tout achat entre 150 et 1500 €.\n\nLes règlements par chèque sont à envoyer avec le numéro de commande au dos à :\nON THE ROAD, 5 route des Plaines, ZI LES BUCHERONS, 95 356 SAINT OUEN L'AUMONE CEDEX\n\nLes paiements par carte bancaire sont libres, sécurisés et sont garantis par la PNP Baribas et sa technologie de sécurisation Mercanet."},{"num":"VI","titre":"Informations produits","contenu":"Les produits vendus par ON THE ROAD ne peuvent être montés que sur les véhicules ou les systèmes recommandés par le constructeur ou l'équipementier, par une personne compétente et sous sa seule responsabilité. ON THE ROAD ne saurait en aucun cas être tenu pour responsable des conséquences d'un mauvais montage ou de l'utilisation d'un produit inadapté sur un véhicule."},{"num":"VII","titre":"Garanties","contenu":"Si le véhicule du client est encore sous la garantie du constructeur, le client peut entretenir son véhicule avec des pneus achetés sur le site ON THE ROAD sans perdre sa garantie constructeur (arrêté ministériel du 26 septembre 2014).\n\nTous les produits vendus par ON THE ROAD sont couverts par les garanties légales de conformité (L.211-4 et suivants du code de la consommation) et de vices cachés (articles 1641 et suivants du code civil).\n\nEn application des dispositions du Code de la consommation reproduites ci-dessous, le client bénéficie d'une garantie contre les défauts de conformité des pneus achetés sur le site ON THE ROAD."}]},"services_plus":["Foire Aux Questions concernant le Services + à destination des conseillers","1. Porter Plainte","1 Quelles sont les modalités pour porter plainte ?","Si vous avez été victime d’une infraction, vous pouvez porter plainte afin d’informer la justice des faits commis à votre encontre. Il est possible de porter plainte contre une personne physique, une personne morale (une entreprise, une association…) ou contre X, si l'auteur des faits est inconnu. \n\nLa victime d’une infraction peut déposer plainte :\n\n- dans un commissariat de police ;\n- dans une brigade de gendarmerie ;\n- ou directement auprès du procureur de la République.\n\nMis à jour le 23 avril 2023 - Direction de l'information légale et administrative (Premier ministre), Ministère en charge de la justice","2 Comment porter plainte en ligne?","Pré-plainte en ligne (Service en ligne)\n\nPermet d'effectuer une pré-déclaration en ligne pour une atteinte aux biens (vol ou escroquerie par exemple) ou certains faits à caractère discriminatoire par un auteur inconnu.\n\nAprès la pré-déclaration en ligne, vous devez prendre rendez-vous au commissariat ou à la brigade de gendarmerie de votre choix pour signer la plainte.\n\nLes policiers ou les gendarmes peuvent décider de conserver les éléments de preuve que vous apportez.\n\nAttention : Vous devez être personnellement victime de l'infraction.\n\nMis à jour le 25 janvier 2022 - Direction de l'information légale et administrative (Première ministre)","Porter plainte en ligne Porter plainte auprès du procureur de la République","2.  Immatriculation d'un véhicule","Vous avez acheté un véhicule neuf en France ou à l'étranger ?\n\nVous devez le faire immatriculer et obtenir une carte grise (désormais appelée certificat d'immatriculation) dans un délai d'un mois après l'achat. \n\nLa demande de carte grise s'effectue sur le site internet de l'ANTS (Agence Nationale des Titres Sécurisés.)\n\nVous pouvez également passer par un professionnel de l'automobile.","Dans la plupart des cas, la demande d'immatriculation peut être effectuée directement auprès du professionnel qui vous vend le véhicule.\n\nSinon, vous pouvez vous-même effectuer la demande sur internet en utilisant le téléservice de l'Agence nationale des titres sécurisés (ANTS).","Mes documents à fournir:\n\n5 documents à fournir\n\n- Le cerfa 13750*07 ( sert de demande d’immatriculation , certificat de conformité ) \n- Une pièce d’identité en cours de validité\n- Le certificat de conformité délivré par le constructeur ou équivalent\n- Un justificatif de domicile de moins de 6 mois\n- Le quitus fiscal (véhicule acquis à l'étranger)\n\nSi vous faites la démarche pour quelqu’un d’autre, un mandat doit être fourni ainsi que la pièce d’identité"],"commerciaux":[{"nom":"Aleksi MALONEN","region":"IDF","secteur":"Île-de-France"},{"nom":" function loadStore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      // 1ère initialisation : on copie la seed
      const fresh = structuredClone(SEED_DATA);
      fresh.sessions = []; // historique des appels joués
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
      return fresh;
    }
    const data = JSON.parse(raw);
    return migrateStore(data);
  }catch(e){
    console.error("loadStore", e);
    const fresh = structuredClone(SEED_DATA);
    fresh.sessions = [];
    return fresh;
  }
}

/* Migration : complète les clés manquantes dans une base existante avec les valeurs SEED.
   Préserve les modifications utilisateur sur les clés déjà présentes. */
function migrateStore(data){
  let migrated = false;
  // Sessions toujours nécessaire
  if(!data.sessions){ data.sessions = []; migrated = true; }
  // Cas particulier : CGV en ancienne forme (array de strings) -> nouvelle forme (objet structuré)
  if(Array.isArray(data.cgv) || !data.cgv || !data.cgv.sections){
    data.cgv = structuredClone(SEED_DATA.cgv);
    migrated = true;
    console.log("Migration : CGV passées du format array au format structuré");
  }
  // Cas particulier : CGV contaminées par double-échappement HTML (&#39; au lieu de ')
  else if(data.cgv.sections.some(s => /&#39;|&amp;|&lt;|&gt;|&quot;/.test(s.contenu||""))){
    data.cgv = structuredClone(SEED_DATA.cgv);
    migrated = true;
    console.log("Migration : CGV nettoyées (double-échappement HTML détecté)");
  }
  // Compléter avec les clés manquantes de SEED_DATA
  for(const key of Object.keys(SEED_DATA)){
    if(data[key] === undefined || data[key] === null){
      data[key] = structuredClone(SEED_DATA[key]);
      migrated = true;
      console.log(`Migration : ajout de la clé manquante "${key}"`);
    }
  }
  // Ajouter journee=1 aux cas et clients existants (par défaut Journée 1)
  if(Array.isArray(data.cas)){
    data.cas.forEach(c => {
      if(c.journee === undefined){
        // Si la référence commence par "J2-", c'est journée 2, sinon 1
        c.journee = (c.num_appel||"").startsWith("J2-") ? 2 : 1;
        migrated = true;
      }
    });
  }
  if(Array.isArray(data.clients)){
    data.clients.forEach(c => {
      if(c.journee === undefined){
        c.journee = (c.ref||"").startsWith("J2-") ? 2 : 1;
        migrated = true;
      }
    });
  }
  // Si la liste de cas locale ne contient PAS encore les cas J2 du seed, les ajouter (mise à jour)
  if(Array.isArray(data.cas) && Array.isArray(SEED_DATA.cas)){
    const localRefs = new Set(data.cas.map(c => c.num_appel));
    SEED_DATA.cas.forEach(seedCas => {
      if((seedCas.num_appel||"").startsWith("J2-") && !localRefs.has(seedCas.num_appel)){
        data.cas.push(structuredClone(seedCas));
        migrated = true;
        console.log(`Migration : ajout du cas J2 "${seedCas.num_appel}"`);
      }
    });
  }
  if(Array.isArray(data.clients) && Array.isArray(SEED_DATA.clients)){
    const localRefs = new Set(data.clients.map(c => c.ref));
    SEED_DATA.clients.forEach(seedCli => {
      if((seedCli.ref||"").startsWith("J2-") && !localRefs.has(seedCli.ref)){
        data.clients.push(structuredClone(seedCli));
        migrated = true;
        console.log(`Migration : ajout de la fiche J2 "${seedCli.ref}"`);
      }
    });
  }
  if(migrated){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  return data;
}

/* ---------------- HELPERS ------------------------------- */
const $ = (sel, root) => (root||document).querySelector(sel);
const $$ = (sel, root) => Array.from((root||document).querySelectorAll(sel));

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k === "class") e.className = v;
    else if(k === "html") e.innerHTML = v;
    else if(k === "text") e.textContent = v;
    else if(k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if(v !== null && v !== undefined && v !== false) e.setAttribute(k, v);
  }
  for(const c of children){
    if(c == null || c === false) continue;
    if(Array.isArray(c)) c.forEach(cc=>cc && e.appendChild(typeof cc==="string"?document.createTextNode(cc):cc));
    else if(typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function nl2br(s){
  return escapeHtml(s).replace(/\n/g, "<br>");
}
function fmtMoney(n){
  if(n==null||n==="") return "—";
  const v = typeof n === "number" ? n : parseFloat(n);
  if(isNaN(v)) return "—";
  return v.toLocaleString("fr-FR", {minimumFractionDigits:2, maximumFractionDigits:2}) + " €";
}
function fmtDate(s){
  if(!s) return "—";
  // déjà au format JJ/MM/AAAA ?
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  return s;
}
function todayFr(){
  const d = new Date();
  return String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + d.getFullYear();
}
function nowTimeFr(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function initials(name){
  if(!name) return "??";
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join("");
}
function fullName(c){
  if(!c) return "";
  const civ = c.civilite_1 || c.civilite || "";
  const pre = c.prenom_1 || c.prenom || "";
  const nom = c.nom_1 || c.nom || "";
  return [civ, pre, nom].filter(Boolean).join(" ").trim();
}
function societe(c){
  if(!c) return "Particulier";
  const rs = c.raison_sociale_f || c.raison_sociale || "";
  return rs && rs.trim() ? rs.trim() : "Particulier";
}

/* === clientInfo : normalise les accès clients (J1 et J2 ont des noms de clés différents) === */
function clientInfo(c){
  if(!c) return null;
  return {
    ref: c.ref || "",
    journee: c.journee || 1,
    civilite: c.civilite_1 || c.civilite || "",
    nom: c.nom_1 || c.nom || "",
    prenom: c.prenom_1 || c.prenom || "",
    raison_sociale: c.raison_sociale_f || c.raison_sociale || "",
    fonction: c.fonction || "",
    adresse: c.adresse_f || "",
    cp: c.cp_f || "",
    ville: c.ville_f || "",
    fixe: c.fixe_1 || "",
    portable: c.portable_1 || "",
    mail: c.mail_1 || "",
    contact_2: {
      civilite: c.civilite_2 || "",
      nom: c.nom_2 || "",
      prenom: c.prenom_2 || "",
      fonction: c.fonction_2 || "",
      fixe: c.fixe_2 || "",
      portable: c.portable_2 || "",
      mail: c.mail_2 || "",
    },
    adresse_l: c.adresse_l || "",
    cp_l: c.cp_l || "",
    ville_l: c.ville_l || "",
    anciennete: c.anciennete || "",
    mission: c.mission || "",
    competence: c.competence || "",
    montant_facture: c.montant_facture || "",
    evenements: [1,2,3,4,5,6].map(i => ({
      date: c["evt"+i+"_date"] || "",
      texte: c["evt"+i] || ""
    })).filter(e => e.date || e.texte),
    raw: c
  };
}

/* Retourne un libellé court "Civ. Prénom NOM (Société)" */
function clientLabel(c){
  const ci = clientInfo(c);
  if(!ci) return "—";
  const nm = [ci.civilite, ci.prenom, ci.nom].filter(Boolean).join(" ").trim() || ci.ref;
  const rs = ci.raison_sociale ? ` (${ci.raison_sociale})` : "";
  return nm + rs;
}

function toast(msg, type="info"){
  const t = el("div", {class:"toast " + (type||"")}, msg);
  $("#toastZone").appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(20px)";t.style.transition="all .3s";setTimeout(()=>t.remove(),300)}, 3000);

/* ---------------- MODAL --------------------------------- */
function openModal({title, body, foot, size}){
  const m = $("#modal");
  const box = $("#modalBox");
  box.classList.remove("large","small");
  if(size) box.classList.add(size);
  $("#modalTitle").textContent = title || "";
  const b = $("#modalBody");
  b.innerHTML = "";
  if(typeof body === "string") b.innerHTML = body;
  else if(body) b.appendChild(body);
  const f = $("#modalFoot");
  f.innerHTML = "";
  if(foot){
    if(typeof foot === "string") f.innerHTML = foot;
    else if(Array.isArray(foot)) foot.forEach(b=>b && f.appendChild(b));
    else f.appendChild(foot);
  }else{
    f.appendChild(el("button",{class:"btn outline", type:"button", onclick:closeModal}, "Fermer"));
  }
  m.classList.add("visible");
}
function closeModal(){
  $("#modal").classList.remove("visible");
}
$("#modal").addEventListener("click", e => {
  if(e.target.id === "modal") closeModal();
});

function doLogin(){
  const role = $("#loginScreen").dataset.role || "stagiaire";

  if(role === "stagiaire"){
    const name = $("#loginName").value.trim();
    if(!name){
      toast("Merci de saisir votre nom", "error");
      $("#loginName").focus();
      return;
    }
    STATE.user = { name, role: "stagiaire" };
  } else {
    // Formateur : vérifier sélection + code
    const id = $("#formateurSelect").value;
    if(!id){
      toast("Merci de sélectionner votre identité", "error");
      $("#formateurSelect").focus();
      return;
    }
    const formateur = (STORE.formateurs||[]).find(f => f.id === id);
    if(!formateur){
      toast("Identité formateur introuvable", "error");
      return;
    }
    const pwd = $("#loginPwd").value;
    const expectedPwd = formateur.role === "admin" ? getAdminPwd() : getFormateurPwd();
    if(pwd !== expectedPwd){
      toast("Code incorrect", "error");
      $("#loginPwd").focus();
      return;
    }
    STATE.user = {
      name: `${formateur.civilite} ${formateur.nom} ${formateur.prenom}`,
      role: "formateur",
      isAdmin: formateur.role === "admin",
      formateurId: formateur.id
    };
  }

  $("#loginScreen").style.display = "none";
  $("#app").classList.add("visible");
  $("#userName").textContent = STATE.user.name;
  $("#userRole").textContent = role === "formateur"
    ? (STATE.user.isAdmin ? "Administrateur" : "Formateur")
    : "Stagiaire";
  $("#userAvatar").textContent = initials(STATE.user.name);
  $("#userAvatar").classList.toggle("formateur", role === "formateur");
  buildNav();
  navigateTo(role === "formateur" ? "tableau" : "accueil");
}
